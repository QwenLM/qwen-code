name: Qwen Code 部署脚本更新任务

# 仅当部署/升级脚本自身变更时触发，将最新脚本同步到 OSS
triggers:
  push:
    branches:
      - main
      - feat/bindary-build
    paths:
      - ".aoneci/scripts/**"

envs:
  group: "alishu"
  project: "qwen-code"

jobs:
  upload-scripts:
    image: reg.docker.alibaba-inc.com/dataworks-ide/opencode-build:ubuntu22.04-node20-bun1.3.10
    runs-on:
      - 8-16Gi
    steps:
      - uses: checkout

      - name: upload scripts to oss
        run: |
          SOURCE_DIR="${AONE_CI_SOURCE}" \
          OSS_GROUP="${{envs.group}}" \
          OSS_PROJECT="${{envs.project}}" \
          OSS_ENDPOINT="https://oss-cn-shanghai.aliyuncs.com" \
          OSS_BUCKET="dataworks-notebook-cn-shanghai" \
          OSS_ACCESS_KEY_ID="${{secrets.DW_NOTEBOOK_OSS_ACCESS_KEY_ID}}" \
          OSS_ACCESS_KEY_SECRET="${{secrets.DW_NOTEBOOK_OSS_ACCESS_KEY_SECRET}}" \
          bash "${AONE_CI_SOURCE}/.aoneci/scripts/upload-scripts.sh"

traits:
  - type: notification
    properties:
      when:
        - success
      types:
        - dingtalk
      users:
        - ${{git.employeeId}}
      content: |
        **Qwen Code 部署脚本已更新**
        - Branch: ${{git.branch}}
        - Commit: ${{git.commitId}}
        - 详情: deploy-qwen.sh / upgrade-qwen.sh 已同步到 OSS
