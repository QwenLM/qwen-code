name: 构建 Qwen Code Standalone 包

triggers:
  push:
    branches:
      - feat/bindary-build
    paths:
      - "packages/**"
      - "scripts/**"
      - ".aoneci/**"
      - "esbuild.config.js"
      - "package.json"

envs:
  group: "alishu"
  project: "qwen-code"
  workspace_dir: "/workspace"

params:
  arch:
    description: "目标架构: amd64 或 arm64"
    type: string
    default: "amd64"
  version:
    description: "版本号，留空时自动从 package.json 读取并生成 preview 版本号"
    type: string
    default: ""

jobs:
  build-standalone:
    image: reg.docker.alibaba-inc.com/dataworks-ide/opencode-build:ubuntu22.04-node20-bun1.3.10
    runs-on:
      - 16-64Gi
    outputs:
      version: ${{steps.export-version.outputs.version}}
    steps:
      - uses: checkout

      - name: show toolchain
        run: |
          set -eux
          node --version
          npm --version

      - name: resolve version
        run: |
          MANUAL_VERSION="${{params.version}}" \
          WORKSPACE_DIR="${{envs.workspace_dir}}" \
          SOURCE_DIR="${AONE_CI_SOURCE}" \
          bash "${AONE_CI_SOURCE}/.aoneci/scripts/resolve-version.sh"

      - name: resolve upload policy
        run: |
          set -eux
          POLICY_FILE="${{envs.workspace_dir}}/.upload_policy.env"
          bash "${AONE_CI_SOURCE}/.aoneci/scripts/upload-policy.sh" "${{git.branch}}" > "${POLICY_FILE}"
          cat "${POLICY_FILE}"

      - name: install deps
        run: |
          set -eux
          cd $AONE_CI_SOURCE
          npm ci

      - name: build and bundle
        run: |
          set -eux
          cd $AONE_CI_SOURCE
          npm run build
          npm run bundle

      - name: build standalone
        run: |
          set -eux
          ARCH="${{params.arch}}" \
          WORKSPACE_DIR="${{envs.workspace_dir}}" \
          SOURCE_DIR="${AONE_CI_SOURCE}" \
          bash "${AONE_CI_SOURCE}/.aoneci/scripts/build-standalone-ci.sh"

      - name: prepare artifact
        run: |
          set -eux
          POLICY_FILE="${{envs.workspace_dir}}/.upload_policy.env"
          SKIP_METADATA="$(bash "${AONE_CI_SOURCE}/.aoneci/scripts/read-policy-value.sh" "${POLICY_FILE}" SKIP_METADATA)"
          ARTIFACT_DIR="${{envs.workspace_dir}}/artifact" \
          ARCH="${{params.arch}}" \
          WORKSPACE_DIR="${{envs.workspace_dir}}" \
          SOURCE_DIR="${AONE_CI_SOURCE}" \
          SKIP_METADATA="${SKIP_METADATA}" \
          bash "${AONE_CI_SOURCE}/.aoneci/scripts/prepare-artifact.sh"

      - name: upload to oss
        run: |
          set -eux
          POLICY_FILE="${{envs.workspace_dir}}/.upload_policy.env"
          SKIP_METADATA="$(bash "${AONE_CI_SOURCE}/.aoneci/scripts/read-policy-value.sh" "${POLICY_FILE}" SKIP_METADATA)"
          SKIP_LATEST_POINTER="$(bash "${AONE_CI_SOURCE}/.aoneci/scripts/read-policy-value.sh" "${POLICY_FILE}" SKIP_LATEST_POINTER)"
          SKIP_ROOT_SCRIPTS="$(bash "${AONE_CI_SOURCE}/.aoneci/scripts/read-policy-value.sh" "${POLICY_FILE}" SKIP_ROOT_SCRIPTS)"
          ARTIFACT_DIR="${{envs.workspace_dir}}/artifact" \
          ARCH="${{params.arch}}" \
          SOURCE_DIR="${AONE_CI_SOURCE}" \
          WORKSPACE_DIR="${{envs.workspace_dir}}" \
          OSS_GROUP="${{envs.group}}" \
          OSS_PROJECT="${{envs.project}}" \
          OSS_ENDPOINT="https://oss-cn-shanghai.aliyuncs.com" \
          OSS_BUCKET="dataworks-notebook-cn-shanghai" \
          SKIP_METADATA="${SKIP_METADATA}" \
          SKIP_LATEST_POINTER="${SKIP_LATEST_POINTER}" \
          SKIP_ROOT_SCRIPTS="${SKIP_ROOT_SCRIPTS}" \
          OSS_ACCESS_KEY_ID="${{secrets.DW_NOTEBOOK_OSS_ACCESS_KEY_ID}}" \
          OSS_ACCESS_KEY_SECRET="${{secrets.DW_NOTEBOOK_OSS_ACCESS_KEY_SECRET}}" \
          bash "${AONE_CI_SOURCE}/.aoneci/scripts/upload-oss.sh"

      - name: export version
        id: export-version
        run: |
          cat "${{envs.workspace_dir}}/.resolved_version" > "${{outputs.version.path}}"

traits:
  - type: notification
    properties:
      when:
        - success
      types:
        - dingtalk
      users:
        - ${{git.employeeId}}
      content: |
        ---
        - **Qwen Code Standalone 构建完成**
        - Branch: ${{git.branch}}
        - Commit: ${{git.commitId}}
        - Version: ${{jobs.build-standalone.outputs.version}}
        - 一键部署: `curl -fsSL https://dataworks-notebook-cn-shanghai.oss-cn-shanghai.aliyuncs.com/public-datasets/aone-release/alishu/qwen-code/deploy-qwen.sh | bash -s -- --version ${{jobs.build-standalone.outputs.version}}`
        - 指定版本安装: `curl -fsSL https://dataworks-notebook-cn-shanghai.oss-cn-shanghai.aliyuncs.com/public-datasets/aone-release/alishu/qwen-code/${{jobs.build-standalone.outputs.version}}/qwen-code-${{jobs.build-standalone.outputs.version}}-linux-amd64.tar.gz -o qwen-code.tar.gz && tar -xzf qwen-code.tar.gz`
