# .aoneci/workflows/npm-publish.yml
# 推送到 dev 分支时自动发布 npm beta 包
# 推送到 main 分支时自动发布 npm 正式包（latest）

name: 'NPM Publish'

triggers:
  push:
    branches: ['main', 'dev']

params:
  skip_tests:
    description: '是否跳过测试步骤（默认不跳过）'
    type: boolean
    default: false

jobs:
  npm-build-publish:
    runs-on:
      - 32-128Gi
    name: 'Build, Test & Publish'
    image: alios-8u
    steps:
      - uses: checkout
      - uses: setup-env
        inputs:
          node-version: '20'
          tnpm-version: '10'
          python-version: '3.10'
          rust-toolchain-version: stable
          tnpm-cache: true

      - name: 'Install dependencies'
        run: 'npm ci'

      - name: 'Run tests'
        if: ${{ params.skip_tests != 'true' }}
        run: 'NO_COLOR=true npm run test:ci'

      - name: 'Build project'
        run: 'npm run build'

      - uses: npm-publisher
        inputs:
          # main 分支发布正式版本（latest），其他分支（dev）发布预发布版本（beta）
          baseBranches: ['main']
          # beta 版本自动更新版本号
          autoVersion: true
