# .aoneci/upstream-sync-analyze.yml
# 每日分析 upstream (QwenLM/qwen-code) 的变更，生成 sync report 并通过钉钉通知
#
# 所需 CI 变量（在 Aone CI 平台配置）：
#   CI_DINGTALK_WEBHOOK_URL    - 钉钉机器人 webhook 地址（可选）
#   CI_DINGTALK_WEBHOOK_SECRET - 钉钉机器人加签密钥（可选）

name: Upstream Sync 每日分析

triggers:
  schedule:
    - cron: '0 9 * * 1-5' # 工作日每天 9:00 执行
  push:
    branches: ['trigger/upstream-analyze']

strategy:
  fast-fail: true

jobs:
  analyze:
    name: '分析 upstream 变更并通知'
    image: node:20
    timeout: 15m
    steps:
      - uses: 'checkout'

      - uses: 'setup-github-proxy'

      - name: 'Fetch upstream'
        run: |
          git remote add upstream https://github.com/QwenLM/qwen-code.git 2>/dev/null || true
          # CI 默认 shallow clone，需要 unshallow 才能让 merge-base 找到共同祖先
          git fetch --unshallow origin 2>/dev/null || true
          git fetch upstream main --tags
          echo "✅ upstream/main fetched: $(git rev-parse --short upstream/main)"

      - name: '运行分析脚本'
        run: |
          MERGE_BASE=$(git merge-base HEAD upstream/main)
          NEW_COMMITS=$(git log --oneline "$MERGE_BASE..upstream/main" --no-merges | wc -l | tr -d ' ')

          if [ "$NEW_COMMITS" -eq "0" ]; then
            echo "✅ 无新的 upstream 提交，已是最新状态。" | tee sync-report.md
          else
            echo "发现 $NEW_COMMITS 个新的 upstream 提交"
            UPSTREAM_REMOTE="upstream" UPSTREAM_BRANCH="main" \
              bash scripts/upstream-sync-analyze.sh > sync-report.md
          fi

          LATEST_TAG=$(git tag -l --sort=-v:refname 'v*' | head -1)
          LAST_SYNCED_TAG=$(cat .last-synced-upstream-tag 2>/dev/null || echo "none")
          if [ "$LATEST_TAG" != "$LAST_SYNCED_TAG" ] && [ -n "$LATEST_TAG" ]; then
            echo "" >> sync-report.md
            echo "## ⚠️ 新 Release 检测" >> sync-report.md
            echo "发现新 tag: **$LATEST_TAG**（上次同步: $LAST_SYNCED_TAG）" >> sync-report.md
          fi

          echo "--- 报告预览 ---"
          head -20 sync-report.md
          echo "--- 报告共 $(wc -l < sync-report.md) 行 ---"

      - name: '发送钉钉通知'
        env:
          DINGTALK_URL: ${{secrets['CI_DINGTALK_WEBHOOK_URL']}}
          DINGTALK_SECRET: ${{secrets['CI_DINGTALK_WEBHOOK_SECRET']}}
        run: |
          if [ -z "$DINGTALK_URL" ]; then
            echo "CI_DINGTALK_WEBHOOK_URL 未配置，跳过通知"
            exit 0
          fi
          if [ ! -f sync-report.md ]; then
            echo "报告不存在，跳过通知"
            exit 0
          fi
          echo "发送报告: $(wc -c < sync-report.md) bytes"

          DINGTALK_FILE=sync-report.md \
          DINGTALK_TITLE="Upstream Sync Report" \
          DINGTALK_MAX_LINES=60 \
          node <<'NODESCRIPT'
const crypto = require('crypto');
const https = require('https');
const fs = require('fs');

const file = process.env.DINGTALK_FILE;
const title = process.env.DINGTALK_TITLE || '';
const maxLines = parseInt(process.env.DINGTALK_MAX_LINES) || 60;
const secret = (process.env.DINGTALK_SECRET || '').trim();
let webhookUrl = (process.env.DINGTALK_URL || '').trim();

const raw = fs.readFileSync(file, 'utf8');
const text = raw.split('\n').slice(0, maxLines).join('\n');
console.log('[debug] file:', file, '| raw:', raw.length, 'chars | text:', text.length, 'chars');

if (secret) {
  const timestamp = String(Date.now());
  const stringToSign = timestamp + '\n' + secret;
  const hmac = crypto.createHmac('sha256', secret).update(stringToSign).digest('base64');
  const sign = encodeURIComponent(hmac);
  webhookUrl += '&timestamp=' + timestamp + '&sign=' + sign;
  console.log('[debug] signed, timestamp:', timestamp);
}

const body = JSON.stringify({ msgtype: 'markdown', markdown: { title, text } });
console.log('[debug] body length:', body.length);

const parsed = new URL(webhookUrl);
const req = https.request({
  hostname: parsed.hostname,
  path: parsed.pathname + parsed.search,
  method: 'POST',
  headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) }
}, (res) => {
  let data = '';
  res.on('data', (chunk) => data += chunk);
  res.on('end', () => {
    console.log('钉钉返回:', data);
    const r = JSON.parse(data);
    process.exit(r.errcode === 0 ? 0 : 1);
  });
});
req.on('error', (e) => { console.error('请求失败:', e.message); process.exit(1); });
req.write(body);
req.end();
NODESCRIPT
