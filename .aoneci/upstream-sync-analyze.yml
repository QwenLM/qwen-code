# .aoneci/upstream-sync-analyze.yml
# 每日分析 upstream (QwenLM/qwen-code) 的变更，生成 sync report 并通过钉钉通知
#
# 所需 CI 变量（在 Aone CI 平台配置）：
#   CI_DINGTALK_WEBHOOK_URL    - 钉钉机器人 webhook 地址（可选）
#   CI_DINGTALK_WEBHOOK_SECRET - 钉钉机器人加签密钥（可选）

name: Upstream Sync 每日分析

triggers:
  schedule:
    - cron: '0 9 * * 1-5' # 工作日每天 9:00 执行
  push:
    branches: ['trigger/upstream-analyze']

strategy:
  fast-fail: true

jobs:
  analyze:
    name: '分析 upstream 变更并通知'
    image: node:20
    timeout: 15m
    steps:
      - uses: 'checkout'

      - uses: 'setup-github-proxy'

      - name: 'Fetch upstream'
        run: |
          git remote add upstream https://github.com/QwenLM/qwen-code.git 2>/dev/null || true
          # CI 默认 shallow clone，需要 unshallow 才能让 merge-base 找到共同祖先。
          # 仅在仓库实际为 shallow 时执行，避免在普通仓库上 unshallow 报错被静默吞掉。
          if [ -f "$(git rev-parse --git-dir)/shallow" ]; then
            git fetch --unshallow origin || git fetch --deepen=2000 origin
          fi
          git fetch upstream main --tags
          echo "✅ upstream/main fetched: $(git rev-parse --short upstream/main)"

      - name: '运行分析脚本'
        run: |
          MERGE_BASE=$(git merge-base HEAD upstream/main)
          NEW_COMMITS=$(git log --oneline "$MERGE_BASE..upstream/main" --no-merges | wc -l | tr -d ' ')

          if [ "$NEW_COMMITS" -eq "0" ]; then
            echo "✅ 无新的 upstream 提交，已是最新状态。" | tee sync-report.md
          else
            echo "发现 $NEW_COMMITS 个新的 upstream 提交"
            UPSTREAM_REMOTE="upstream" UPSTREAM_BRANCH="main" \
              bash scripts/upstream-sync-analyze.sh > sync-report.md
          fi

          LATEST_TAG=$(git tag -l --sort=-v:refname 'v*' | head -1)
          LAST_SYNCED_TAG=$(cat .last-synced-upstream-tag 2>/dev/null || echo "none")
          if [ "$LATEST_TAG" != "$LAST_SYNCED_TAG" ] && [ -n "$LATEST_TAG" ]; then
            echo "" >> sync-report.md
            echo "## ⚠️ 新 Release 检测" >> sync-report.md
            echo "发现新 tag: **$LATEST_TAG**（上次同步: $LAST_SYNCED_TAG）" >> sync-report.md
          fi

          echo "--- 报告预览 ---"
          head -20 sync-report.md
          echo "--- 报告共 $(wc -l < sync-report.md) 行 ---"

      - name: '准备通知'
        id: notify
        run: |
          TITLE="qwen-code upstream sync"
          CONTENT="检查上游变更..."
          if [ -f sync-report.md ]; then
            FIRST=$(head -1 sync-report.md)
            if echo "$FIRST" | grep -q "无新的 upstream"; then
              TITLE="✅ Already Latest"
              CONTENT="没有新的 upstream 提交"
            else
              NEW_COUNT=$(echo "$FIRST" | grep -oP '\d+' | head -1 || echo "?")
              TITLE="📦 ${NEW_COUNT} new upstream commits"
              CONTENT="$FIRST"
            fi
          fi
          echo "$TITLE" > "${{outputs.title.path}}"
          echo "$CONTENT" > "${{outputs.content.path}}"

      - uses: dingtalk-bot
        inputs:
          webhook: ${{secrets['CI_DINGTALK_WEBHOOK_URL']}}
          msgtype: link
          title: ${{steps.notify.outputs.title}}
          content: ${{steps.notify.outputs.content}}
          messageUrl: https://gitlab.alibaba-inc.com/alishu/qwen-code
