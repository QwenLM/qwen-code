# Hard-rule tier overrides for the PR review preflight stage.
#
# After the preflight LLM emits its tier verdict, the workflow shell layer
# applies these rules. Rules can ONLY raise the tier floor, never lower it
# (P7 conservative principle). Final tier = max(LLM_verdict, all matching
# rule min_tiers, .qwen/review-rules.md tier-floor tokens).
#
# This file is a SAFETY NET. The preflight LLM is the primary blast-radius
# judge — these rules just guarantee that obviously high-risk paths can never
# be classified too low even if the LLM mis-judges.
#
# Path globs use POSIX glob semantics (matched via `git diff --name-only`
# against the PR's changed file list; '**' matches across directories).
# Keyword matches are case-insensitive whole-word matches against the
# unified diff body.
#
# Tier values: ULTRA_LIGHT | LIGHT | STANDARD | DEEP

rules:
  # ── STANDARD floor ───────────────────────────────────────────────────────

  - id: auth-related-paths
    description: >
      Any change under auth/credentials/secrets paths must get at least a
      structured P0-P3 review. STANDARD is enough for routine refactors;
      LLM verdict can still promote to DEEP for non-trivial logic changes.
    paths:
      - '**/auth/**'
      - '**/credentials/**'
      - '**/secrets/**'
      - '**/oauth/**'
    min_tier: STANDARD

  - id: ci-workflow-files
    description: >
      GitHub Actions workflows run with repo secrets; even small edits can
      shift the security boundary.
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
    min_tier: STANDARD

  - id: release-publish-paths
    description: >
      Release / publish / build scripts gate what gets shipped; broken paths
      here are user-visible regressions.
    paths:
      - 'scripts/release/**'
      - 'scripts/publish/**'
      - 'scripts/create-standalone-package.js'
      - 'scripts/prepare-package.js'

    min_tier: STANDARD

  # ── DEEP floor ───────────────────────────────────────────────────────────

  - id: schema-migration-paths
    description: >
      Schema / migration / data format changes are hard to roll back and
      benefit from full 9-agent review including reverse audit.
    paths:
      - '**/migrations/**'
      - '**/schema/**'
      - '**/*.sql'
    min_tier: DEEP

  - id: sandbox-and-policy-paths
    description: >
      Sandbox / tool-permission / approval-mode logic governs what the
      agent itself can do at runtime — security-critical.
    paths:
      - '**/sandbox/**'
      - '**/approval/**'
      - '**/tool-policy/**'
    min_tier: DEEP

  - id: high-risk-diff-keywords
    description: >
      Diff body contains credential / crypto keywords. Match is case-
      insensitive, whole-word; comment-only mentions in unrelated files
      will trigger this — that's the conservative bias.
    diff_contains_keywords:
      - token
      - secret
      - password
      - api_key
      - api-key
      - private_key
      - private-key
      - bearer
    min_tier: DEEP

  # ── Sanity guard ─────────────────────────────────────────────────────────

  - id: oversized-diff
    description: >
      Defense in depth. Size > 1500 lines is already rejected by the
      pre-existing size gate; this rule guarantees that anything still
      reaching preflight at > 500 lines gets DEEP regardless of the LLM
      verdict. Size alone never *lowers* a tier — see Tier 模型 §反例.
    changed_lines_gt: 500
    min_tier: DEEP
