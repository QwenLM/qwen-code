name: 'Dispatch SWE-bench Verified Benchmark'

on:
  release:
    types: ['published']
  workflow_dispatch:
    inputs:
      qwen_ref:
        description: 'Qwen Code tag or commit to benchmark.'
        required: true
        type: 'string'
      suite:
        description: 'Allowlisted benchmark suite.'
        required: true
        type: 'choice'
        default: 'swebench_verified_qwen_smoke'
        options:
          - 'swebench_verified_gold_smoke'
          - 'swebench_verified_qwen_smoke'

jobs:
  dispatch:
    name: 'Submit benchmark run'
    if: |-
      ${{ github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false }}
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Submit authenticated benchmark request'
        env:
          BENCHMARK_ENDPOINT: '${{ secrets.BENCHMARK_ENDPOINT }}'
          QWEN_REF: '${{ github.event.release.tag_name || inputs.qwen_ref }}'
          SUITE: "${{ inputs.suite || 'swebench_verified_qwen_smoke' }}"
          TRIGGER: '${{ github.event_name }}'
          RELEASE_ID: '${{ github.event.release.id }}'
        run: |-
          set -euo pipefail

          oidc_response="$(curl --fail-with-body --silent --show-error \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=qwen-benchmark")"
          id_token="$(jq -er '.value' <<<"${oidc_response}")"
          echo "::add-mask::${id_token}"

          payload="$(jq -n \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg qwen_ref "${QWEN_REF}" \
            --arg suite "${SUITE}" \
            --arg trigger "${TRIGGER}" \
            --arg release_id "${RELEASE_ID}" \
            --arg github_run_id "${GITHUB_RUN_ID}" \
            --arg github_run_attempt "${GITHUB_RUN_ATTEMPT}" \
            '{
              repository: $repository,
              qwen_ref: $qwen_ref,
              suite: $suite,
              trigger: (if $trigger == "workflow_dispatch" then "workflow_dispatch" else "release" end),
              release_id: (if $release_id == "" then null else ($release_id | tonumber) end),
              github_run_id: ($github_run_id | tonumber),
              github_run_attempt: ($github_run_attempt | tonumber)
            }')"

          curl --fail-with-body --silent --show-error \
            -X POST "${BENCHMARK_ENDPOINT}/api/v1/runs" \
            -H "Authorization: Bearer ${id_token}" \
            -H 'Content-Type: application/json' \
            -H "Idempotency-Key: ${GITHUB_REPOSITORY}:${GITHUB_RUN_ID}:${GITHUB_RUN_ATTEMPT}" \
            --data "${payload}" \
            | jq .
