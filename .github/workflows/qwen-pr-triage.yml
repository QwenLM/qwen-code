name: 'Qwen PR Triage Pipeline'

on:
  pull_request_target:
    types: ['opened', 'synchronize', 'reopened', 'ready_for_review', 'review_requested']
  issue_comment:
    types: ['created']
  pull_request_review_comment:
    types: ['created']
  pull_request_review:
    types: ['submitted']
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to triage'
        required: true
        type: 'number'
      skip_product_decision:
        description: 'Skip product-decision (run review only)'
        required: false
        default: false
        type: 'boolean'
      timeout_minutes:
        description: 'Review timeout in minutes (default 90)'
        required: false
        default: 90
        type: 'number'

permissions:
  contents: 'read'
  issues: 'write'
  pull-requests: 'write'

env:
  # jq program that renders qwen `--output-format stream-json` events into
  # readable one-line CI log progress (tool calls + narration + final result)
  # instead of raw JSON envelopes. Shared by the product-decision / review /
  # tmux-testing steps via `qwen ... | tee raw.jsonl | "${FMT_CMD[@]}"`, where
  # FMT_CMD is `jq --unbuffered -Rr "$STREAM_JSON_FMT"` (or `cat` if jq is
  # absent). Each input line is one JSON message; `fromjson?` skips non-JSON.
  STREAM_JSON_FMT: |-
    (fromjson?) as $m
    | try (
        if $m.type=="assistant" then ($m.message.content[]?
          | if .type=="text" and ((.text|length)>0) then "💬 " + (.text|gsub("\n";" ")|.[0:200])
            elif .type=="tool_use" then "▶ " + (.name // "tool") + "  " + ((.input//{})|tostring|.[0:160])
            else empty end)
        elif $m.type=="user" then (($m.message.content)
          | if type=="array" then (.[]? | select(.type=="tool_result")
              | "  ↳ " + (if .is_error then "ERROR " else "" end) + ((.content//""|tostring)|gsub("\n";" ")|.[0:140]))
            else empty end)
        elif $m.type=="result" then "■ " + ($m.subtype // "done") + (if $m.result then ": " + ($m.result|tostring|gsub("\n";" ")|.[0:300]) else "" end)
        else empty end
      ) catch empty

jobs:
  # ─── Ack: immediate "queued" feedback for explicit comment triggers ──
  # Restores the old qwen-code-pr-review.yml acknowledgement: when a
  # maintainer comments `@qwen-code /triage` or `/review`, reply right away
  # so they know the request was accepted (the pipeline itself may sit in
  # the debounce queue). Trigger validation (author association, body
  # prefix, PR open) lives once in resolve's `if`; this job just reacts to
  # its comment_trigger output — resolve runs in seconds, so the ack is
  # still effectively immediate.
  ack-request:
    needs: ['resolve']
    if: >-
      needs.resolve.outputs.should_run == 'true' &&
      needs.resolve.outputs.comment_trigger == 'true'
    concurrency:
      group: 'qwen-pr-triage-ack-${{ needs.resolve.outputs.pr_number }}'
      cancel-in-progress: false
    runs-on: 'ubuntu-latest'
    timeout-minutes: 5
    permissions:
      pull-requests: 'write'
      issues: 'write'
    steps:
      - name: 'Post queued acknowledgement'
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          PR_NUMBER: '${{ needs.resolve.outputs.pr_number }}'
          RUN_URL: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
        run: |-
          set -euo pipefail
          ACK_BODY="<!-- qwen-review-ack -->_Qwen triage request accepted. Queued in [workflow run](${RUN_URL})._"
          EXISTING_ACK_ID="$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --paginate \
              -F per_page=100 \
              | jq -sr '[.[][] | select(.body | contains("<!-- qwen-review-ack -->")) | select(.user.login == "github-actions[bot]")] | last | .id // empty'
          )" || EXISTING_ACK_ID=""
          if [ -n "$EXISTING_ACK_ID" ]; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${EXISTING_ACK_ID}" \
              -f body="$ACK_BODY" > /dev/null
          else
            gh pr comment "$PR_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --body "$ACK_BODY"
          fi

  # ─── Resolve PR number and determine trigger type ───────────────────
  resolve:
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      pull-requests: 'read'
    outputs:
      pr_number: '${{ steps.resolve.outputs.pr_number }}'
      trigger_type: '${{ steps.resolve.outputs.trigger_type }}'
      is_fork: '${{ steps.resolve.outputs.is_fork }}'
      should_run: '${{ steps.resolve.outputs.should_run }}'
      comment_trigger: '${{ steps.resolve.outputs.comment_trigger }}'
      review_environment: '${{ steps.resolve.outputs.review_environment }}'
      review_timeout: '${{ steps.resolve.outputs.review_timeout }}'
    if: >-
      github.repository == 'QwenLM/qwen-code' && (
        (github.event_name == 'pull_request_target' &&
         github.event.pull_request.draft == false &&
         (github.event.pull_request.author_association == 'OWNER' ||
          github.event.pull_request.author_association == 'MEMBER' ||
          github.event.pull_request.author_association == 'COLLABORATOR')) ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'issue_comment' &&
         github.event.issue.pull_request &&
         github.event.issue.state == 'open' &&
         (startsWith(github.event.comment.body, '@qwen-code /triage') ||
          startsWith(github.event.comment.body, '@qwen-code /review')) &&
         (github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR')) ||
        (github.event_name == 'pull_request_review_comment' &&
         github.event.pull_request.state == 'open' &&
         (startsWith(github.event.comment.body, '@qwen-code /triage') ||
          startsWith(github.event.comment.body, '@qwen-code /review')) &&
         (github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR')) ||
        (github.event_name == 'pull_request_review' &&
         github.event.pull_request.state == 'open' &&
         (startsWith(github.event.review.body, '@qwen-code /triage') ||
          startsWith(github.event.review.body, '@qwen-code /review')) &&
         (github.event.review.author_association == 'OWNER' ||
          github.event.review.author_association == 'MEMBER' ||
          github.event.review.author_association == 'COLLABORATOR'))
      )
    steps:
      - name: 'Resolve context'
        id: 'resolve'
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          EVENT_NAME: '${{ github.event_name }}'
          INPUT_PR_NUMBER: '${{ github.event.inputs.pr_number }}'
          INPUT_SKIP_PRODUCT: '${{ github.event.inputs.skip_product_decision }}'
          INPUT_TIMEOUT: '${{ github.event.inputs.timeout_minutes }}'
          PR_TARGET_NUMBER: '${{ github.event.pull_request.number }}'
          ISSUE_NUMBER: '${{ github.event.issue.number }}'
          COMMENT_BODY: '${{ github.event.comment.body }}'
          REVIEW_BODY: '${{ github.event.review.body }}'
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PR_NUMBER="$INPUT_PR_NUMBER"
            if [ "$INPUT_SKIP_PRODUCT" = "true" ]; then
              TRIGGER_TYPE="review_only"
            else
              TRIGGER_TYPE="full"
            fi
          elif [ "$EVENT_NAME" = "pull_request_target" ]; then
            PR_NUMBER="$PR_TARGET_NUMBER"
            TRIGGER_TYPE="full"
          elif [ "$EVENT_NAME" = "issue_comment" ]; then
            PR_NUMBER="$ISSUE_NUMBER"
            if [[ "$COMMENT_BODY" == @qwen-code\ /review* ]]; then
              TRIGGER_TYPE="review_only"
            else
              TRIGGER_TYPE="full"
            fi
          elif [ "$EVENT_NAME" = "pull_request_review_comment" ] || [ "$EVENT_NAME" = "pull_request_review" ]; then
            # Both events carry the PR number directly; the trigger text lives
            # in comment.body (review thread) or review.body (review summary).
            PR_NUMBER="$PR_TARGET_NUMBER"
            BODY="${COMMENT_BODY:-$REVIEW_BODY}"
            if [[ "$BODY" == @qwen-code\ /review* ]]; then
              TRIGGER_TYPE="review_only"
            else
              TRIGGER_TYPE="full"
            fi
          fi

          # Check if fork
          IS_FORK=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json isCrossRepository --jq '.isCrossRepository')

          # Auto-triggered PRs (opened/synchronize) get a 30-minute delay
          # via environment protection rule to debounce rapid pushes.
          # Manual triggers skip the delay.
          if [ "$TRIGGER_TYPE" = "full" ] && [ "$EVENT_NAME" = "pull_request_target" ]; then
            REVIEW_ENV="qwen-pr-review-delay"
          else
            REVIEW_ENV=""
          fi

          # Review timeout: workflow_dispatch may override (min 10, so the
          # inner qwen timeout of N-5 minutes stays sane); default 90.
          REVIEW_TIMEOUT=90
          if [ "$EVENT_NAME" = "workflow_dispatch" ] \
            && [[ "$INPUT_TIMEOUT" =~ ^[0-9]+$ ]] \
            && [ "$INPUT_TIMEOUT" -ge 10 ]; then
            REVIEW_TIMEOUT="$INPUT_TIMEOUT"
          fi

          # Comment-style triggers get an immediate ack reply (ack-request job).
          # Trigger validation already happened in this job's `if`.
          case "$EVENT_NAME" in
            issue_comment|pull_request_review_comment|pull_request_review)
              COMMENT_TRIGGER=true ;;
            *)
              COMMENT_TRIGGER=false ;;
          esac

          {
            echo "pr_number=$PR_NUMBER"
            echo "trigger_type=$TRIGGER_TYPE"
            echo "is_fork=$IS_FORK"
            echo "should_run=true"
            echo "comment_trigger=$COMMENT_TRIGGER"
            echo "review_environment=$REVIEW_ENV"
            echo "review_timeout=$REVIEW_TIMEOUT"
          } >> "$GITHUB_OUTPUT"

  # ─── Stage 1: Product Decision ─────────────────────────────────────
  product-decision:
    needs: ['resolve']
    if: >-
      needs.resolve.outputs.should_run == 'true' &&
      needs.resolve.outputs.trigger_type == 'full'
    timeout-minutes: 15
    concurrency:
      group: 'qwen-pr-triage-pipeline-${{ needs.resolve.outputs.pr_number }}'
      cancel-in-progress: true
    # Self-hosted: product-decision reads local Claude Code source on the
    # runner for product-direction reasoning (not available on GitHub-hosted).
    runs-on: ['self-hosted', 'linux', 'x64', 'ecs-qwen']
    outputs:
      verdict: '${{ steps.capture.outputs.verdict }}'
    steps:
      - name: 'Checkout repo'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2

      - name: 'Run product-decision'
        id: 'run'
        env:
          GH_TOKEN: '${{ secrets.QWEN_CODE_BOT_TOKEN || secrets.CI_BOT_PAT }}'
          # Same credentials as the review / tmux-testing stages — all three
          # run the local qwen CLI on the self-hosted runner.
          OPENAI_API_KEY: '${{ secrets.REVIEW_OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.REVIEW_OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
          PR_NUMBER: '${{ needs.resolve.outputs.pr_number }}'
          REPOSITORY: '${{ github.repository }}'
          # Local Claude Code checkout on the runner — the product-decision
          # skill reads CHANGELOG + source signals from here for product
          # direction reasoning. Empty if the runner var is unset (skill
          # falls back to fetching the remote CHANGELOG).
          CLAUDE_CODE_SRC: '${{ vars.CLAUDE_CODE_SRC_PATH }}'
          # runner.temp is emptied per job and is per runner instance, unlike
          # /tmp which persists across runs and is shared between runner
          # instances on the same host (stale or cross-PR verdicts).
          TRIAGE_RESULTS_DIR: '${{ runner.temp }}/triage-results'
        run: |
          set -euo pipefail

          if ! command -v qwen >/dev/null 2>&1; then
            echo "::error::qwen CLI not found on runner"
            exit 1
          fi

          MODEL_ARGS=()
          if [ -n "${OPENAI_MODEL:-}" ]; then
            MODEL_ARGS=(--model "$OPENAI_MODEL")
          fi

          # Readable log formatter; fall back to raw passthrough if jq is absent.
          FMT_CMD=(jq --unbuffered -Rr "$STREAM_JSON_FMT")
          command -v jq >/dev/null 2>&1 || FMT_CMD=(cat)

          set +e
          timeout --kill-after=10s 12m qwen \
            --auth-type openai \
            --approval-mode yolo \
            "${MODEL_ARGS[@]}" \
            --prompt "/product-decision ${PR_NUMBER} --repo ${REPOSITORY}" \
            --output-format stream-json \
            | tee "$RUNNER_TEMP/product-decision-raw.jsonl" \
            | "${FMT_CMD[@]}"
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "::warning::Product decision timed out after 12 minutes"
          elif [ "$EXIT_CODE" -ne 0 ]; then
            echo "::warning::Product decision exited with code $EXIT_CODE"
          fi
          # Propagate: this stage is a gate. Without this, a timed-out or
          # crashed run leaves the step green and the capture fallback would
          # default the verdict to "pass", silently waving the PR through.
          exit "$EXIT_CODE"

      - name: 'Read verdict from skill output'
        if: 'always()'
        id: 'capture'
        env:
          RUN_OUTCOME: '${{ steps.run.outcome }}'
          TRIAGE_RESULTS_DIR: '${{ runner.temp }}/triage-results'
        run: |
          VERDICT_FILE="$TRIAGE_RESULTS_DIR/product-decision.json"
          if [ -f "$VERDICT_FILE" ]; then
            VERDICT=$(jq -r '.verdict // "pass"' "$VERDICT_FILE")
          else
            if [ "$RUN_OUTCOME" = "success" ]; then
              VERDICT="pass"
            else
              VERDICT="fail"
            fi
          fi
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "::notice::Product decision verdict: $VERDICT"

  # ─── Stage 2: Code Review ───────────────────────────────────────────
  # Security: review reads PR diff via API (no code execution). Fork PRs
  # are safe here because settings_json restricts commands to gh/curl only.
  review:
    needs: ['resolve', 'product-decision']
    if: >-
      always() && (
        (needs.product-decision.result == 'success' &&
         needs.product-decision.outputs.verdict == 'pass') ||
        needs.resolve.outputs.trigger_type == 'review_only'
      )
    # Default 90; workflow_dispatch can override via the timeout_minutes input.
    timeout-minutes: '${{ fromJSON(needs.resolve.outputs.review_timeout) }}'
    # 30-minute wait timer (via environment protection rule) debounces
    # rapid consecutive pushes. Empty string = no environment = no delay.
    environment: '${{ needs.resolve.outputs.review_environment }}'
    concurrency:
      group: 'qwen-pr-triage-pipeline-${{ needs.resolve.outputs.pr_number }}'
      cancel-in-progress: true
    runs-on: ['self-hosted', 'linux', 'x64', 'ecs-qwen']
    permissions:
      contents: 'read'
      pull-requests: 'write'
      issues: 'write'
    outputs:
      verdict: '${{ steps.verdict.outputs.verdict }}'
    steps:
      # The debounce wait can take a while — the PR may have been closed,
      # merged, or converted to draft in the meantime. Re-check before
      # spending a runner slot on it (port of the old delay job's re-check).
      - name: 'Re-check PR state after debounce'
        id: 'pr_state'
        env:
          GH_TOKEN: '${{ secrets.CI_BOT_PAT }}'
          PR_NUMBER: '${{ needs.resolve.outputs.pr_number }}'
        run: |
          set -euo pipefail
          # api.github.com can be flaky from the ECS runners — retry with
          # backoff before giving up, so a transient blip doesn't kill a
          # review that already waited out the 30-minute debounce.
          pr_data=""
          for attempt in 1 2 3; do
            if pr_data="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json state,isDraft --jq '[.state, .isDraft] | @tsv')"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to read PR state after 3 attempts"
              exit 1
            fi
            echo "::warning::gh pr view failed (attempt ${attempt}/3), retrying..."
            sleep $((attempt * 15))
          done
          IFS=$'\t' read -r state is_draft <<< "$pr_data"
          if [ "$state" != "OPEN" ] || [ "$is_draft" = "true" ]; then
            echo "::notice::Skipping review: PR #${PR_NUMBER} state=${state} draft=${is_draft}."
            echo "should_review=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_review=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Checkout base branch'
        if: "steps.pr_state.outputs.should_review == 'true'"
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2
        with:
          ref: '${{ github.event.repository.default_branch }}'
          fetch-depth: 1

      - name: 'Run review'
        if: "steps.pr_state.outputs.should_review == 'true'"
        id: 'run'
        env:
          GH_TOKEN: '${{ secrets.CI_BOT_PAT }}'
          OPENAI_API_KEY: '${{ secrets.REVIEW_OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.REVIEW_OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
          PR_NUMBER: '${{ needs.resolve.outputs.pr_number }}'
          # CI optimizations: skip deterministic analysis (ci.yml already runs it),
          # limit reverse audit rounds, reduce timeout pressure
          QWEN_REVIEW_SKIP_DETERMINISTIC: '1'
          QWEN_REVIEW_MAX_REVERSE_ROUNDS: '1'
          REVIEW_TIMEOUT_MIN: '${{ needs.resolve.outputs.review_timeout }}'
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          REVIEW_URL="${GITHUB_SERVER_URL}/${REPO}/pull/${PR_NUMBER}"
          # Leave a 5-minute buffer under the job timeout for the
          # surrounding steps (checkout, verdict check).
          INNER_TIMEOUT_MIN=$((REVIEW_TIMEOUT_MIN - 5))

          if ! command -v qwen >/dev/null 2>&1; then
            echo "::error::qwen CLI not found on runner"
            exit 1
          fi

          MODEL_ARGS=()
          if [ -n "${OPENAI_MODEL:-}" ]; then
            MODEL_ARGS=(--model "$OPENAI_MODEL")
          fi

          # Readable log formatter; fall back to raw passthrough if jq is absent.
          FMT_CMD=(jq --unbuffered -Rr "$STREAM_JSON_FMT")
          command -v jq >/dev/null 2>&1 || FMT_CMD=(cat)

          set +e
          timeout --kill-after=10s "${INNER_TIMEOUT_MIN}m" qwen \
            --auth-type openai \
            --approval-mode yolo \
            "${MODEL_ARGS[@]}" \
            --prompt "/review ${REVIEW_URL} --comment" \
            --output-format stream-json \
            | tee "$RUNNER_TEMP/review-raw.jsonl" \
            | "${FMT_CMD[@]}"
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "::warning::Review timed out after ${INNER_TIMEOUT_MIN} minutes"
          elif [ "$EXIT_CODE" -ne 0 ]; then
            echo "::warning::Review exited with code $EXIT_CODE"
          fi
          # Propagate: a crashed or timed-out review must fail this job.
          # Otherwise the verdict step finds no CHANGES_REQUESTED review
          # (because none ran to completion) and defaults to "pass",
          # waving the PR through to tmux-testing and approval unreviewed.
          exit "$EXIT_CODE"

      - name: 'Check review verdict'
        id: 'verdict'
        env:
          GH_TOKEN: '${{ secrets.CI_BOT_PAT }}'
          PR_NUMBER: '${{ needs.resolve.outputs.pr_number }}'
          SHOULD_REVIEW: '${{ steps.pr_state.outputs.should_review }}'
        run: |
          if [ "$SHOULD_REVIEW" != "true" ]; then
            # PR was closed/merged/drafted during the debounce wait — the
            # review didn't run, so downstream stages must not act on it.
            echo "verdict=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if the bot's latest review requested changes. Derive the
          # bot login from the token actually used to post the review,
          # rather than hardcoding the account name — if the PAT is ever
          # rotated to a different account, a hardcoded login would silently
          # match nothing and this gate would always pass.
          BOT_LOGIN=$(gh api user --jq '.login' 2>/dev/null || echo "qwen-code-ci-bot")
          export BOT_LOGIN

          # Fail closed on network errors: "NONE" must mean "the bot posted
          # no review" (jq's else branch), never "the API call failed" — a
          # flaky connection from the ECS runner must not be mistaken for a
          # passing review. Retry, then fail the job so the fallback comment
          # fires instead of silently waving the PR through.
          REVIEW_STATE=""
          for attempt in 1 2 3; do
            if REVIEW_STATE=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
              --json latestReviews --jq '
                [.latestReviews[] | select(.author.login == env.BOT_LOGIN)] |
                if length > 0 then .[0].state else "NONE" end
              '); then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to read review state after 3 attempts"
              exit 1
            fi
            echo "::warning::gh pr view failed (attempt ${attempt}/3), retrying..."
            sleep $((attempt * 15))
          done

          if [ "$REVIEW_STATE" = "CHANGES_REQUESTED" ]; then
            echo "verdict=fail" >> "$GITHUB_OUTPUT"
            echo "::notice::Review requested changes — skipping tmux testing"
          else
            echo "verdict=pass" >> "$GITHUB_OUTPUT"
          fi

  # ─── Stage 2b: Tmux Testing (after review, internal PRs only) ───────
  # Runs AFTER review — no point testing if code has critical issues.
  tmux-testing:
    needs: ['resolve', 'product-decision', 'review']
    if: >-
      needs.review.result == 'success' &&
      needs.review.outputs.verdict == 'pass' &&
      needs.resolve.outputs.is_fork == 'false'
    timeout-minutes: 20
    concurrency:
      group: 'qwen-pr-triage-pipeline-${{ needs.resolve.outputs.pr_number }}'
      cancel-in-progress: true
    runs-on: ['self-hosted', 'linux', 'x64', 'ecs-qwen']
    # Minimal permissions — NO write access to repo/PRs
    permissions:
      contents: 'read'
    outputs:
      verdict: '${{ steps.run.outputs.verdict }}'
    steps:
      # Guard: the PR may have been merged or closed while review was running.
      # refs/pull/N/merge disappears when the PR is not open or has conflicts,
      # so check before attempting checkout.
      - name: 'Check PR state before testing'
        id: 'pr_state'
        env:
          GH_TOKEN: '${{ secrets.CI_BOT_PAT }}'
          PR_NUMBER: '${{ needs.resolve.outputs.pr_number }}'
        run: |
          set -euo pipefail
          pr_data="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json state,isDraft --jq '[.state, .isDraft] | @tsv')"
          IFS=$'\t' read -r state is_draft <<< "$pr_data"
          if [ "$state" != "OPEN" ] || [ "$is_draft" = "true" ]; then
            echo "::notice::Skipping tmux testing: PR #${PR_NUMBER} state=${state} draft=${is_draft}."
            echo "should_test=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_test=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Checkout PR code'
        if: "steps.pr_state.outputs.should_test == 'true'"
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2
        with:
          ref: 'refs/pull/${{ needs.resolve.outputs.pr_number }}/merge'
          fetch-depth: 1

      - name: 'Run tmux testing'
        if: "steps.pr_state.outputs.should_test == 'true'"
        id: 'run'
        env:
          OPENAI_API_KEY: '${{ secrets.REVIEW_OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.REVIEW_OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
          PR_NUMBER: '${{ needs.resolve.outputs.pr_number }}'
          REPOSITORY: '${{ github.repository }}'
        run: |
          set -euo pipefail

          if ! command -v qwen >/dev/null 2>&1; then
            echo "::error::qwen CLI not found on runner"
            exit 1
          fi

          MODEL_ARGS=()
          if [ -n "${OPENAI_MODEL:-}" ]; then
            MODEL_ARGS=(--model "$OPENAI_MODEL")
          fi

          FMT_CMD=(jq --unbuffered -Rr "$STREAM_JSON_FMT")
          command -v jq >/dev/null 2>&1 || FMT_CMD=(cat)

          mkdir -p "$RUNNER_TEMP/tmux-results"
          set +e
          timeout --kill-after=10s 15m qwen \
            --auth-type openai \
            --approval-mode yolo \
            "${MODEL_ARGS[@]}" \
            --prompt "/tmux-real-user-testing ${PR_NUMBER} --repo ${REPOSITORY}" \
            --output-format stream-json \
            | tee "$RUNNER_TEMP/tmux-results/output.jsonl" \
            | "${FMT_CMD[@]}"
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "::warning::Tmux testing timed out after 15 minutes"
            echo "verdict=timeout" >> "$GITHUB_OUTPUT"
          elif [ "$EXIT_CODE" -ne 0 ]; then
            echo "::warning::Tmux testing exited with code $EXIT_CODE"
            echo "verdict=fail" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=pass" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Upload tmux results'
        if: "always() && steps.pr_state.outputs.should_test == 'true'"
        uses: 'actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02' # v4.6.2
        with:
          name: 'tmux-testing-results-${{ needs.resolve.outputs.pr_number }}'
          path: '${{ runner.temp }}/tmux-results/'
          retention-days: 7

  # ─── Stage 3: Approval Decision ────────────────────────────────────
  approval-decision:
    needs: ['resolve', 'product-decision', 'review', 'tmux-testing']
    # Exactly one stage owns the formal review verdict on every path:
    #   - template fail      → product-decision posts request-changes, stop
    #   - needs_human        → product-decision posts escalation comment, stop
    #   - review fail        → /review posts CHANGES_REQUESTED, stop
    #   - review pass        → approval-decision posts the final verdict here
    # So this job only runs when product-decision passed (or was explicitly
    # skipped via a review_only trigger) AND review completed with verdict
    # pass — never alongside an upstream stage's request-changes.
    if: >-
      always() &&
      needs.resolve.outputs.should_run == 'true' &&
      ((needs.product-decision.result == 'success' &&
        needs.product-decision.outputs.verdict == 'pass') ||
       needs.resolve.outputs.trigger_type == 'review_only') &&
      needs.review.result == 'success' &&
      needs.review.outputs.verdict == 'pass' &&
      (needs.tmux-testing.result == 'success' || needs.tmux-testing.result == 'skipped')
    timeout-minutes: 10
    concurrency:
      group: 'qwen-pr-triage-pipeline-${{ needs.resolve.outputs.pr_number }}'
      cancel-in-progress: true
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout repo'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2

      - name: 'Download tmux artifact'
        if: "needs.tmux-testing.result == 'success'"
        uses: 'actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093' # v4.3.0
        with:
          name: 'tmux-testing-results-${{ needs.resolve.outputs.pr_number }}'
          path: '/tmp/tmux-results/'
        continue-on-error: true

      - name: 'Run approval-decision'
        id: 'run'
        # The qwen exit code is not the source of truth here — the verdict
        # file is (read in the next step). qwen exits non-zero when it hits
        # the session-turn limit even after posting the review and writing the
        # verdict, so let the job continue and let the verdict step arbitrate.
        continue-on-error: true
        uses: 'QwenLM/qwen-code-action@5fd6818d04d64e87d255ee4d5f77995e32fbf4c2'
        env:
          GITHUB_TOKEN: '${{ secrets.QWEN_CODE_BOT_TOKEN || secrets.CI_BOT_PAT }}'
          GH_TOKEN: '${{ secrets.QWEN_CODE_BOT_TOKEN || secrets.CI_BOT_PAT }}'
          REPOSITORY: '${{ github.repository }}'
          PR_NUMBER: '${{ needs.resolve.outputs.pr_number }}'
          PRODUCT_VERDICT: '${{ needs.product-decision.outputs.verdict }}'
          REVIEW_VERDICT: '${{ needs.review.outputs.verdict }}'
          TMUX_VERDICT: '${{ needs.tmux-testing.outputs.verdict }}'
        with:
          OPENAI_API_KEY: '${{ secrets.OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
          settings_json: |-
            {
              "coreTools": [
                "run_shell_command(gh pr view)",
                "run_shell_command(gh pr review)",
                "run_shell_command(gh api)",
                "run_shell_command(mkdir)",
                "run_shell_command(cat)",
                "read_file"
              ],
              "sandbox": false,
              "maxSessionTurns": 30
            }
          prompt: '/approval-decision ${{ needs.resolve.outputs.pr_number }} --repo ${{ github.repository }}'

      - name: 'Read verdict from skill output'
        if: 'always()'
        env:
          RUN_OUTCOME: '${{ steps.run.outcome }}'
        run: |
          # The verdict file is the source of truth, not the action's exit
          # code (see continue-on-error above). Succeed when the skill wrote a
          # verdict — even if qwen then exited non-zero on the turn limit;
          # fail only when no verdict was produced, so fallback-comment fires.
          VERDICT_FILE="/tmp/triage-results/approval-decision.json"
          if [ -f "$VERDICT_FILE" ]; then
            VERDICT=$(jq -r '.verdict // "approve"' "$VERDICT_FILE")
            echo "::notice::Approval decision verdict: $VERDICT"
            if [ "$RUN_OUTCOME" != "success" ]; then
              echo "::warning::approval-decision action exited non-zero (likely the session-turn limit) but the verdict file is present — treating the stage as complete."
            fi
          else
            echo "::error::Approval skill wrote no verdict file (action outcome: ${RUN_OUTCOME}); failing the stage so fallback-comment runs."
            exit 1
          fi

  # ─── Fallback: post comment if pipeline fails unexpectedly ─────────
  fallback-comment:
    needs: ['resolve', 'product-decision', 'review', 'approval-decision']
    if: >-
      failure() &&
      needs.resolve.outputs.pr_number != ''
    runs-on: 'ubuntu-latest'
    permissions:
      pull-requests: 'write'
    steps:
      - name: 'Post failure notice'
        env:
          GH_TOKEN: '${{ secrets.QWEN_CODE_BOT_TOKEN || secrets.CI_BOT_PAT }}'
          PR_NUMBER: '${{ needs.resolve.outputs.pr_number }}'
          RUN_URL: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "_Qwen triage pipeline did not complete successfully. See [workflow logs]($RUN_URL)._"
