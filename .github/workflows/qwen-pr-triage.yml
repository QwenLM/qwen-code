name: 'Qwen PR Triage Pipeline'

on:
  pull_request_target:
    types: ['opened', 'synchronize', 'reopened', 'ready_for_review', 'review_requested']
  issue_comment:
    types: ['created']
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to triage'
        required: true
        type: 'number'
      skip_product_decision:
        description: 'Skip product-decision (run review only)'
        required: false
        default: false
        type: 'boolean'

permissions:
  contents: 'read'
  issues: 'write'
  pull-requests: 'write'

jobs:
  # ─── Resolve PR number and determine trigger type ───────────────────
  resolve:
    runs-on: 'ubuntu-latest'
    outputs:
      pr_number: '${{ steps.resolve.outputs.pr_number }}'
      trigger_type: '${{ steps.resolve.outputs.trigger_type }}'
      is_fork: '${{ steps.resolve.outputs.is_fork }}'
      should_run: '${{ steps.resolve.outputs.should_run }}'
      review_environment: '${{ steps.resolve.outputs.review_environment }}'
    if: >-
      github.repository == 'QwenLM/qwen-code' && (
        (github.event_name == 'pull_request_target' &&
         github.event.pull_request.draft == false) ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'issue_comment' &&
         github.event.issue.pull_request &&
         (startsWith(github.event.comment.body, '@qwen-code /triage') ||
          startsWith(github.event.comment.body, '@qwen-code /review')) &&
         (github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'))
      )
    steps:
      - name: 'Resolve context'
        id: 'resolve'
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          EVENT_NAME: '${{ github.event_name }}'
          INPUT_PR_NUMBER: '${{ github.event.inputs.pr_number }}'
          INPUT_SKIP_PRODUCT: '${{ github.event.inputs.skip_product_decision }}'
          PR_TARGET_NUMBER: '${{ github.event.pull_request.number }}'
          ISSUE_NUMBER: '${{ github.event.issue.number }}'
          COMMENT_BODY: '${{ github.event.comment.body }}'
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PR_NUMBER="$INPUT_PR_NUMBER"
            if [ "$INPUT_SKIP_PRODUCT" = "true" ]; then
              TRIGGER_TYPE="review_only"
            else
              TRIGGER_TYPE="full"
            fi
          elif [ "$EVENT_NAME" = "pull_request_target" ]; then
            PR_NUMBER="$PR_TARGET_NUMBER"
            TRIGGER_TYPE="full"
          elif [ "$EVENT_NAME" = "issue_comment" ]; then
            PR_NUMBER="$ISSUE_NUMBER"
            if [[ "$COMMENT_BODY" == @qwen-code\ /review* ]]; then
              TRIGGER_TYPE="review_only"
            else
              TRIGGER_TYPE="full"
            fi
          fi

          # Check if fork
          IS_FORK=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json isCrossRepository --jq '.isCrossRepository')

          # Auto-triggered PRs (opened/synchronize) get a 10-minute delay
          # via environment protection rule to debounce rapid pushes.
          # Manual triggers skip the delay.
          if [ "$TRIGGER_TYPE" = "full" ] && [ "$EVENT_NAME" = "pull_request_target" ]; then
            REVIEW_ENV="qwen-pr-review-delay"
          else
            REVIEW_ENV=""
          fi

          {
            echo "pr_number=$PR_NUMBER"
            echo "trigger_type=$TRIGGER_TYPE"
            echo "is_fork=$IS_FORK"
            echo "should_run=true"
            echo "review_environment=$REVIEW_ENV"
          } >> "$GITHUB_OUTPUT"

  # ─── Stage 1: Product Decision ─────────────────────────────────────
  product-decision:
    needs: ['resolve']
    if: >-
      needs.resolve.outputs.should_run == 'true' &&
      needs.resolve.outputs.trigger_type == 'full'
    timeout-minutes: 15
    concurrency:
      group: 'qwen-pr-triage-product-${{ needs.resolve.outputs.pr_number }}'
      cancel-in-progress: true
    runs-on: 'ubuntu-latest'
    outputs:
      verdict: '${{ steps.capture.outputs.verdict }}'
    steps:
      - name: 'Checkout repo'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2

      - name: 'Run product-decision'
        id: 'run'
        uses: 'QwenLM/qwen-code-action@5fd6818d04d64e87d255ee4d5f77995e32fbf4c2'
        env:
          GITHUB_TOKEN: '${{ secrets.QWEN_CODE_BOT_TOKEN || secrets.CI_BOT_PAT }}'
          GH_TOKEN: '${{ secrets.QWEN_CODE_BOT_TOKEN || secrets.CI_BOT_PAT }}'
          REPOSITORY: '${{ github.repository }}'
          PR_NUMBER: '${{ needs.resolve.outputs.pr_number }}'
        with:
          OPENAI_API_KEY: '${{ secrets.OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
          settings_json: |-
            {
              "coreTools": [
                "run_shell_command(gh pr view)",
                "run_shell_command(gh pr diff)",
                "run_shell_command(gh api)",
                "run_shell_command(gh label list)",
                "run_shell_command(curl)",
                "run_shell_command(mkdir)",
                "run_shell_command(cat)",
                "read_file",
                "grep_search",
                "glob"
              ],
              "sandbox": false,
              "maxSessionTurns": 25
            }
          prompt: '/product-decision ${{ needs.resolve.outputs.pr_number }} --repo ${{ github.repository }}'

      - name: 'Read verdict from skill output'
        if: always()
        id: 'capture'
        env:
          RUN_OUTCOME: '${{ steps.run.outcome }}'
        run: |
          VERDICT_FILE="/tmp/triage-results/product-decision.json"
          if [ -f "$VERDICT_FILE" ]; then
            VERDICT=$(jq -r '.verdict // "pass"' "$VERDICT_FILE")
          else
            if [ "$RUN_OUTCOME" = "success" ]; then
              VERDICT="pass"
            else
              VERDICT="fail"
            fi
          fi
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "::notice::Product decision verdict: $VERDICT"

  # ─── Stage 2: Code Review ───────────────────────────────────────────
  # Security: review reads PR diff via API (no code execution). Fork PRs
  # are safe here because settings_json restricts commands to gh/curl only.
  review:
    needs: ['resolve', 'product-decision']
    if: >-
      always() && (
        (needs.product-decision.result == 'success' &&
         needs.product-decision.outputs.verdict == 'pass') ||
        needs.resolve.outputs.trigger_type == 'review_only'
      )
    timeout-minutes: 45
    # 10-minute wait timer (via environment protection rule) debounces
    # rapid consecutive pushes. Empty string = no environment = no delay.
    environment: '${{ needs.resolve.outputs.review_environment }}'
    concurrency:
      group: 'qwen-pr-triage-review-${{ needs.resolve.outputs.pr_number }}'
      cancel-in-progress: true
    runs-on: ['self-hosted', 'linux', 'x64', 'ecs-qwen']
    permissions:
      contents: 'read'
      pull-requests: 'write'
      issues: 'write'
    outputs:
      verdict: '${{ steps.verdict.outputs.verdict }}'
    steps:
      - name: 'Checkout base branch'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2
        with:
          ref: '${{ github.event.repository.default_branch }}'
          fetch-depth: 0

      # Cache node_modules to avoid repeated npm ci (biggest time sink)
      - name: 'Cache node_modules'
        uses: 'actions/cache@5a3ec84eff668545956fd18022155c47e93e2684' # v4.2.3
        with:
          path: 'node_modules'
          key: "review-deps-${{ hashFiles('package-lock.json') }}"
          restore-keys: 'review-deps-'

      - name: 'Run review'
        id: 'run'
        env:
          GH_TOKEN: '${{ secrets.CI_BOT_PAT }}'
          OPENAI_API_KEY: '${{ secrets.REVIEW_OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.REVIEW_OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
          PR_NUMBER: '${{ needs.resolve.outputs.pr_number }}'
          # CI optimizations: skip deterministic analysis (ci.yml already runs it),
          # limit reverse audit rounds, reduce timeout pressure
          QWEN_REVIEW_SKIP_DETERMINISTIC: '1'
          QWEN_REVIEW_MAX_REVERSE_ROUNDS: '1'
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY}"
          REVIEW_URL="${GITHUB_SERVER_URL}/${REPO}/pull/${PR_NUMBER}"

          if ! command -v qwen >/dev/null 2>&1; then
            echo "::error::qwen CLI not found on runner"
            exit 1
          fi

          MODEL_ARGS=()
          if [ -n "${OPENAI_MODEL:-}" ]; then
            MODEL_ARGS=(--model "$OPENAI_MODEL")
          fi

          set +e
          timeout --kill-after=10s 35m qwen \
            --auth-type openai \
            --approval-mode yolo \
            "${MODEL_ARGS[@]}" \
            --prompt "/review ${REVIEW_URL} --comment" \
            --output-format stream-json
          EXIT_CODE=$?
          set -e

          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "::warning::Review timed out after 35 minutes"
          elif [ "$EXIT_CODE" -ne 0 ]; then
            echo "::warning::Review exited with code $EXIT_CODE"
          fi

      - name: 'Check review verdict'
        id: 'verdict'
        env:
          GH_TOKEN: '${{ secrets.CI_BOT_PAT }}'
          PR_NUMBER: '${{ needs.resolve.outputs.pr_number }}'
        run: |
          # Check if the bot's latest review requested changes
          REVIEW_STATE=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --json latestReviews --jq '
              [.latestReviews[] | select(.author.login == "qwen-code-ci-bot")] |
              if length > 0 then .[0].state else "NONE" end
            ' 2>/dev/null || echo "NONE")

          if [ "$REVIEW_STATE" = "CHANGES_REQUESTED" ]; then
            echo "verdict=fail" >> "$GITHUB_OUTPUT"
            echo "::notice::Review requested changes — skipping tmux testing"
          else
            echo "verdict=pass" >> "$GITHUB_OUTPUT"
          fi

  # ─── Stage 2b: Tmux Testing (after review, internal PRs only) ───────
  # Runs AFTER review — no point testing if code has critical issues.
  tmux-testing:
    needs: ['resolve', 'product-decision', 'review']
    if: >-
      needs.review.result == 'success' &&
      needs.review.outputs.verdict == 'pass' &&
      needs.resolve.outputs.is_fork == 'false'
    timeout-minutes: 20
    concurrency:
      group: 'qwen-pr-triage-tmux-${{ needs.resolve.outputs.pr_number }}'
      cancel-in-progress: true
    runs-on: ['self-hosted', 'linux', 'x64', 'ecs-qwen']
    # Minimal permissions — NO write access to repo/PRs
    permissions:
      contents: 'read'
    outputs:
      verdict: '${{ steps.run.outputs.verdict }}'
    steps:
      - name: 'Checkout PR code'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2
        with:
          ref: 'refs/pull/${{ needs.resolve.outputs.pr_number }}/merge'
          fetch-depth: 1

      - name: 'Run tmux testing'
        id: 'run'
        env:
          OPENAI_API_KEY: '${{ secrets.REVIEW_OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.REVIEW_OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
          PR_NUMBER: '${{ needs.resolve.outputs.pr_number }}'
          REPOSITORY: '${{ github.repository }}'
        run: |
          set -euo pipefail

          if ! command -v qwen >/dev/null 2>&1; then
            echo "::error::qwen CLI not found on runner"
            exit 1
          fi

          MODEL_ARGS=()
          if [ -n "${OPENAI_MODEL:-}" ]; then
            MODEL_ARGS=(--model "$OPENAI_MODEL")
          fi

          # Run tmux testing — output goes to a file for artifact upload
          mkdir -p /tmp/tmux-results
          set +e
          timeout --kill-after=10s 15m qwen \
            --auth-type openai \
            --approval-mode yolo \
            "${MODEL_ARGS[@]}" \
            --prompt "/tmux-real-user-testing ${PR_NUMBER} --repo ${REPOSITORY}" \
            --output-format stream-json \
            | tee /tmp/tmux-results/output.jsonl
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "::warning::Tmux testing timed out after 15 minutes"
          elif [ "$EXIT_CODE" -ne 0 ]; then
            echo "::warning::Tmux testing exited with code $EXIT_CODE"
          fi
          echo "verdict=pass" >> "$GITHUB_OUTPUT"

      - name: 'Upload tmux results'
        if: always()
        uses: 'actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02' # v4.6.2
        with:
          name: 'tmux-testing-results-${{ needs.resolve.outputs.pr_number }}'
          path: '/tmp/tmux-results/'
          retention-days: 7

  # ─── Stage 3: Approval Decision ────────────────────────────────────
  approval-decision:
    needs: ['resolve', 'product-decision', 'review', 'tmux-testing']
    if: >-
      always() &&
      needs.resolve.outputs.should_run == 'true' &&
      (needs.product-decision.result == 'success' ||
       needs.resolve.outputs.trigger_type == 'review_only') &&
      (needs.review.result == 'success' || needs.review.result == 'skipped') &&
      (needs.tmux-testing.result == 'success' || needs.tmux-testing.result == 'skipped')
    timeout-minutes: 10
    concurrency:
      group: 'qwen-pr-triage-approval-${{ needs.resolve.outputs.pr_number }}'
      cancel-in-progress: true
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout repo'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2

      - name: 'Download tmux artifact'
        if: needs.tmux-testing.result == 'success'
        uses: 'actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093' # v4.3.0
        with:
          name: 'tmux-testing-results-${{ needs.resolve.outputs.pr_number }}'
          path: '/tmp/tmux-results/'
        continue-on-error: true

      - name: 'Run approval-decision'
        id: 'run'
        uses: 'QwenLM/qwen-code-action@5fd6818d04d64e87d255ee4d5f77995e32fbf4c2'
        env:
          GITHUB_TOKEN: '${{ secrets.QWEN_CODE_BOT_TOKEN || secrets.CI_BOT_PAT }}'
          GH_TOKEN: '${{ secrets.QWEN_CODE_BOT_TOKEN || secrets.CI_BOT_PAT }}'
          REPOSITORY: '${{ github.repository }}'
          PR_NUMBER: '${{ needs.resolve.outputs.pr_number }}'
          PRODUCT_VERDICT: '${{ needs.product-decision.outputs.verdict }}'
          REVIEW_VERDICT: '${{ needs.review.outputs.verdict }}'
          TMUX_VERDICT: '${{ needs.tmux-testing.outputs.verdict }}'
        with:
          OPENAI_API_KEY: '${{ secrets.OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
          settings_json: |-
            {
              "coreTools": [
                "run_shell_command(gh pr view)",
                "run_shell_command(gh pr review)",
                "run_shell_command(gh api)",
                "run_shell_command(mkdir)",
                "run_shell_command(cat)",
                "read_file"
              ],
              "sandbox": false,
              "maxSessionTurns": 15
            }
          prompt: '/approval-decision ${{ needs.resolve.outputs.pr_number }} --repo ${{ github.repository }}'

      - name: 'Read verdict from skill output'
        if: always()
        run: |
          VERDICT_FILE="/tmp/triage-results/approval-decision.json"
          if [ -f "$VERDICT_FILE" ]; then
            VERDICT=$(jq -r '.verdict // "approve"' "$VERDICT_FILE")
            echo "::notice::Approval decision verdict: $VERDICT"
          else
            echo "::warning::Approval skill did not write verdict file"
          fi

  # ─── Fallback: post comment if pipeline fails unexpectedly ─────────
  fallback-comment:
    needs: ['resolve', 'product-decision', 'review', 'approval-decision']
    if: >-
      failure() &&
      needs.resolve.outputs.pr_number != ''
    runs-on: 'ubuntu-latest'
    permissions:
      pull-requests: 'write'
    steps:
      - name: 'Post failure notice'
        env:
          GH_TOKEN: '${{ secrets.QWEN_CODE_BOT_TOKEN || secrets.CI_BOT_PAT }}'
          PR_NUMBER: '${{ needs.resolve.outputs.pr_number }}'
          RUN_URL: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "_Qwen triage pipeline did not complete successfully. See [workflow logs]($RUN_URL)._"
