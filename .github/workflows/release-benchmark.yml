name: 'Release Benchmarks'

on:
  push:
    branches: ['dragon/release-benchmark']
  release:
    types: ['published']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing stable release tag to evaluate (for example, v0.19.11).'
        required: true
        type: 'string'
      suite:
        description: 'Versioned benchmark suite configured on the evaluation server.'
        required: true
        default: 'release-smoke-v1'
        type: 'string'

concurrency:
  group: 'release-benchmark-${{ github.event.release.tag_name || inputs.tag }}'
  cancel-in-progress: false

defaults:
  run:
    shell: 'bash'

jobs:
  dispatch:
    name: 'Dispatch Release Benchmark'
    if: |-
      ${{
        github.repository == 'QwenLM/qwen-code' &&
        (
          (
            github.event_name == 'push' &&
            github.ref == 'refs/heads/dragon/release-benchmark'
          ) ||
          (
            github.event_name == 'workflow_dispatch' &&
            github.ref == 'refs/heads/main'
          ) ||
          (
            github.event_name == 'release' &&
            vars.RELEASE_BENCHMARK_ENABLED == 'true' &&
            github.event.release.prerelease == false
          )
        )
      }}
    runs-on: 'ubuntu-latest'
    timeout-minutes: 5
    environment:
      name: 'release-benchmark'
    permissions:
      contents: 'read'
      id-token: 'write'
    env:
      API_URL: '${{ vars.RELEASE_BENCHMARK_API_URL }}'
      GH_TOKEN: '${{ github.token }}'
      OIDC_AUDIENCE: "${{ vars.RELEASE_BENCHMARK_OIDC_AUDIENCE || 'qwen-release-benchmark' }}"
      RELEASE_TAG: "${{ github.event.release.tag_name || inputs.tag || (github.event_name == 'push' && 'v0.19.11') }}"
      REQUESTED_SUITE: "${{ inputs.suite || (github.event_name == 'push' && 'release-smoke-v1') || vars.RELEASE_BENCHMARK_SUITE || 'release-full-v1' }}"

    steps:
      - name: 'Resolve stable release'
        id: 'release'
        run: |-
          set -euo pipefail

          if [[ ! "${API_URL}" =~ ^https://[^[:space:]]+$ ]]; then
            echo '::error::RELEASE_BENCHMARK_API_URL must be a public HTTPS base URL.'
            exit 1
          fi
          if [[ -z "${OIDC_AUDIENCE}" ||
                "${OIDC_AUDIENCE}" == *$'\n'* ||
                "${OIDC_AUDIENCE}" == *$'\r'* ]]; then
            echo '::error::RELEASE_BENCHMARK_OIDC_AUDIENCE must be a non-empty single-line value.'
            exit 1
          fi
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::${RELEASE_TAG} is not a stable release tag."
            exit 1
          fi
          if [[ ! "${REQUESTED_SUITE}" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$ ]]; then
            echo '::error::suite must be 1-64 characters using letters, numbers, dot, underscore, or dash.'
            exit 1
          fi

          release_json="$(
            gh api \
              -H 'Accept: application/vnd.github+json' \
              "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}"
          )"
          if [[ "$(jq -r '.draft' <<<"${release_json}")" != 'false' ||
                "$(jq -r '.prerelease' <<<"${release_json}")" != 'false' ]]; then
            echo "::error::${RELEASE_TAG} is not a published stable release."
            exit 1
          fi

          release_url="$(jq -er '.html_url' <<<"${release_json}")"
          if [[ ! "${release_url}" =~ ^https://github\.com/QwenLM/qwen-code/releases/tag/ ]]; then
            echo '::error::GitHub returned an unexpected release URL.'
            exit 1
          fi

          commit_sha="$(
            gh api \
              -H 'Accept: application/vnd.github+json' \
              "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_TAG}" \
              --jq '.sha'
          )"
          if [[ ! "${commit_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo '::error::Could not resolve the release tag to a commit SHA.'
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          idempotency_key="${GITHUB_REPOSITORY}:${RELEASE_TAG}:${REQUESTED_SUITE}"
          endpoint="${API_URL%/}/v1/release-benchmarks"

          echo "commit_sha=${commit_sha}" >> "${GITHUB_OUTPUT}"
          echo "endpoint=${endpoint}" >> "${GITHUB_OUTPUT}"
          echo "idempotency_key=${idempotency_key}" >> "${GITHUB_OUTPUT}"
          echo "release_url=${release_url}" >> "${GITHUB_OUTPUT}"
          echo "suite=${REQUESTED_SUITE}" >> "${GITHUB_OUTPUT}"
          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: 'Dispatch benchmark'
        id: 'dispatch'
        env:
          COMMIT_SHA: '${{ steps.release.outputs.commit_sha }}'
          ENDPOINT: '${{ steps.release.outputs.endpoint }}'
          IDEMPOTENCY_KEY: '${{ steps.release.outputs.idempotency_key }}'
          RELEASE_URL: '${{ steps.release.outputs.release_url }}'
          SUITE: '${{ steps.release.outputs.suite }}'
          TAG: '${{ steps.release.outputs.tag }}'
          VERSION: '${{ steps.release.outputs.version }}'
        run: |-
          set -euo pipefail

          audience="$(jq -rn --arg value "${OIDC_AUDIENCE}" '$value | @uri')"
          oidc_response="$(
            curl \
              --silent \
              --show-error \
              --fail \
              --connect-timeout 15 \
              --max-time 30 \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${audience}"
          )"
          oidc_token="$(
            jq -er '.value | select(type == "string" and length > 0)' \
              <<<"${oidc_response}"
          )"

          actions_run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          payload_file="${RUNNER_TEMP}/release-benchmark-request.json"
          response_file="${RUNNER_TEMP}/release-benchmark-response.json"

          jq -n \
            --arg actor "${GITHUB_ACTOR}" \
            --arg actions_run_url "${actions_run_url}" \
            --arg commit_sha "${COMMIT_SHA}" \
            --arg event_name "${GITHUB_EVENT_NAME}" \
            --arg idempotency_key "${IDEMPOTENCY_KEY}" \
            --arg release_url "${RELEASE_URL}" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg suite "${SUITE}" \
            --arg tag "${TAG}" \
            --arg version "${VERSION}" \
            --arg workflow_ref "${GITHUB_WORKFLOW_REF}" \
            '{
              schema_version: 1,
              idempotency_key: $idempotency_key,
              release: {
                repository: $repository,
                tag: $tag,
                version: $version,
                url: $release_url,
                commit_sha: $commit_sha
              },
              suite: $suite,
              trigger: {
                event_name: $event_name,
                actor: $actor,
                run_id: $run_id,
                run_attempt: $run_attempt,
                workflow_ref: $workflow_ref
              },
              callback: {
                repository: $repository,
                commit_sha: $commit_sha,
                actions_run_url: $actions_run_url
              }
            }' > "${payload_file}"

          if ! http_code="$(
            curl \
              --silent \
              --show-error \
              --retry 3 \
              --retry-all-errors \
              --connect-timeout 15 \
              --max-time 60 \
              --output "${response_file}" \
              --write-out '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer ${oidc_token}" \
              -H 'Content-Type: application/json' \
              -H "Idempotency-Key: ${IDEMPOTENCY_KEY}" \
              --data-binary "@${payload_file}" \
              "${ENDPOINT}"
          )"; then
            echo '::error::Could not reach the release benchmark service.'
            exit 1
          fi
          if [[ ! "${http_code}" =~ ^2[0-9][0-9]$ ]]; then
            echo "::error::Release benchmark service returned HTTP ${http_code}."
            exit 1
          fi

          job_id="$(
            jq -er \
              '.job_id | select(type == "string" and test("^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$"))' \
              "${response_file}"
          )"
          state="$(
            jq -er \
              '.state | select(. == "queued" or . == "running" or . == "already_exists")' \
              "${response_file}"
          )"
          status_url="$(
            jq -er \
              '.status_url | select(type == "string" and test("^https://[A-Za-z0-9._~:/?#@!$&*+,;=%-]+$"))' \
              "${response_file}"
          )"

          echo "job_id=${job_id}" >> "${GITHUB_OUTPUT}"
          echo "state=${state}" >> "${GITHUB_OUTPUT}"
          echo "status_url=${status_url}" >> "${GITHUB_OUTPUT}"

      - name: 'Publish dispatch summary'
        env:
          JOB_ID: '${{ steps.dispatch.outputs.job_id }}'
          STATE: '${{ steps.dispatch.outputs.state }}'
          STATUS_URL: '${{ steps.dispatch.outputs.status_url }}'
          SUITE: '${{ steps.release.outputs.suite }}'
          TAG: '${{ steps.release.outputs.tag }}'
        run: |-
          {
            echo '## Release benchmark dispatched'
            echo
            echo '| Release | Suite | Job | State |'
            echo '| --- | --- | --- | --- |'
            echo "| ${TAG} | ${SUITE} | [${JOB_ID}](${STATUS_URL}) | ${STATE} |"
            echo
            echo 'The evaluation server will publish the final result through its public status page.'
          } >> "${GITHUB_STEP_SUMMARY}"
