name: 'Qwen Issue Follow-up Bot'

on:
  issues:
    types:
      - 'opened'
      - 'edited'
      - 'reopened'
  issue_comment:
    types:
      - 'created'
  push:
    branches:
      - 'codex/issue-followup-bot'
    paths:
      - '.github/workflows/qwen-issue-followup-bot.yml'
      - '.github/scripts/issue-followup-bot.mjs'
      - '.github/scripts/issue-followup-bot.test.mjs'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Optional issue number. Leave empty to run the scheduled candidate scan.'
        required: false
        type: 'string'
      dry_run:
        description: 'Print planned actions without modifying issues.'
        required: false
        default: true
        type: 'boolean'
      scheduled_limit:
        description: 'Maximum number of candidate issues to process during a scheduled scan. Each candidate may run one related-issue search.'
        required: false
        default: '10'
        type: 'string'

concurrency:
  group: '${{ github.workflow }}-${{ github.event.issue.number || github.event.inputs.issue_number || github.event_name }}'
  cancel-in-progress: false

defaults:
  run:
    shell: 'bash'

permissions:
  contents: 'read'
  issues: 'write'

env:
  BOT_GITHUB_TOKEN: '${{ secrets.QWEN_CODE_BOT_TOKEN || secrets.CI_BOT_PAT }}'

jobs:
  canary-smoke-test:
    timeout-minutes: 5
    if: |-
      ${{
        github.repository == 'QwenLM/qwen-code' &&
        github.event_name == 'push' &&
        github.ref == 'refs/heads/codex/issue-followup-bot'
      }}
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      issues: 'write'
    env:
      SMOKE_ISSUE_NUMBER: '3770'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Run canary issue follow-up'
        env:
          GITHUB_TOKEN: '${{ env.BOT_GITHUB_TOKEN }}'
          GITHUB_REPOSITORY: '${{ github.repository }}'
        run: |-
          set -euo pipefail

          if [[ -z "${GITHUB_TOKEN}" ]]; then
            echo '::error::QWEN_CODE_BOT_TOKEN or CI_BOT_PAT is required for canary write testing.'
            exit 1
          fi

          node .github/scripts/issue-followup-bot.mjs \
            --mode single \
            --issue "${SMOKE_ISSUE_NUMBER}"

      - name: 'Verify canary writes'
        env:
          GITHUB_TOKEN: '${{ env.BOT_GITHUB_TOKEN }}'
          GITHUB_REPOSITORY: '${{ github.repository }}'
        run: |-
          set -euo pipefail

          issue_json="$(gh issue view "${SMOKE_ISSUE_NUMBER}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json comments,labels,state)"

          echo "${issue_json}" | jq .

          if ! echo "${issue_json}" | jq -e '.state == "OPEN"' >/dev/null; then
            echo "::error::Expected canary issue #${SMOKE_ISSUE_NUMBER} to remain open."
            exit 1
          fi

          for label in \
            'type/bug' \
            'category/ui' \
            'status/need-information' \
            'status/waiting-for-feedback'
          do
            if ! echo "${issue_json}" | jq -e --arg label "${label}" \
              'any(.labels[].name; . == $label)' >/dev/null
            then
              echo "::error::Expected canary issue #${SMOKE_ISSUE_NUMBER} to have label ${label}."
              exit 1
            fi
          done

          if ! echo "${issue_json}" | jq -e \
            '.comments[] | select(.body | contains("<!-- qwen-issue-bot:needs-info -->")) | select(.author.login == "qwen-code-ci-bot")' >/dev/null
          then
            echo "::error::Expected canary issue #${SMOKE_ISSUE_NUMBER} to have a qwen-code-ci-bot needs-info comment."
            exit 1
          fi

  single-issue:
    timeout-minutes: 5
    if: |-
      ${{
        github.repository == 'QwenLM/qwen-code' &&
        (github.event_name == 'workflow_dispatch' || vars.QWEN_ISSUE_FOLLOWUP_BOT_ENABLED == 'true') &&
        (
          github.event_name == 'issues' ||
          github.event_name == 'issue_comment' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.issue_number != '')
        ) &&
        (github.event_name != 'issues' || github.event.issue.pull_request == null) &&
        (github.event_name != 'issue_comment' || (github.event.issue.pull_request == null && github.event.comment.user.type != 'Bot'))
      }}
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Run issue follow-up bot'
        env:
          GITHUB_TOKEN: '${{ env.BOT_GITHUB_TOKEN }}'
          GITHUB_REPOSITORY: '${{ github.repository }}'
          ISSUE_NUMBER: '${{ github.event.issue.number || github.event.inputs.issue_number }}'
          DRY_RUN: "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' && 'true' || 'false' }}"
        run: |-
          set -euo pipefail

          args=(--mode single --issue "${ISSUE_NUMBER}")
          if [[ "${DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi

          node .github/scripts/issue-followup-bot.mjs "${args[@]}"

  scheduled-candidates:
    timeout-minutes: 10
    if: |-
      ${{
        github.repository == 'QwenLM/qwen-code' &&
        (github.event_name == 'workflow_dispatch' || vars.QWEN_ISSUE_FOLLOWUP_BOT_ENABLED == 'true') &&
        (
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.issue_number == '')
        )
      }}
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Run scheduled candidate follow-up'
        env:
          GITHUB_TOKEN: '${{ env.BOT_GITHUB_TOKEN }}'
          GITHUB_REPOSITORY: '${{ github.repository }}'
          DRY_RUN: "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' && 'true' || 'false' }}"
          SCHEDULED_LIMIT: "${{ github.event.inputs.scheduled_limit || '10' }}"
        run: |-
          set -euo pipefail

          args=(--mode scheduled --limit "${SCHEDULED_LIMIT}")
          if [[ "${DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi

          node .github/scripts/issue-followup-bot.mjs "${args[@]}"
