name: 'Provision Test Runners'

on:
  workflow_dispatch:

permissions:
  contents: 'read'

jobs:
  node:
    name: 'Install Node.js 22.x (${{ matrix.runner }})'
    strategy:
      fail-fast: false
      matrix:
        runner: ['1', '2', '3']
    runs-on: ['self-hosted', 'linux', 'x64', 'ecs-qwen-test']
    steps:
      - name: 'Install Node.js 22.x system-wide'
        shell: 'bash'
        run: |-
          set -euo pipefail

          if command -v node >/dev/null 2>&1 && [[ "$(node -p 'process.versions.node.split(".")[0]')" == "22" ]]; then
            echo "Node $(node -v) / npm $(npm -v) is already installed."
            exit 0
          fi

          sudo -n true
          setup_script="${RUNNER_TEMP}/nodesource-setup.sh"
          curl --fail --silent --show-error --location --retry 5 \
            https://deb.nodesource.com/setup_22.x > "${setup_script}"
          sudo -E bash "${setup_script}"
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y nodejs

          command -v node
          command -v npm
          node -v
          npm -v
