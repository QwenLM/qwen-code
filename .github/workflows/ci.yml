# .github/workflows/ci.yml

name: 'Qwen Code CI'

on:
  push:
    branches:
      - 'main'
      - 'release/**'
  pull_request:
    branches:
      - 'main'
      - 'release/**'
  merge_group:
  workflow_dispatch:
    inputs:
      branch_ref:
        description: 'Branch to run on'
        required: true
        default: 'main'
        type: 'string'
      windows_runner_smoke:
        description: 'Run a smoke check on the self-hosted Windows runner'
        required: false
        default: false
        type: 'boolean'
      windows_runner_full_test:
        description: 'Run npm ci and npm run test:ci on the self-hosted Windows runner'
        required: false
        default: false
        type: 'boolean'

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref }}'
  cancel-in-progress: |-
    ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/') }}

permissions:
  checks: 'write'
  contents: 'read'
  statuses: 'write'

defaults:
  run:
    shell: 'bash'

env:
  ACTIONLINT_VERSION: '1.7.12'
  SHELLCHECK_VERSION: '0.11.0'
  YAMLLINT_VERSION: '1.35.1'

jobs:
  windows_runner_smoke:
    name: 'Windows Runner Smoke'
    if: "${{ github.event_name == 'workflow_dispatch' && inputs.windows_runner_smoke == true }}"
    runs-on: ['self-hosted', 'windows', 'x64', 'ecs-qwen']
    env:
      QWEN_CODE_LANG: 'en'
      LANG: 'en_US.UTF-8'
      LC_ALL: 'en_US.UTF-8'
    defaults:
      run:
        shell: 'powershell'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2
        with:
          ref: '${{ github.event.inputs.branch_ref || github.ref }}'
          fetch-depth: 1

      - name: 'Verify runner tools'
        run: |-
          $ErrorActionPreference = 'Stop'
          Write-Host "RUNNER_NAME=$env:RUNNER_NAME"
          Write-Host "RUNNER_OS=$env:RUNNER_OS"
          Write-Host "RUNNER_ARCH=$env:RUNNER_ARCH"
          Write-Host "RUNNER_TEMP=$env:RUNNER_TEMP"
          Write-Host "RUNNER_WORKSPACE=$env:RUNNER_WORKSPACE"

          where.exe git
          git --version
          where.exe node
          node --version
          where.exe npm
          npm --version
          where.exe qwen
          qwen --version

      - name: 'Verify runner environment'
        run: |-
          $ErrorActionPreference = 'Stop'
          & "$env:SystemRoot\System32\whoami.exe"
          & "$env:SystemRoot\System32\whoami.exe" /priv

          # Report machine size so we can tell whether the test suite has enough
          # headroom. The full suite previously OOM-crashed here; logical CPUs and
          # total commit (physical RAM + pagefile) drive how high VITEST_MAX_THREADS
          # can safely go.
          $computer = Get-CimInstance Win32_ComputerSystem
          $osInfo = Get-CimInstance Win32_OperatingSystem
          Write-Host ("LogicalProcessors={0}" -f $computer.NumberOfLogicalProcessors)
          Write-Host ("TotalPhysicalMemoryGB={0:N1}" -f ($computer.TotalPhysicalMemory / 1GB))
          Write-Host ("FreePhysicalMemoryGB={0:N1}" -f ($osInfo.FreePhysicalMemory / 1MB))
          Write-Host ("TotalCommitGB={0:N1}" -f ($osInfo.TotalVirtualMemorySize / 1MB))
          Write-Host ("FreeCommitGB={0:N1}" -f ($osInfo.FreeVirtualMemory / 1MB))

          if ($env:QWEN_CODE_LANG -ne 'en') {
            throw "Expected QWEN_CODE_LANG=en, got '$env:QWEN_CODE_LANG'"
          }

          $script = @'
          const fs = require('fs');
          const os = require('os');
          const path = require('path');
          const dir = fs.mkdtempSync(path.join(os.tmpdir(), 'qwen-symlink-check-'));
          const target = path.join(dir, 'target.txt');
          const link = path.join(dir, 'link.txt');
          fs.writeFileSync(target, 'ok');
          fs.symlinkSync(target, link, 'file');
          console.log('symlink ok:', fs.lstatSync(link).isSymbolicLink());
          console.log('dir:', dir);
          console.log('QWEN_CODE_LANG:', process.env.QWEN_CODE_LANG);
          '@
          node -e $script

      - name: 'Verify checkout'
        run: |-
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path package.json)) {
            throw 'package.json was not checked out'
          }
          git status --short

  windows_runner_full_test:
    name: 'Windows Runner Full Test'
    if: "${{ github.event_name == 'workflow_dispatch' && inputs.windows_runner_full_test == true }}"
    runs-on: ['self-hosted', 'windows', 'x64', 'ecs-qwen']
    env:
      QWEN_CODE_LANG: 'en'
      LANG: 'en_US.UTF-8'
      LC_ALL: 'en_US.UTF-8'
      # Cap vitest worker concurrency on this self-hosted runner. packages/core's
      # vitest config pins threads to min 8 / max 16, and the root `test:ci`
      # fans every workspace out `--parallel` with v8 coverage enabled. On a hosted
      # 16 GB runner that survives; on this box the combined footprint exhausts
      # memory and crashes the process ("Fatal process out of memory: Zone"),
      # killing the tinypool worker (ERR_IPC_CHANNEL_CLOSED) and failing the job.
      # vitest resolves VITEST_*_THREADS over the config's poolOptions.threads, so
      # these override core's pinned values without touching shared config.
      VITEST_MIN_THREADS: '1'
      VITEST_MAX_THREADS: '4'
    defaults:
      run:
        shell: 'powershell'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2
        with:
          ref: '${{ github.event.inputs.branch_ref || github.ref }}'
          fetch-depth: 1

      - name: 'Verify runner tools'
        run: |-
          $ErrorActionPreference = 'Stop'
          Write-Host "RUNNER_NAME=$env:RUNNER_NAME"
          Write-Host "RUNNER_OS=$env:RUNNER_OS"
          Write-Host "RUNNER_ARCH=$env:RUNNER_ARCH"
          Write-Host "RUNNER_TEMP=$env:RUNNER_TEMP"
          Write-Host "RUNNER_WORKSPACE=$env:RUNNER_WORKSPACE"

          where.exe git
          git --version
          where.exe node
          node --version
          where.exe npm
          npm --version
          where.exe qwen
          qwen --version

      - name: 'Verify runner environment'
        run: |-
          $ErrorActionPreference = 'Stop'
          & "$env:SystemRoot\System32\whoami.exe"
          & "$env:SystemRoot\System32\whoami.exe" /priv

          # Report machine size so we can tell whether the test suite has enough
          # headroom. The full suite previously OOM-crashed here; logical CPUs and
          # total commit (physical RAM + pagefile) drive how high VITEST_MAX_THREADS
          # can safely go.
          $computer = Get-CimInstance Win32_ComputerSystem
          $osInfo = Get-CimInstance Win32_OperatingSystem
          Write-Host ("LogicalProcessors={0}" -f $computer.NumberOfLogicalProcessors)
          Write-Host ("TotalPhysicalMemoryGB={0:N1}" -f ($computer.TotalPhysicalMemory / 1GB))
          Write-Host ("FreePhysicalMemoryGB={0:N1}" -f ($osInfo.FreePhysicalMemory / 1MB))
          Write-Host ("TotalCommitGB={0:N1}" -f ($osInfo.TotalVirtualMemorySize / 1MB))
          Write-Host ("FreeCommitGB={0:N1}" -f ($osInfo.FreeVirtualMemory / 1MB))

          if ($env:QWEN_CODE_LANG -ne 'en') {
            throw "Expected QWEN_CODE_LANG=en, got '$env:QWEN_CODE_LANG'"
          }

          $script = @'
          const fs = require('fs');
          const os = require('os');
          const path = require('path');
          const dir = fs.mkdtempSync(path.join(os.tmpdir(), 'qwen-symlink-check-'));
          const target = path.join(dir, 'target.txt');
          const link = path.join(dir, 'link.txt');
          fs.writeFileSync(target, 'ok');
          fs.symlinkSync(target, link, 'file');
          console.log('symlink ok:', fs.lstatSync(link).isSymbolicLink());
          console.log('dir:', dir);
          console.log('QWEN_CODE_LANG:', process.env.QWEN_CODE_LANG);
          '@
          node -e $script

      - name: 'Configure npm for rate limiting'
        run: |-
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retries 5
          npm config set fetch-timeout 300000

      - name: 'Install dependencies'
        run: |-
          npm ci --prefer-offline --no-audit --progress=false

      - name: 'Run tests and generate reports'
        env:
          NO_COLOR: true
        run: 'npm run test:ci'

  classify_pr:
    name: 'Classify PR'
    if: "${{ github.event_name == 'pull_request' }}"
    # Gate runs on ECS for in-repo PRs too, else a busy hosted pool delays it and blocks the ECS-bound jobs. The kill-switch is read here, so flipping it reverts everything to hosted.
    runs-on: "${{ (vars.MAINTAINER_ECS_RUNNER_DISABLED != 'true' && github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('[\"self-hosted\", \"linux\", \"x64\", \"ecs-qwen\"]') || fromJSON('[\"ubuntu-latest\"]') }}"
    continue-on-error: true
    outputs:
      skip_ci: '${{ steps.release_sync.outputs.skip_ci }}'
      ubuntu_runner: '${{ steps.pick_runner.outputs.ubuntu_runner }}'
    steps:
      - name: 'Detect release version-sync PR'
        id: 'release_sync'
        env:
          # Repository variables can override these defaults if release naming
          # or the CI bot account changes.
          HEAD_REPO: "${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || '' }}"
          HEAD_REF: "${{ github.event_name == 'pull_request' && github.head_ref || '' }}"
          PR_TITLE: "${{ github.event_name == 'pull_request' && github.event.pull_request.title || '' }}"
          RELEASE_SYNC_HEAD_PREFIX: "${{ vars.RELEASE_SYNC_HEAD_PREFIX || 'release/' }}"
          RELEASE_SYNC_TITLE_PREFIX: "${{ vars.RELEASE_SYNC_TITLE_PREFIX || 'chore(release):' }}"
          RELEASE_SYNC_ACTOR: "${{ vars.RELEASE_SYNC_ACTOR || 'qwen-code-ci-bot' }}"
        run: |-
          skip_ci=false
          repo_match=false
          actor_match=false
          head_match=false
          title_match=false
          [[ "${HEAD_REPO}" == "${GITHUB_REPOSITORY}" ]] && repo_match=true
          [[ "${GITHUB_ACTOR}" == "${RELEASE_SYNC_ACTOR}" ]] && actor_match=true
          [[ "${HEAD_REF}" == "${RELEASE_SYNC_HEAD_PREFIX}"* ]] && head_match=true
          [[ "${PR_TITLE}" == "${RELEASE_SYNC_TITLE_PREFIX}"* ]] && title_match=true

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" &&
                "${repo_match}" == "true" &&
                "${actor_match}" == "true" &&
                "${head_match}" == "true" &&
                "${title_match}" == "true" ]]; then
            skip_ci=true
            echo "Release sync PR detected: actor=${GITHUB_ACTOR}, head_ref=${HEAD_REF}, title=${PR_TITLE}"
          else
            echo "Not a release sync PR: event=${GITHUB_EVENT_NAME}, actor=${GITHUB_ACTOR}, expected_actor=${RELEASE_SYNC_ACTOR}, repo_match=${repo_match}, head_match=${head_match}, title_match=${title_match}"
          fi

          echo "skip_ci=${skip_ci}" >> "${GITHUB_OUTPUT}"
          echo "skip_ci=${skip_ci}"

      # In-repo PR (head branch in this repo => author has write access) runs the
      # Linux Test on ECS; forks stay hosted. Disable via repo var MAINTAINER_ECS_RUNNER_DISABLED=true.
      - name: 'Select Linux runner'
        id: 'pick_runner'
        env:
          SAME_REPO: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
          ECS_DISABLED: '${{ vars.MAINTAINER_ECS_RUNNER_DISABLED }}'
        run: |-
          ubuntu_runner='["ubuntu-latest"]'
          if [[ "${ECS_DISABLED}" != "true" && "${SAME_REPO}" == "true" ]]; then
            ubuntu_runner='["self-hosted", "linux", "x64", "ecs-qwen"]'
          fi
          echo "ubuntu_runner=${ubuntu_runner}" >> "${GITHUB_OUTPUT}"
          echo "Selected Linux runner: ${ubuntu_runner}"

  lint:
    name: 'Lint'
    needs: 'classify_pr'
    if: "${{ !cancelled() && needs.classify_pr.outputs.skip_ci != 'true' && !(github.event_name == 'workflow_dispatch' && (inputs.windows_runner_smoke == true || inputs.windows_runner_full_test == true)) }}"
    runs-on: "${{ fromJSON(needs.classify_pr.outputs.ubuntu_runner || '[\"ubuntu-latest\"]') }}"
    steps:
      # On PRs github.ref is the merge ref (refs/pull/N/merge), so the required
      # checks validate the merge result, not just the PR tip. GitHub builds that
      # ref asynchronously and it can briefly 404 right after a push, so on
      # failure we back off and retry the same ref once.
      - name: 'Checkout'
        id: 'checkout'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2
        continue-on-error: true
        with:
          ref: '${{ github.event.inputs.branch_ref || github.ref }}'
          fetch-depth: 0
      - name: 'Back off for the merge ref to build'
        if: "${{ steps.checkout.outcome == 'failure' }}"
        run: 'sleep 10'
      - name: 'Checkout (retry on transient ref lag)'
        if: "${{ steps.checkout.outcome == 'failure' }}"
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2
        with:
          ref: '${{ github.event.inputs.branch_ref || github.ref }}'
          fetch-depth: 0

      # Self-hosted reuses the machine's Node (nodejs.org unreachable via proxy); linters are pre-installed on PATH so scripts/lint.js skips downloading them.
      - name: 'Set up Node.js 22.x (hosted)'
        if: "${{ runner.environment == 'github-hosted' }}"
        uses: 'actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e' # v6.4.0
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: 'Use pre-installed Node.js (self-hosted)'
        if: "${{ runner.environment == 'self-hosted' }}"
        run: |-
          if ! command -v node >/dev/null 2>&1; then
            echo "::error::Node.js is not on PATH for this self-hosted runner. Provision Node 22.x or set MAINTAINER_ECS_RUNNER_DISABLED='true' to route PRs back to hosted runners."
            exit 1
          fi
          echo "Using pre-installed Node $(node -v) / npm $(npm -v)"
          if [[ "$(node -p 'process.versions.node.split(".")[0]')" != "22" ]]; then
            echo "::warning::Expected Node 22.x but found $(node -v); lint results may diverge from local development."
          fi

      - name: 'Install dependencies and run prepare'
        run: 'npm ci --prefer-offline --no-audit --progress=false'

      - name: 'Check lockfile'
        run: 'npm run check:lockfile'

      - name: 'Check desktop workspace isolation'
        run: 'npm run check:desktop-isolation'

      - name: 'Install linters'
        run: 'node scripts/lint.js --setup'

      - name: 'Run ESLint'
        run: 'node scripts/lint.js --eslint'

      - name: 'Run actionlint'
        run: 'node scripts/lint.js --actionlint'

      - name: 'Run shellcheck'
        run: 'node scripts/lint.js --shellcheck'

      - name: 'Run yamllint'
        run: 'node scripts/lint.js --yamllint'

      - name: 'Run Prettier'
        run: 'node scripts/lint.js --prettier'

      - name: 'Run sensitive keyword linter'
        run: 'node scripts/lint.js --sensitive-keywords'

      - name: 'Run i18n check'
        run: 'npm run check-i18n'

      - name: 'Generate settings schema'
        run: 'npm run generate:settings-schema'

      - name: 'Check settings schema is up-to-date'
        run: |
          if [[ -n $(git status --porcelain packages/vscode-ide-companion/schemas/settings.schema.json) ]]; then
            echo "❌ Error: settings.schema.json is out of date!"
            echo "   Please run: npm run generate:settings-schema"
            echo "   Then commit the updated schema file."
            git diff packages/vscode-ide-companion/schemas/settings.schema.json
            exit 1
          fi
          echo "✅ Settings schema is up-to-date"

  #
  # Test: Node
  #
  test:
    name: 'Test (${{ matrix.os }}, Node ${{ matrix.node-version }})'
    needs: 'classify_pr'
    # Stay running on release-sync PRs so the required Test contexts still
    # report; the per-step skip_ci guards below make them no-op (pass) there.
    if: "${{ !cancelled() && !(github.event_name == 'workflow_dispatch' && (inputs.windows_runner_smoke == true || inputs.windows_runner_full_test == true)) }}"
    runs-on: '${{ fromJSON(matrix.runner) }}'
    permissions:
      contents: 'read'
      checks: 'write'
      pull-requests: 'write'
    strategy:
      fail-fast: false # So we can see all test failures
      matrix:
        include:
          - os: 'macos-latest'
            runner: '["macos-latest"]'
            node-version: '22.x'
            upload-coverage: 'false'
          - os: 'ubuntu-latest'
            runner: "${{ needs.classify_pr.outputs.ubuntu_runner || '[\"ubuntu-latest\"]' }}"
            node-version: '22.x'
            upload-coverage: 'true'
          - os: 'windows-latest'
            runner: '["windows-2022"]'
            node-version: '22.x'
            upload-coverage: 'false'
    steps:
      # See the Lint job's checkout: merge ref on PRs, back off and retry once on transient lag.
      - name: 'Checkout'
        id: 'checkout'
        if: "${{ needs.classify_pr.outputs.skip_ci != 'true' }}"
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2
        continue-on-error: true
        with:
          ref: '${{ github.event.inputs.branch_ref || github.ref }}'
      - name: 'Back off for the merge ref to build'
        if: "${{ needs.classify_pr.outputs.skip_ci != 'true' && steps.checkout.outcome == 'failure' }}"
        run: 'sleep 10'
      - name: 'Checkout (retry on transient ref lag)'
        if: "${{ needs.classify_pr.outputs.skip_ci != 'true' && steps.checkout.outcome == 'failure' }}"
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2
        with:
          ref: '${{ github.event.inputs.branch_ref || github.ref }}'

      # Self-hosted can't reach nodejs.org reliably; reuse the machine's Node.
      - name: 'Set up Node.js ${{ matrix.node-version }} (hosted)'
        if: "${{ needs.classify_pr.outputs.skip_ci != 'true' && runner.environment == 'github-hosted' }}"
        uses: 'actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e' # v6.4.0
        with:
          node-version: '${{ matrix.node-version }}'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
          registry-url: 'https://registry.npmjs.org/'

      - name: 'Use pre-installed Node.js (self-hosted)'
        if: "${{ needs.classify_pr.outputs.skip_ci != 'true' && runner.environment == 'self-hosted' }}"
        run: |-
          if ! command -v node >/dev/null 2>&1; then
            echo "::error::Node.js is not on PATH for this self-hosted runner. Provision Node ${{ matrix.node-version }} or set the MAINTAINER_ECS_RUNNER_DISABLED repository variable to 'true' to route PRs back to hosted runners."
            exit 1
          fi
          echo "Using pre-installed Node $(node -v) / npm $(npm -v)"
          if [[ "$(node -p 'process.versions.node.split(".")[0]')" != "22" ]]; then
            echo "::warning::Expected Node 22.x but found $(node -v); tests will run against the runner's Node."
          fi

      - name: 'Configure npm for rate limiting'
        if: "${{ needs.classify_pr.outputs.skip_ci != 'true' }}"
        run: |-
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retries 5
          npm config set fetch-timeout 300000

      - name: 'Install dependencies'
        if: "${{ needs.classify_pr.outputs.skip_ci != 'true' }}"
        run: |-
          npm ci --prefer-offline --no-audit --progress=false

      - name: 'Run tests and generate reports'
        if: "${{ needs.classify_pr.outputs.skip_ci != 'true' }}"
        env:
          NO_COLOR: true
        run: 'npm run test:ci'

      - name: 'Publish Test Report (for non-forks)'
        if: |-
          ${{ always() && needs.classify_pr.outputs.skip_ci != 'true' && (github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: 'dorny/test-reporter@dc3a92680fcc15842eef52e8c4606ea7ce6bd3f3' # ratchet:dorny/test-reporter@v2
        with:
          name: 'Test Results (${{ matrix.os }}, Node ${{ matrix.node-version }})'
          path: 'packages/*/junit.xml'
          reporter: 'java-junit'
          fail-on-error: 'false'

      - name: 'Upload Test Results Artifact (for forks)'
        if: |-
          ${{ always() && needs.classify_pr.outputs.skip_ci != 'true' && (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository) }}
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a' # v7.0.1
        with:
          name: 'test-results-fork-${{ matrix.node-version }}-${{ matrix.os }}'
          path: 'packages/*/junit.xml'

      - name: 'Upload coverage reports'
        if: |-
          ${{ always() && needs.classify_pr.outputs.skip_ci != 'true' && matrix.upload-coverage == 'true' }}
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a' # v7.0.1
        with:
          name: 'coverage-reports-${{ matrix.node-version }}-${{ matrix.os }}'
          path: 'packages/*/coverage'

  post_coverage_comment:
    name: 'Post Coverage Comment'
    runs-on: 'ubuntu-latest'
    needs:
      - 'classify_pr'
      - 'test'
    # !cancelled() not always(): don't let a cancelled run hold the concurrency slot here.
    if: |-
      ${{
        !cancelled() &&
        needs.classify_pr.outputs.skip_ci != 'true' &&
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    continue-on-error: true
    permissions:
      contents: 'read' # For checkout
      pull-requests: 'write' # For commenting
    strategy:
      matrix:
        # Reduce noise by only posting the comment once
        os:
          - 'ubuntu-latest'
        node-version:
          - '22.x'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2

      - name: 'Download coverage reports artifact'
        uses: 'actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c' # v8.0.1
        with:
          name: 'coverage-reports-${{ matrix.node-version }}-${{ matrix.os }}'
          path: 'coverage_artifact' # Download to a specific directory

      - name: 'Post Coverage Comment using Composite Action'
        uses: './.github/actions/post-coverage-comment' # Path to the composite action directory
        with:
          cli_json_file: 'coverage_artifact/cli/coverage/coverage-summary.json'
          core_json_file: 'coverage_artifact/core/coverage/coverage-summary.json'
          cli_full_text_summary_file: 'coverage_artifact/cli/coverage/full-text-summary.txt'
          core_full_text_summary_file: 'coverage_artifact/core/coverage/full-text-summary.txt'
          node_version: '${{ matrix.node-version }}'
          os: '${{ matrix.os }}'
          github_token: '${{ secrets.GITHUB_TOKEN }}'

  codeql:
    name: 'CodeQL'
    needs: 'classify_pr'
    if: "${{ !cancelled() && needs.classify_pr.outputs.skip_ci != 'true' && !(github.event_name == 'workflow_dispatch' && (inputs.windows_runner_smoke == true || inputs.windows_runner_full_test == true)) }}"
    runs-on: 'ubuntu-latest'
    permissions:
      actions: 'read'
      contents: 'read'
      security-events: 'write'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2

      - name: 'Initialize CodeQL'
        uses: 'github/codeql-action/init@df559355d593797519d70b90fc8edd5db049e7a2' # ratchet:github/codeql-action/init@v3
        with:
          languages: 'javascript'

      - name: 'Perform CodeQL Analysis'
        uses: 'github/codeql-action/analyze@df559355d593797519d70b90fc8edd5db049e7a2' # ratchet:github/codeql-action/analyze@v3

  # Fast PR-safe integration coverage. This job intentionally runs only the
  # no-AK subset that uses local fakes or no model transport, so fork PRs get
  # daemon/SSE smoke coverage without repository secrets.
  integration_no_ak:
    name: 'Integration Tests (No-AK Smoke)'
    needs: 'classify_pr'
    if: "${{ !cancelled() && github.event_name == 'pull_request' && needs.classify_pr.outputs.skip_ci != 'true' }}"
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e' # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: 'Configure npm for rate limiting'
        run: |-
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retries 5
          npm config set fetch-timeout 300000

      - name: 'Install Dependencies'
        env:
          NPM_CONFIG_PREFER_OFFLINE: 'true'
        run: |-
          npm ci --no-audit --progress=false

      - name: 'Run no-AK integration smoke tests'
        run: |-
          npm run test:integration:no-ak:sandbox:none

  # Integration tests run only in the merge queue, not on every PR push.
  # They are the suite that previously ran *only* in the nightly Release
  # pipeline (`release.yml`), so regressions stayed hidden until release
  # time. Gating them on `merge_group` catches the failure before the PR
  # lands on `main`, while keeping the per-PR critical path fast. The
  # `merge_group` event runs in the base-repo context, so the same model
  # secrets used by the release jobs are available here.
  #
  # Until merge queue is enabled on `main` this job simply never triggers,
  # so adding it is a no-op for existing PR/push runs. Reuses the exact
  # `test:integration:cli:sandbox:none` script from `release.yml`.
  integration_cli:
    name: 'Integration Tests (CLI, No Sandbox)'
    if: "${{ github.event_name == 'merge_group' }}"
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
    env:
      OPENAI_API_KEY: '${{ secrets.OPENAI_API_KEY }}'
      OPENAI_BASE_URL: '${{ secrets.OPENAI_BASE_URL }}'
      OPENAI_MODEL: '${{ secrets.OPENAI_MODEL }}'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e' # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: 'Install Dependencies'
        env:
          NPM_CONFIG_PREFER_OFFLINE: 'true'
        run: |-
          npm ci --no-audit --progress=false

      - name: 'Run CLI Integration Tests'
        run: |-
          npm run test:integration:cli:sandbox:none
