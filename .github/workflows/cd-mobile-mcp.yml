name: 'CD: mobile-mcp'

on:
  push:
    tags: ['mobile-mcp-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix, e.g. 0.1.0)'
        required: true
      dry_run:
        description: 'Dry run (build only, no publish)'
        required: false
        type: 'boolean'
        default: true

jobs:
  build-and-publish:
    runs-on: 'ubuntu-latest'
    environment:
      name: 'production-release'
    permissions:
      contents: 'read'
    steps:
      - uses: 'actions/checkout@v4'

      - uses: 'actions/setup-node@v5'
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
          registry-url: 'https://registry.npmjs.org'
          scope: '@qwen-code'

      - name: 'Determine version'
        id: 'version'
        run: |
          if [[ "$GITHUB_REF" == refs/tags/mobile-mcp-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/mobile-mcp-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 'Install dependencies'
        working-directory: 'packages/mobile-mcp'
        run: 'npm ci --ignore-scripts'

      - name: 'Set version'
        working-directory: 'packages/mobile-mcp'
        run: 'npm version "${{ steps.version.outputs.version }}" --no-git-tag-version'

      - name: 'Build'
        working-directory: 'packages/mobile-mcp'
        run: 'npm run build'

      - name: 'Test'
        working-directory: 'packages/mobile-mcp'
        run: 'npx playwright test test/coord-norm.test.ts test/mobile-ui-dump.test.ts'

      - name: 'Publish'
        if: '${{ !inputs.dry_run }}'
        working-directory: 'packages/mobile-mcp'
        run: 'npm publish --access public'
        env:
          NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}'
