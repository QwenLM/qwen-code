name: 'Qwen Pull Request Review'

on:
  pull_request_target:
    types: ['opened', 'reopened', 'ready_for_review', 'synchronize']
  # 'edited' is intentional: a maintainer who typed a plain comment and
  # then edits it to add `@qwen-code /review` (or fixes a typo in the
  # command) should still trigger the review. The re-trigger surface is
  # bounded —
  # the job `if:` only fires for OWNER/MEMBER/COLLABORATOR authors, so a
  # stale-comment edit can at worst cost one maintainer-initiated re-run.
  issue_comment:
    types: ['created', 'edited']
  pull_request_review_comment:
    types: ['created']
  pull_request_review:
    types: ['submitted']
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: 'number'
      review_mode:
        description: 'Run without posting comments, or publish a PR summary comment'
        required: true
        default: 'dry-run'
        type: 'choice'
        options:
          - 'dry-run'
          - 'comment'
      tier_override:
        description: 'Force a specific tier and skip preflight triage'
        required: false
        default: 'auto'
        type: 'choice'
        options:
          - 'auto'
          - 'ultra_light'
          - 'light'
          - 'standard'
          - 'deep'
      additional_instructions:
        description: 'Optional maintainer focus for this review'
        required: false
        type: 'string'

jobs:
  review-pr:
    # NOTE (intentional, current-phase safeguard): auto-triggers and the
    # @qwen-code /review comment trigger are gated to OWNER/MEMBER/COLLABORATOR
    # on purpose. This workflow runs under pull_request_target with
    # repository secrets and a 5-30 min LLM deep review, so an open
    # trigger would be a denial-of-wallet / abuse surface. External
    # contributor PRs are still reviewable today — a maintainer comments
    # `@qwen-code /review` on the PR. Broadening auto-trigger for community
    # PRs (with per-author rate limiting) is deferred to a later phase,
    # not dropped here. See docs/design/code-review/code-review-design.md.
    #
    # NOTE: contains() below is a substring match, so '@qwen-code /reviewer'
    # (or any other suffix) also passes this gate. That's intentional:
    # GHA expressions cannot anchor a regex here, and the
    # 'Resolve PR context' shell step re-checks with a properly
    # end-anchored awk/grep regex (@qwen-code /review($|[[:space:]])) and
    # sets should_run_review=false on non-matches. The cost of the extra
    # runner spin-up on a malformed mention is a few seconds and acceptable.
    if: |-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' &&
       (github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'ready_for_review' || github.event.action == 'synchronize') &&
       (github.event.pull_request.author_association == 'OWNER' ||
        github.event.pull_request.author_association == 'MEMBER' ||
        github.event.pull_request.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@qwen-code /review') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@qwen-code /review') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@qwen-code /review') &&
        (github.event.review.author_association == 'OWNER' ||
         github.event.review.author_association == 'MEMBER' ||
         github.event.review.author_association == 'COLLABORATOR'))
    concurrency:
      group: 'qwen-pr-review-${{ github.event.issue.number || github.event.pull_request.number || github.event.inputs.pr_number }}'
      cancel-in-progress: true
    # 30 min was empirically too low for the former multi-agent deep path
    # on a ~800-line PR. LIGHT/STANDARD are single-shot qwen calls with
    # Bash (for gh inline comments); DEEP is four bounded focus passes
    # that reuse the bundled /review rubric. All triggers need room for
    # package install, preflight, and a large DEEP prompt.
    timeout-minutes: 60
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      # Needed by trusted shell steps that post comments, and by the model's
      # Bash tool for `gh api` inline review comments. Tools are scoped via
      # deny list and MCP block — the model has Read/Grep/Bash for code
      # verification but cannot orchestrate agents or access external servers.
      pull-requests: 'write'
      issues: 'read'
    env:
      OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
      QWEN_PR_REVIEW_MAX_CHANGED_LINES: "${{ vars.QWEN_PR_REVIEW_MAX_CHANGED_LINES || '1500' }}"
      # Deny list blocks orchestration tools (agent loops, skills, worktrees,
      # plan mode) that are unnecessary for review and increase attack surface.
      # All other tools are available — matching the local qwen-code experience
      # so the model uses proper tool_use protocol instead of text-simulating
      # tool calls (which pollutes review output).
      QWEN_REVIEW_DENY_TOOLS: 'agent,skill,tool_search,ask_user_question,task_stop,send_message,enter_worktree,exit_worktree,exit_plan_mode,enter_plan_mode'
      # Explicitly allow tools that non-interactive mode auto-denies under
      # approval-mode=default. Shell is needed for `gh api` inline comments.
      QWEN_REVIEW_ALLOWED_TOOLS: 'run_shell_command'
    steps:
      # Security (R4): this job runs on pull_request_target with model
      # secrets. Tools are available (matching local qwen-code behavior) but
      # scoped: code checkout is base branch only, Bash uses the bot token,
      # orchestration tools are deny-listed, and MCP servers are blocked.
      # harden-runner remains in audit mode to observe outbound domains
      # before a later block-mode allowlist. Must be first so monitoring
      # starts before anything else.
      - name: 'Harden runner (egress audit)'
        uses: 'step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5' # v2.19.3
        with:
          egress-policy: 'audit'

      # Security: pull_request_target runs with repository secrets, so it
      # MUST check out trusted base code (main), never the PR head.
      # workflow_dispatch is maintainer-triggered and intentionally runs
      # the dispatched ref's own code so this workflow can be dry-run before
      # it reaches main. Only dispatch trusted repository refs; automatic
      # pull_request_target events always use trusted base code.
      - name: 'Checkout review code'
        uses: 'actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683' # v4.2.2
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          ref: "${{ github.event_name == 'workflow_dispatch' && github.ref || 'main' }}"
          fetch-depth: 0

      - name: 'Resolve PR context'
        id: 'pr'
        env:
          EVENT_NAME: '${{ github.event_name }}'
          WORKFLOW_PR_NUMBER: '${{ github.event.inputs.pr_number }}'
          WORKFLOW_REVIEW_MODE: '${{ github.event.inputs.review_mode }}'
          WORKFLOW_TIER_OVERRIDE: '${{ github.event.inputs.tier_override }}'
          WORKFLOW_ADDITIONAL_INSTRUCTIONS: '${{ github.event.inputs.additional_instructions }}'
        run: |-
          set -euo pipefail

          additional_instructions=""
          # tier_override: '' = run preflight; 'ULTRA_LIGHT'|'LIGHT'|'STANDARD'|'DEEP' = skip preflight.
          # Parsed from workflow_dispatch input or from a `--tier=X` token in
          # the issue_comment body. Always uppercased before being stored.
          tier_override=""
          case "$EVENT_NAME" in
            workflow_dispatch)
              pr_number="$WORKFLOW_PR_NUMBER"
              review_mode="${WORKFLOW_REVIEW_MODE:-dry-run}"
              additional_instructions="${WORKFLOW_ADDITIONAL_INSTRUCTIONS:-}"
              comment_body=""
              # dispatch input 'auto' means "run preflight"; anything else
              # is a forced tier.
              case "${WORKFLOW_TIER_OVERRIDE:-auto}" in
                auto|'') tier_override="" ;;
                ultra_light|light|standard|deep)
                  tier_override="$(printf '%s' "$WORKFLOW_TIER_OVERRIDE" | tr '[:lower:]' '[:upper:]')"
                  ;;
                *)
                  echo "::error::Unsupported tier_override value: $WORKFLOW_TIER_OVERRIDE"
                  exit 1
                  ;;
              esac
              ;;
            pull_request_target)
              pr_number="$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")"
              review_mode="comment"
              comment_body=""
              ;;
            issue_comment)
              pr_number="$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")"
              review_mode="comment"
              comment_body="$(jq -r '.comment.body // ""' "$GITHUB_EVENT_PATH")"
              ;;
            pull_request_review_comment)
              pr_number="$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")"
              review_mode="comment"
              comment_body="$(jq -r '.comment.body // ""' "$GITHUB_EVENT_PATH")"
              ;;
            pull_request_review)
              pr_number="$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")"
              review_mode="comment"
              comment_body="$(jq -r '.review.body // ""' "$GITHUB_EVENT_PATH")"
              ;;
            *)
              echo "::error::Unsupported event: $EVENT_NAME"
              exit 1
              ;;
          esac

          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
            echo "::error::Could not resolve pull request number"
            exit 1
          fi

          case "$review_mode" in
            dry-run|comment)
              ;;
            *)
              echo "::error::Unsupported review mode: $review_mode"
              exit 1
              ;;
          esac

          should_run_review="true"

          # Use grep -qE with end-boundary so '@qwen-code /review' does not
          # match '@qwen-code /reviewer' or similar variants.
          if [ "$EVENT_NAME" != "workflow_dispatch" ] && [ "$EVENT_NAME" != "pull_request_target" ]; then
            if printf '%s' "$comment_body" | grep -qE '@qwen-code /review($|[[:space:]])'; then
              additional_instructions="$(
                printf '%s' "$comment_body" |
                  awk '
                    BEGIN { found = 0 }
                    !found {
                      if (match($0, /@qwen-code \/review([[:space:]]|$)/)) {
                        found = 1
                        rest = substr($0, RSTART + RLENGTH)
                        if (length(rest) > 0) print rest
                      }
                      next
                    }
                    { print }
                  ' |
                  sed 's/^[[:space:]]*//'
              )"
            else
              should_run_review="false"
            fi
          fi

          # Parse `--tier=X` from comment body or from additional_instructions
          # (it ends up there after the regex strip above). Match: --tier=light,
          # --tier=DEEP, etc. The matched token is REMOVED from
          # additional_instructions so it doesn't leak into the review prompt.
          # Only honored for comment/review-triggered runs (workflow_dispatch
          # already set tier_override from its input above).
          if [ "$EVENT_NAME" != "workflow_dispatch" ] && [ "$EVENT_NAME" != "pull_request_target" ] && [ -z "$tier_override" ]; then
            if printf '%s' "$additional_instructions" | grep -qiE '(^|[[:space:]])--tier=(ultra_light|light|standard|deep)([[:space:]]|$)'; then
              tier_raw="$(printf '%s' "$additional_instructions" \
                | grep -oiE -- '--tier=(ultra_light|light|standard|deep)' \
                | head -n1 \
                | sed 's/^--tier=//I')"
              tier_override="$(printf '%s' "$tier_raw" | tr '[:lower:]' '[:upper:]')"
              # `I` flag = case-insensitive, so a mixed-case `--tier=Light`
              # (accepted by the case-insensitive grep above) is also
              # stripped here. Without it, mixed case parses correctly but
              # leaks the literal `--tier=Light` token into the LLM prompt.
              additional_instructions="$(printf '%s' "$additional_instructions" \
                | sed -E 's/(^|[[:space:]])--tier=(ultra_light|light|standard|deep)([[:space:]]|$)/\1\3/gI')"
            fi
          fi
          # Strip leading blank lines so the prompt doesn't start with an
          # empty line when @qwen-code /review is on its own line.
          additional_instructions="$(printf '%s' "$additional_instructions" | sed '/./,$!d')"
          # Keep maintainer focus text from changing the slash-command flags.
          additional_instructions="$(printf '%s' "$additional_instructions" | LC_ALL=C perl -0pe 's/(?<!\S)--comment(?!\S)/`--comment`/g')"
          # Hard-cap to 2048 characters to keep prompt-injection surface
          # bounded without using a pipe that can trip pipefail on SIGPIPE.
          # Reviewers should keep instructions short.
          if [ "${#additional_instructions}" -gt 2048 ]; then
            echo "::warning::additional_instructions exceeded 2048 characters and was truncated."
          fi
          additional_instructions="${additional_instructions:0:2048}"

          if [ "$review_mode" = "comment" ]; then
            should_comment="true"
          else
            should_comment="false"
          fi

          output_delimiter="QWEN_REVIEW_PROMPT_$(date +%s%N)"
          {
            echo "number=$pr_number"
            echo "review_mode=$review_mode"
            echo "should_comment=$should_comment"
            echo "should_run_review=$should_run_review"
            echo "tier_override=$tier_override"
            echo "additional_instructions<<QWEN_REVIEW_AI_${output_delimiter}"
            printf '%s\n' "$additional_instructions"
            echo "QWEN_REVIEW_AI_${output_delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: 'Check PR size'
        id: 'size'
        if: |-
          steps.pr.outputs.should_run_review == 'true'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
        run: |-
          set -euo pipefail

          write_output() {
            echo "$1" >> "$GITHUB_OUTPUT"
          }

          if [ -z "${OPENAI_MODEL:-}" ]; then
            echo "::error::Repository variable QWEN_PR_REVIEW_MODEL is required for this workflow (maps to env var OPENAI_MODEL)."
            exit 1
          fi

          if ! printf '%s' "$QWEN_PR_REVIEW_MAX_CHANGED_LINES" | grep -Eq '^[0-9]+$'; then
            echo "::error::QWEN_PR_REVIEW_MAX_CHANGED_LINES must be an integer."
            exit 1
          fi

          if [ "$QWEN_PR_REVIEW_MAX_CHANGED_LINES" -lt 100 ] || [ "$QWEN_PR_REVIEW_MAX_CHANGED_LINES" -gt 50000 ]; then
            echo "::error::QWEN_PR_REVIEW_MAX_CHANGED_LINES must be between 100 and 50000 (got $QWEN_PR_REVIEW_MAX_CHANGED_LINES)."
            exit 1
          fi

          pr_json="$(gh pr view "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json additions,deletions,changedFiles,files,title,baseRefName,baseRefOid,headRefName,headRefOid)"
          additions="$(jq -r '.additions' <<< "$pr_json")"
          deletions="$(jq -r '.deletions' <<< "$pr_json")"
          changed_files="$(jq -r '.changedFiles' <<< "$pr_json")"
          title="$(jq -r '.title' <<< "$pr_json")"
          base_ref="$(jq -r '.baseRefName' <<< "$pr_json")"
          base_sha="$(jq -r '.baseRefOid // ""' <<< "$pr_json")"
          head_ref="$(jq -r '.headRefName' <<< "$pr_json")"
          head_sha="$(jq -r '.headRefOid // ""' <<< "$pr_json")"
          # Compute "meaningful" changed_lines that excludes lockfile /
          # docs / snapshot / generated content. Mirrors the exclusion
          # list in pr-gate.yml's PR Size job so the two workflows agree
          # on whether a PR exceeds the threshold (see
          # scripts/compute-pr-size.cjs for the canonical regex list).
          printf '%s' "$pr_json" > /tmp/pr-json-for-size.json
          # raw_changed_lines is the unfiltered additions+deletions total.
          # changed_lines (below) is the "meaningful" count the size gate
          # uses; contributor-facing comments must display the raw total
          # instead — otherwise a docs-only PR shows "Changed lines: 0"
          # and looks broken (caught by CI dry-run on PR #4356).
          raw_changed_lines=$((additions + deletions))
          # If compute-pr-size.cjs fails (malformed gh JSON, missing files[],
          # etc.) its command substitution returns non-zero and would abort
          # the whole job under `set -e`. Fall back to the raw count instead
          # — a conservative over-estimate that keeps the review running
          # (G3 always-emit) rather than failing silently.
          changed_lines="$(node scripts/compute-pr-size.cjs /tmp/pr-json-for-size.json)" \
            || changed_lines="$raw_changed_lines"

          # Reject empty head_sha / base_sha early. Both are queried via
          # gh pr view; an empty value almost always means gh pr view
          # partially failed.
          if [ -z "$head_sha" ]; then
            echo "::error::Could not resolve PR head SHA via gh pr view --json headRefOid."
            exit 1
          fi
          if [ -z "$base_sha" ]; then
            echo "::error::Could not resolve PR base SHA via gh pr view --json baseRefOid."
            exit 1
          fi

          write_output "changed_lines=$changed_lines"
          write_output "raw_changed_lines=$raw_changed_lines"
          write_output "changed_files=$changed_files"
          write_output "head_sha=$head_sha"
          write_output "base_sha=$base_sha"
          write_output "review_size_threshold=$QWEN_PR_REVIEW_MAX_CHANGED_LINES"
          echo "Review target: PR #$PR_NUMBER"
          echo "Review title: $title"
          echo "Review branch: $base_ref ($base_sha) <- $head_ref ($head_sha)"
          echo "Review scope: $changed_files files, +$additions/-$deletions ($changed_lines reviewable lines after excluding docs/lockfiles/snapshots)"

          capture_capped_pr_diff() {
            local byte_limit="$1"
            local output_path="$2"
            local diff_status=0
            local head_status=0

            set +eu
            gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --patch | head -c "$byte_limit" > "$output_path"
            diff_status=${PIPESTATUS[0]}
            head_status=${PIPESTATUS[1]}
            set -eu

            # `head` may close the pipe once the byte cap is reached, causing
            # gh to report SIGPIPE (141). That is expected. Any other gh
            # failure means the review would otherwise run on an empty diff.
            if [ "$diff_status" -ne 0 ] && [ "$diff_status" -ne 141 ]; then
              echo "::warning::Could not capture PR unified diff (gh pr diff exited $diff_status); continuing with a placeholder."
              return 1
            fi
            if [ "$head_status" -ne 0 ]; then
              echo "::warning::Could not cap PR unified diff (head exited $head_status); continuing with a placeholder."
              return 1
            fi
          }

          if capture_capped_pr_diff 500000 /tmp/qwen-pr-unified.diff; then
            write_output "diff_available=true"
          else
            printf '%s\n' "(unified diff unavailable; gh pr diff failed during CI context collection)" > /tmp/qwen-pr-unified.diff
            write_output "diff_available=false"
          fi

          if [ "$changed_lines" -gt "$QWEN_PR_REVIEW_MAX_CHANGED_LINES" ]; then
            # Size > AI-review guidance: keep reviewing, but make the
            # signal-risk explicit in logs, step summary, and the final PR
            # comment. This workflow is advisory; size should not silently
            # suppress automated review coverage.
            write_output "exceeds_review_threshold=true"
            echo "::warning::PR size ($changed_lines lines) exceeds AI-review size guidance ($QWEN_PR_REVIEW_MAX_CHANGED_LINES). Continuing automated review; expect lower signal and possible truncation."
            {
              printf '### Large PR warning\n\n'
              printf 'PR size: %s lines across %s files (threshold %s).\n\n' \
                "$changed_lines" "$changed_files" "$QWEN_PR_REVIEW_MAX_CHANGED_LINES"
              printf 'Automated review will continue, but findings may be less complete on oversized diffs.\n'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            write_output "exceeds_review_threshold=false"
          fi
          write_output "should_review=true"

      # @qwen-code/qwen-code requires Node >=22; runner default is 20
      # (npm EBADENGINE). Pin Node 22 before installing/invoking qwen.
      - name: 'Set up Node.js'
        if: |-
          steps.size.outputs.should_review == 'true'
        uses: 'actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e' # v4
        with:
          node-version: '22'

      # Cache the npm download cache so the global qwen-code install is
      # offline-fast on subsequent runs (content-addressed; a stale key
      # only misses the newest tarball, never serves wrong content).
      - name: 'Cache npm for qwen-code install'
        if: |-
          steps.size.outputs.should_review == 'true'
        uses: 'actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830' # v4.3.0
        with:
          path: '~/.npm'
          key: 'qwen-npm-global-${{ runner.os }}-v1'
          restore-keys: |
            qwen-npm-global-${{ runner.os }}-

      # ─── Install qwen-code CLI (shared by preflight, LIGHT, STANDARD, DEEP) ───
      #
      # Extracted from the previous monolithic 'Run Qwen Code Review' step so
      # the same `qwen` binary is reused by the preflight LLM call and by all
      # tier-specific execution paths below. ULTRA_LIGHT does not need qwen
      # but the install is cached and cheap (~5s warm); skipping it
      # conditionally would add branching with no real saving.
      #
      # Intentionally @latest — DO NOT pin this yet (deliberate decision):
      #  1. The newest CLI is what reliably supports the streaming output
      #     mode this workflow depends on (`--output-format stream-json
      #     --include-partial-messages`). Without a streaming-capable CLI,
      #     a GitHub Actions step full-buffers qwen's stdout and shows
      #     nothing until exit — making a slow/stuck review impossible to
      #     debug from the live job log. `@latest` keeps that capability
      #     guaranteed.
      # Pinning to `@qwen-code/qwen-code@x.y.z` is a known, accepted
      # follow-up (it would also harden the secret-bearing
      # pull_request_target run against a future package publish) — it is
      # intentionally deferred and is NOT a finding against this PR.
      - name: 'Install qwen-code CLI'
        if: |-
          steps.size.outputs.should_review == 'true'
        run: |-
          set -euo pipefail

          mkdir -p .qwen
          cat > .qwen/settings.json <<'EOF'
          {
            "security": { "folderTrust": { "enabled": false } },
            "tools": { "approvalMode": "default" },
            "permissions": { "allow": ["Bash(*)"] },
            "sandbox": false
          }
          EOF

          echo "::group::Install qwen-code"
          npm install -g @qwen-code/qwen-code@latest
          qwen --version
          echo "::endgroup::"

      # ─── Preflight triage: LLM judges blast radius, picks tier ────────────
      #
      # Skipped when the maintainer explicitly forced a tier via slash flag
      # (`@qwen-code /review --tier=...`) or workflow_dispatch input. Otherwise
      # runs a single qwen call against `.qwen/preflight-prompt.md` with PR
      # context appended, expecting strict JSON output. Any failure mode
      # (timeout, non-JSON, schema invalid) defaults to DEEP (P7 conservative
      # bias). See docs/design/code-review/preflight-triage.md §Preflight 实现.
      - name: 'Preflight triage'
        id: 'triage'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          steps.pr.outputs.tier_override == ''
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          OPENAI_API_KEY: '${{ secrets.REVIEW_OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.REVIEW_OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ vars.QWEN_PR_PREFLIGHT_MODEL || vars.QWEN_PR_REVIEW_MODEL }}'
          # Routed through env (not interpolated into the script) so the
          # value can't break the `[ -z ... ]` test or inject shell — same
          # pattern as every other vars.*/secrets.* in this file.
          PREFLIGHT_MODEL_RAW: '${{ vars.QWEN_PR_PREFLIGHT_MODEL }}'
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          CHANGED_LINES: '${{ steps.size.outputs.changed_lines }}'
          RAW_CHANGED_LINES: '${{ steps.size.outputs.raw_changed_lines }}'
          DIFF_AVAILABLE: '${{ steps.size.outputs.diff_available }}'
        timeout-minutes: 5
        run: |-
          set -euo pipefail

          if [ -z "${PREFLIGHT_MODEL_RAW:-}" ]; then
            echo "::warning::vars.QWEN_PR_PREFLIGHT_MODEL is unset; preflight is falling back to the deep-review model SKU. Configure a cheaper SKU to reduce token cost — see docs/design/code-review/preflight-triage.md §关键决策 D1."
          fi

          echo "::group::Gather preflight inputs"
          pr_json="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --json title,body,author,comments,additions,deletions,changedFiles,files,headRefName,baseRefName)"
          pr_title="$(jq -r '.title' <<< "$pr_json")"
          # Trim the body to keep prompt size bounded.
          # `{ producer || true; } | head -c N`: head closes the pipe after
          # N bytes, the producer then dies of SIGPIPE (exit 141), and under
          # `set -o pipefail` that 141 would abort the step. The `|| true`
          # swallows the producer's SIGPIPE so only an oversized body is
          # truncated, not the whole review run.
          pr_body="$( { jq -r '.body // ""' <<< "$pr_json" || true; } | head -c 2000)"
          author_comments_block="$( { jq -r '
            .author.login as $author |
            [
              .comments[]?
              | select(.author.login == $author)
              | "- @" + .author.login + " (" + (.createdAt // "unknown time") + "):\n" + (.body // "")
            ] | join("\n\n---\n\n")
          ' <<< "$pr_json" || true; } | head -c 8000)"
          if [ -z "$author_comments_block" ]; then
            author_comments_block="(no author PR comments)"
          fi
          base_ref="$(jq -r '.baseRefName' <<< "$pr_json")"
          head_ref="$(jq -r '.headRefName' <<< "$pr_json")"
          changed_files_block="$(jq -r '.files[] | "\(.path) (+\(.additions)/-\(.deletions))"' <<< "$pr_json")"
          # diff_stat is a per-file churn summary for the preflight prompt.
          # If `diffstat` isn't on the runner, fall back to a plain
          # changed-file list — NOT `--patch | head`, which would dump raw
          # +/- hunk lines mislabeled as a "stat" and skew the LLM's
          # blast-radius read.
          if command -v diffstat >/dev/null 2>&1 && [ "$DIFF_AVAILABLE" = "true" ]; then
            if diff_stat="$(diffstat -p1 /tmp/qwen-pr-unified.diff 2>/tmp/qwen-diffstat-stderr.log)"; then
              diff_stat_label='git diff --stat'
            else
              echo "::warning::diffstat failed on the cached PR diff; falling back to the changed-file list."
              diff_stat="$(printf '%s' "$changed_files_block")"
              diff_stat_label='changed files (diffstat unavailable on runner)'
            fi
          else
            # Label the fallback honestly: a bare changed-file list is not
            # a --stat output, and mislabeling it would skew the LLM's
            # blast-radius read.
            diff_stat="$(printf '%s' "$changed_files_block")"
            diff_stat_label='changed files (diffstat unavailable on runner)'
          fi
          # First ~50KB of unified diff for content judgment. Anything beyond
          # is unlikely to flip the tier — preflight is a triage step, not
          # the actual review.
          unified_diff="$(head -c 50000 /tmp/qwen-pr-unified.diff)"
          echo "::endgroup::"

          # Build the PR context body into a file so the heredoc-with-YAML
          # indentation pitfall is avoided. Variable substitution happens at
          # the shell level (printf), not the YAML level.
          {
            printf '**PR title:** %s\n\n' "$pr_title"
            printf '**Branches:** %s → %s\n\n' "$head_ref" "$base_ref"
            printf '**Changed lines:** %s total (%s reviewable, excludes docs/lockfiles/snapshots)\n\n' "$RAW_CHANGED_LINES" "$CHANGED_LINES"
            printf '**Changed files (path + line counts):**\n'
            printf '```\n%s\n```\n\n' "$changed_files_block"
            printf '**%s:**\n' "$diff_stat_label"
            printf '```\n%s\n```\n\n' "$diff_stat"
            # Honour diff_available: when the cache write failed, the file
            # contains a "(unified diff unavailable …)" placeholder and must
            # not be wrapped in a ```diff fence — otherwise the preflight
            # LLM would parse the error text as code and infer false
            # blast-radius signals.
            if [ "${DIFF_AVAILABLE:-true}" = "true" ]; then
              printf '**First 50KB of unified diff:**\n'
              printf '```diff\n%s\n```\n\n' "$unified_diff"
            else
              printf '**Unified diff:** unavailable — `gh pr diff` failed during CI context collection. Triage on the changed-file list above.\n\n'
            fi
            printf '**Author PR comments (first 8KB):**\n%s\n\n' "$author_comments_block"
            printf '**PR body (first 2KB):**\n%s\n' "$pr_body"
          } > /tmp/preflight-pr-context.md

          # Render the final prompt by substituting template markers
          # via the shared helper script (see scripts/render-review-prompt.cjs).
          node scripts/render-review-prompt.cjs \
            .qwen/preflight-prompt.md \
            /tmp/preflight-prompt-rendered.md \
            --context /tmp/preflight-pr-context.md \
            --rules .qwen/review-rules.md \
            || { echo "::error::Failed to render preflight prompt"; exit 1; }

          echo "::group::Run preflight LLM"
          set +e
          # `timeout --kill-after=15s 3m` kills qwen at 3 min and SIGKILLs
          # it 15s later if it ignored SIGTERM — matches the LIGHT/STANDARD/
          # DEEP tier steps; the step's `timeout-minutes: 5` is the outer
          # safety net (D6).
          # stderr is sent to a file, NOT merged into raw_out: the JSON
          # parser below feeds raw_out to `jq` as a single document, so any
          # stderr line (node warnings, telemetry) would break the parse.
          raw_out="$(timeout --kill-after=15s 3m qwen \
            --approval-mode default \
            --exclude-tools "$QWEN_REVIEW_DENY_TOOLS" \
            --allowed-mcp-server-names __qwen_review_no_mcp__ \
            -p "Triage the PR below." \
            < /tmp/preflight-prompt-rendered.md 2>/tmp/preflight-stderr.log)"
          qwen_status=$?
          set -e
          # Echo raw_out (and qwen's stderr) inside a stop-commands fence:
          # GitHub Actions scans step stdout for ::workflow commands::, and
          # this content is untrusted LLM output derived from attacker-
          # controlled PR diff. The fence makes GHA treat it as plain text.
          stop_token="preflight-raw-$(date +%s%N)"
          echo "::stop-commands::${stop_token}"
          echo "$raw_out"
          if [ -s /tmp/preflight-stderr.log ]; then
            echo "--- preflight stderr ---"
            cat /tmp/preflight-stderr.log
          fi
          echo "::${stop_token}::"
          echo "::endgroup::"

          # Default to DEEP on any failure (P7 conservative bias).
          tier="DEEP"
          rationale="preflight defaulted to DEEP"

          if [ "$qwen_status" -eq 124 ]; then
            echo "::warning::Preflight timed out at 3m; falling back to DEEP."
            rationale="preflight timed out at 3m"
          elif [ "$qwen_status" -ne 0 ]; then
            echo "::warning::Preflight exited with status $qwen_status; falling back to DEEP."
            rationale="preflight exited non-zero ($qwen_status)"
          else
            extract_preflight_json() {
              node -e '
          const fs = require("fs");
          const raw = fs.readFileSync(0, "utf8").trim();
          const fenced = raw.match(/```\s*[A-Za-z0-9_-]*\s*\n([\s\S]*?)\n```/);
          const candidate = (fenced ? fenced[1] : raw).trim();
          const first = candidate.indexOf("{");
          const last = candidate.lastIndexOf("}");
          process.stdout.write(first !== -1 && last >= first ? candidate.slice(first, last + 1).trim() : candidate);
          '
            }
            # Strip common code fences / surrounding prose if the model added
            # them despite instructions. Keep invalid output invalid so jq
            # still falls back to DEEP.
            json_text="$(printf '%s' "$raw_out" | extract_preflight_json)"
            # `.blast_radius` must be an object — a string/number/null would
            # make every `.blast_radius.<flag>` lookup below return null and
            # silently flatten the high-risk dimensions to `false`, routing
            # a security-sensitive PR through LIGHT without protest. The
            # type check forces the fall-through to DEEP whenever the model
            # hallucinates the wrong shape.
            if ! parsed="$(printf '%s' "$json_text" | jq -e '. | select(.tier and (.blast_radius | type == "object"))' 2>/dev/null)"; then
              echo "::warning::Preflight returned invalid JSON or missing required fields; falling back to DEEP."
              rationale="invalid preflight JSON"
            else
              model_tier="$(printf '%s' "$parsed" | jq -r '.tier' | tr '[:lower:]' '[:upper:]')"
              case "$model_tier" in
                ULTRA_LIGHT|LIGHT|STANDARD|DEEP)
                  # `|| true` so a long rationale's SIGPIPE at the 200-byte
                  # cap doesn't abort the step under pipefail.
                  rationale="$( { printf '%s' "$parsed" | jq -r '.rationale // ""' || true; } | head -c 200)"
                  user_facing="$(printf '%s' "$parsed" | jq -r '.blast_radius.user_facing == true')"
                  security_sensitive="$(printf '%s' "$parsed" | jq -r '.blast_radius.security_sensitive == true')"
                  public_api="$(printf '%s' "$parsed" | jq -r '.blast_radius.public_api == true')"
                  build_or_release="$(printf '%s' "$parsed" | jq -r '.blast_radius.build_or_release == true')"
                  data_path="$(printf '%s' "$parsed" | jq -r '.blast_radius.data_path == true')"

                  tier="$model_tier"
                  if [ "$security_sensitive" = "true" ] ||
                     [ "$public_api" = "true" ] ||
                     [ "$build_or_release" = "true" ] ||
                     [ "$data_path" = "true" ]; then
                    if [ "$model_tier" != "DEEP" ]; then
                      echo "::warning::Preflight tier=$model_tier contradicts high-risk blast_radius; upgrading to DEEP."
                      tier="DEEP"
                      rationale="model tier $model_tier contradicted high-risk blast_radius; upgraded to DEEP"
                    fi
                  elif [ "$user_facing" = "true" ] &&
                       { [ "$model_tier" = "ULTRA_LIGHT" ] || [ "$model_tier" = "LIGHT" ]; }; then
                    echo "::warning::Preflight tier=$model_tier contradicts user_facing blast_radius; upgrading to STANDARD."
                    tier="STANDARD"
                    rationale="model tier $model_tier contradicted user_facing blast_radius; upgraded to STANDARD"
                  fi
                  # Optional fields, may be empty.
                  focus_areas="$(printf '%s' "$parsed" | jq -c '.focus_areas // []')"
                  agents_to_run="$(printf '%s' "$parsed" | jq -c '.agents_to_run // []')"
                  printf '%s' "$focus_areas" > /tmp/qwen-focus-areas.json
                  printf '%s' "$agents_to_run" > /tmp/qwen-agents-to-run.json
                  ;;
                *)
                  echo "::warning::Preflight returned unknown tier value '$model_tier'; falling back to DEEP."
                  rationale="unknown tier value: $model_tier"
                  ;;
              esac
            fi
          fi

          echo "tier=$tier" >> "$GITHUB_OUTPUT"
          # Use multiline output format so a multi-line rationale survives.
          # GHA's single-line `key=value` form silently truncates at the
          # first newline, which would chop a multi-sentence rationale.
          #
          # The heredoc delimiter MUST be randomized: `rationale` is LLM
          # output produced from attacker-controlled PR content (title,
          # body, diff). A static delimiter lets a prompt-injected model
          # emit that exact line to close the heredoc early and inject its
          # own `tier=ULTRA_LIGHT` GITHUB_OUTPUT line — forcing a
          # security-critical PR to skip deep review. A per-run random
          # delimiter the model cannot predict closes that hole. Mirrors
          # the dynamic-delimiter pattern in the 'Resolve PR context' step.
          rationale_eof="RATIONALE_EOF_$(date +%s%N)"
          {
            echo "rationale<<${rationale_eof}"
            printf '%s\n' "$rationale"
            echo "${rationale_eof}"
          } >> "$GITHUB_OUTPUT"
          # For the ::notice:: log line, condense newlines into spaces so
          # the GHA UI shows the full rationale on one line (GHA notice
          # annotations don't render multi-line text usefully anyway).
          rationale_oneline="$(printf '%s' "$rationale" | tr '\n' ' ' | sed 's/  */ /g')"
          echo "::notice::Preflight tier=$tier (rationale: $rationale_oneline)"

      # ─── Compute effective tier (override OR preflight) ────────────────────
      #
      # Final tier = `tier_override` (if set by maintainer slash flag or
      # dispatch input) else `triage.outputs.tier`. Shell-only step; no LLM
      # call. Output is used by the four tier-execution steps below.
      - name: 'Compute effective tier'
        id: 'tier'
        if: |-
          steps.size.outputs.should_review == 'true'
        env:
          TIER_OVERRIDE: '${{ steps.pr.outputs.tier_override }}'
          TRIAGE_TIER: '${{ steps.triage.outputs.tier }}'
        run: |-
          set -euo pipefail

          if [ -n "${TIER_OVERRIDE}" ]; then
            tier="$TIER_OVERRIDE"
            source="override"
          elif [ -n "${TRIAGE_TIER:-}" ]; then
            tier="$TRIAGE_TIER"
            source="preflight"
          else
            # Defensive fallback: if neither override nor preflight ran (e.g.
            # preflight step was skipped due to an upstream condition), pick
            # DEEP. Should be unreachable in practice.
            tier="DEEP"
            source="default-fallback"
          fi

          case "$tier" in
            ULTRA_LIGHT|LIGHT|STANDARD|DEEP) ;;
            *)
              echo "::error::Invalid effective tier '$tier'"
              exit 1
              ;;
          esac

          echo "tier=$tier" >> "$GITHUB_OUTPUT"
          echo "source=$source" >> "$GITHUB_OUTPUT"
          echo "::notice::Effective tier=$tier (source=$source)"

      # ─── ULTRA_LIGHT: shell-only "no deep review needed" comment ──────────
      - name: 'Compose ULTRA_LIGHT verdict'
        id: 'ultra-light'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          steps.tier.outputs.tier == 'ULTRA_LIGHT'
        env:
          RATIONALE: '${{ steps.triage.outputs.rationale }}'
          CHANGED_FILES: '${{ steps.size.outputs.changed_files }}'
          RAW_CHANGED_LINES: '${{ steps.size.outputs.raw_changed_lines }}'
        run: |-
          set -euo pipefail
          {
            printf '## Qwen Code Review — ULTRA_LIGHT\n\n'
            printf '_Preflight triage decided this PR does not need a deep review._\n\n'
            if [ -n "${RATIONALE:-}" ]; then
              printf '**Rationale:** %s\n\n' "$RATIONALE"
            fi
            # printf needs `--` to stop treating the leading dash as a flag
            # on some bash builds (caught by CI dry-run on 2026-05-20).
            printf -- '- Changed files: %s\n' "$CHANGED_FILES"
            printf -- '- Changed lines: %s\n\n' "$RAW_CHANGED_LINES"
            printf '_Reply `@qwen-code /review --tier=light|standard|deep` to force a deeper review._\n'
          } > qwen-review-summary.md

      # ─── LIGHT: single-shot qwen with focused prompt ──────────────────────
      - name: 'Run LIGHT review'
        id: 'light'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          steps.tier.outputs.tier == 'LIGHT'
        env:
          GITHUB_TOKEN: '${{ secrets.QWEN_CODE_BOT_TOKEN || secrets.CI_BOT_PAT || secrets.GITHUB_TOKEN }}'
          OPENAI_API_KEY: '${{ secrets.REVIEW_OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.REVIEW_OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          HEAD_SHA: '${{ steps.size.outputs.head_sha }}'
          ADDITIONAL_INSTRUCTIONS: '${{ steps.pr.outputs.additional_instructions }}'
          DIFF_AVAILABLE: '${{ steps.size.outputs.diff_available }}'
        timeout-minutes: 5
        run: |-
          set -euo pipefail

          pr_json="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --json title,body,files,author,comments)"
          pr_title="$(jq -r '.title' <<< "$pr_json")"
          # `{ producer || true; } | head -c N`: head closes the pipe after
          # N bytes, the producer then dies of SIGPIPE (exit 141), and under
          # `set -o pipefail` that 141 would abort the step. The `|| true`
          # swallows the producer's SIGPIPE so only an oversized body is
          # truncated, not the whole review run.
          pr_body="$( { jq -r '.body // ""' <<< "$pr_json" || true; } | head -c 2000)"
          author_comments_block="$( { jq -r '
            .author.login as $author |
            [
              .comments[]?
              | select(.author.login == $author)
              | "- @" + .author.login + " (" + (.createdAt // "unknown time") + "):\n" + (.body // "")
            ] | join("\n\n---\n\n")
          ' <<< "$pr_json" || true; } | head -c 8000)"
          if [ -z "$author_comments_block" ]; then
            author_comments_block="(no author PR comments)"
          fi
          changed_files_block="$(jq -r '.files[] | "\(.path) (+\(.additions)/-\(.deletions))"' <<< "$pr_json")"
          unified_diff="$(head -c 50000 /tmp/qwen-pr-unified.diff)"
          focus_areas="$(cat /tmp/qwen-focus-areas.json 2>/dev/null || echo '[]')"

          {
            printf '**PR title:** %s\n\n' "$pr_title"
            if [ -n "${ADDITIONAL_INSTRUCTIONS:-}" ]; then
              printf '**Maintainer focus:**\n%s\n\n' "$ADDITIONAL_INSTRUCTIONS"
            fi
            printf '**Changed files:**\n```\n%s\n```\n\n' "$changed_files_block"
            # Honour the diff_available signal so the placeholder string from
            # capture_capped_pr_diff failures is never wrapped in a ```diff
            # fence — that would let the LLM "review" the error text as if
            # it were real code.
            if [ "${DIFF_AVAILABLE:-true}" = "true" ]; then
              printf '**Unified diff (first 50KB):**\n```diff\n%s\n```\n\n' "$unified_diff"
            else
              printf '**Unified diff:** unavailable — `gh pr diff` failed during CI context collection. This review proceeds without diff content; rely on the changed-file list above and call this out in the review summary.\n\n'
            fi
            printf '**Preflight focus_areas (hints, not mandatory):**\n```json\n%s\n```\n\n' "$focus_areas"
            printf '**Author PR comments (first 8KB):**\n%s\n\n' "$author_comments_block"
            printf '**PR body (first 2KB):**\n%s\n' "$pr_body"
          } > /tmp/light-pr-context.md

          # Same shared helper as the preflight step. The LIGHT template
          # was updated to include <<<REVIEW_RULES_MD>>>, so pass --rules
          # too (project conventions apply at every tier).
          node scripts/render-review-prompt.cjs \
            .qwen/preflight-light-review-prompt.md \
            /tmp/light-prompt-rendered.md \
            --context /tmp/light-pr-context.md \
            --rules .qwen/review-rules.md

          out=qwen-review-stream.jsonl
          echo "::group::Qwen LIGHT review (live stream)"
          set +e
          # qwen output is model text derived from untrusted PR content.
          # Fence it so GitHub Actions does not interpret accidental or
          # prompt-injected `::workflow-command::` lines from the stream.
          stop_token="qwen-light-stream-$(date +%s%N)"
          echo "::stop-commands::${stop_token}"
          timeout --kill-after=15s 3m qwen \
            --approval-mode default \
            --exclude-tools "$QWEN_REVIEW_DENY_TOOLS" \
            --allowed-tools "$QWEN_REVIEW_ALLOWED_TOOLS" \
            --allowed-mcp-server-names __qwen_review_no_mcp__ \
            --output-format stream-json --include-partial-messages \
            -p "Review the PR below." \
            2> >(tee /tmp/qwen-light-stderr.log >&2) < /tmp/light-prompt-rendered.md | tee "$out"
          status=${PIPESTATUS[0]}
          echo "::${stop_token}::"
          set -e
          echo "::endgroup::"

          status_label="complete"
          if [ "$status" -eq 124 ]; then
            status_label="timeout"
            echo "::warning::LIGHT review timed out at 3m; flushing partial output via accumulator."
          elif [ "$status" -ne 0 ]; then
            # Non-zero, non-timeout exit (crash / OOM (137) / SIGINT (130) / etc.)
            # Mark explicitly so partial flush + warning header still fire;
            # without this, the file would be labeled 'complete' silently.
            status_label="error"
            echo "::warning::LIGHT review exited with status $status (non-timeout failure); flushing any partial output via accumulator."
          fi

          # Guard the parser under `set -e`: a non-zero exit (IO error on
          # the stream file) would otherwise abort the step and skip the
          # partial-flush / near-empty-guard paths below. On failure leave
          # an empty summary so the empty/placeholder guard removes it and
          # the fallback comment fires.
          node scripts/parse-review-stream.cjs "$out" qwen-review-summary.md LIGHT "$status_label" \
            || { echo "::warning::parse-review-stream.cjs failed; fallback comment will fire."; : > qwen-review-summary.md; }

          if [ "$status_label" = "timeout" ]; then
            # Prepend warning so maintainer sees the review was capped.
            {
              printf '## ⚠️ LIGHT review was time-capped at 3 min — partial output below\n\n'
              cat qwen-review-summary.md
            } > /tmp/qwen-review-summary-with-warning.md
            mv /tmp/qwen-review-summary-with-warning.md qwen-review-summary.md
          elif [ "$status_label" = "error" ]; then
            # Same partial-flush treatment for non-timeout failures, so a
            # crash-truncated review is not posted looking 'complete'.
            {
              printf '## ⚠️ LIGHT review exited with error (status %s) — partial output below\n\n' "$status"
              cat qwen-review-summary.md
            } > /tmp/qwen-review-summary-with-warning.md
            mv /tmp/qwen-review-summary-with-warning.md qwen-review-summary.md
          fi

          # If the accumulator only wrote its "no assistant text parsed"
          # placeholder (see scripts/parse-review-stream.cjs:124), delete
          # the file so the post-summary step skips and the fallback
          # comment fires instead of posting a useless stub. Match the
          # placeholder phrase directly rather than relying on a byte-count
          # heuristic, which conflated "empty placeholder" with "short
          # legitimate review" (e.g., a 70-byte ULTRA_LIGHT 'LGTM — only
          # spelling fixes.' review was getting deleted alongside the
          # empty case). The `-f` guard keeps this robust if a future
          # step leaves the file missing.
          if [ -f qwen-review-summary.md ] && { ! [ -s qwen-review-summary.md ] || grep -qF 'no assistant text parsed' qwen-review-summary.md; }; then
            echo "::warning::LIGHT review produced empty / placeholder-only output; removing summary file so fallback comment fires."
            rm -f qwen-review-summary.md
          fi

      # ─── STANDARD: single-shot qwen with structured prompt ─────────────────
      - name: 'Run STANDARD review'
        id: 'standard'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          steps.tier.outputs.tier == 'STANDARD'
        env:
          GITHUB_TOKEN: '${{ secrets.QWEN_CODE_BOT_TOKEN || secrets.CI_BOT_PAT || secrets.GITHUB_TOKEN }}'
          OPENAI_API_KEY: '${{ secrets.REVIEW_OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.REVIEW_OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          HEAD_SHA: '${{ steps.size.outputs.head_sha }}'
          ADDITIONAL_INSTRUCTIONS: '${{ steps.pr.outputs.additional_instructions }}'
          DIFF_AVAILABLE: '${{ steps.size.outputs.diff_available }}'
        timeout-minutes: 10
        run: |-
          set -euo pipefail

          pr_json="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --json title,body,files,author,comments)"
          pr_title="$(jq -r '.title' <<< "$pr_json")"
          # `|| true` so an oversized body's SIGPIPE doesn't abort the step
          # under pipefail (see the preflight step for the full rationale).
          pr_body="$( { jq -r '.body // ""' <<< "$pr_json" || true; } | head -c 4000)"
          author_comments_block="$( { jq -r '
            .author.login as $author |
            [
              .comments[]?
              | select(.author.login == $author)
              | "- @" + .author.login + " (" + (.createdAt // "unknown time") + "):\n" + (.body // "")
            ] | join("\n\n---\n\n")
          ' <<< "$pr_json" || true; } | head -c 8000)"
          if [ -z "$author_comments_block" ]; then
            author_comments_block="(no author PR comments)"
          fi
          changed_files_block="$(jq -r '.files[] | "\(.path) (+\(.additions)/-\(.deletions))"' <<< "$pr_json")"
          # STANDARD gets a larger diff window than LIGHT (200KB vs 50KB).
          unified_diff="$(head -c 200000 /tmp/qwen-pr-unified.diff)"
          focus_areas="$(cat /tmp/qwen-focus-areas.json 2>/dev/null || echo '[]')"
          agents_to_run="$(cat /tmp/qwen-agents-to-run.json 2>/dev/null || echo '[]')"

          {
            printf '**PR title:** %s\n\n' "$pr_title"
            if [ -n "${ADDITIONAL_INSTRUCTIONS:-}" ]; then
              printf '**Maintainer focus:**\n%s\n\n' "$ADDITIONAL_INSTRUCTIONS"
            fi
            printf '**Changed files:**\n```\n%s\n```\n\n' "$changed_files_block"
            # See LIGHT step for rationale: never wrap the failure
            # placeholder in a ```diff fence.
            if [ "${DIFF_AVAILABLE:-true}" = "true" ]; then
              printf '**Unified diff (first 200KB):**\n```diff\n%s\n```\n\n' "$unified_diff"
            else
              printf '**Unified diff:** unavailable — `gh pr diff` failed during CI context collection. This review proceeds without diff content; rely on the changed-file list above and call this out in the review summary.\n\n'
            fi
            printf '**Preflight focus_areas (hints):**\n```json\n%s\n```\n\n' "$focus_areas"
            printf '**Preflight agents_to_run (hints):**\n```json\n%s\n```\n\n' "$agents_to_run"
            printf '**Author PR comments (first 8KB):**\n%s\n\n' "$author_comments_block"
            printf '\n\n**PR body (first 4KB):**\n%s\n' "$pr_body"
          } > /tmp/standard-pr-context.md

          node scripts/render-review-prompt.cjs \
            .qwen/preflight-standard-review-prompt.md \
            /tmp/standard-prompt-rendered.md \
            --context /tmp/standard-pr-context.md \
            --rules .qwen/review-rules.md

          out=qwen-review-stream.jsonl
          echo "::group::Qwen STANDARD review (live stream)"
          set +e
          # qwen output is model text derived from untrusted PR content.
          # Fence it so GitHub Actions does not interpret accidental or
          # prompt-injected `::workflow-command::` lines from the stream.
          stop_token="qwen-standard-stream-$(date +%s%N)"
          echo "::stop-commands::${stop_token}"
          timeout --kill-after=30s 8m qwen \
            --approval-mode default \
            --exclude-tools "$QWEN_REVIEW_DENY_TOOLS" \
            --allowed-tools "$QWEN_REVIEW_ALLOWED_TOOLS" \
            --allowed-mcp-server-names __qwen_review_no_mcp__ \
            --output-format stream-json --include-partial-messages \
            -p "Review the PR below." \
            2> >(tee /tmp/qwen-standard-stderr.log >&2) < /tmp/standard-prompt-rendered.md | tee "$out"
          status=${PIPESTATUS[0]}
          echo "::${stop_token}::"
          set -e
          echo "::endgroup::"

          status_label="complete"
          if [ "$status" -eq 124 ]; then
            status_label="timeout"
            echo "::warning::STANDARD review timed out at 8m; flushing partial output."
          elif [ "$status" -ne 0 ]; then
            # Non-zero, non-timeout exit (crash / OOM (137) / SIGINT (130) / etc.)
            status_label="error"
            echo "::warning::STANDARD review exited with status $status (non-timeout failure); flushing any partial output via accumulator."
          fi

          # Guard the parser under `set -e` (see LIGHT step for rationale).
          node scripts/parse-review-stream.cjs "$out" qwen-review-summary.md STANDARD "$status_label" \
            || { echo "::warning::parse-review-stream.cjs failed; fallback comment will fire."; : > qwen-review-summary.md; }

          if [ "$status_label" = "timeout" ]; then
            # Prepend a clear warning header so the maintainer sees the
            # review was capped at the timeout.
            {
              printf '## ⚠️ STANDARD review was time-capped at 8 min — partial output below\n\n'
              cat qwen-review-summary.md
            } > /tmp/qwen-review-summary-with-warning.md
            mv /tmp/qwen-review-summary-with-warning.md qwen-review-summary.md
          elif [ "$status_label" = "error" ]; then
            # Same partial-flush treatment for non-timeout failures.
            {
              printf '## ⚠️ STANDARD review exited with error (status %s) — partial output below\n\n' "$status"
              cat qwen-review-summary.md
            } > /tmp/qwen-review-summary-with-warning.md
            mv /tmp/qwen-review-summary-with-warning.md qwen-review-summary.md
          fi

          # Apply LIGHT's empty-placeholder guard: see the LIGHT step for
          # rationale. Match the parser's empty-stream phrase directly so a
          # short legitimate review (e.g. "LGTM — minor copy fix") survives.
          if [ -f qwen-review-summary.md ] && { ! [ -s qwen-review-summary.md ] || grep -qF 'no assistant text parsed' qwen-review-summary.md; }; then
            echo "::warning::STANDARD review produced empty / placeholder-only output; removing summary file so fallback comment fires."
            rm -f qwen-review-summary.md
          fi

      # ─── DEEP: CI-safe bundled review profile ─────────────────────────────
      #
      # DEEP adapts the bundled /review rubric into several focused passes
      # with Bash access (for `gh` inline comments). It reuses the review
      # dimensions without fetch-pr/worktree/install/autofix behavior.
      - name: 'Run DEEP review'
        id: 'review'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          steps.tier.outputs.tier == 'DEEP'
        env:
          GITHUB_TOKEN: '${{ secrets.QWEN_CODE_BOT_TOKEN || secrets.CI_BOT_PAT || secrets.GITHUB_TOKEN }}'
          OPENAI_API_KEY: '${{ secrets.REVIEW_OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.REVIEW_OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          HEAD_SHA: '${{ steps.size.outputs.head_sha }}'
          ADDITIONAL_INSTRUCTIONS: '${{ steps.pr.outputs.additional_instructions }}'
          DIFF_AVAILABLE: '${{ steps.size.outputs.diff_available }}'
        timeout-minutes: 20
        run: |-
          set -euo pipefail

          pr_json="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --json title,body,files,author,comments)"
          pr_title="$(jq -r '.title' <<< "$pr_json")"
          pr_body="$( { jq -r '.body // ""' <<< "$pr_json" || true; } | head -c 8000)"
          author_comments_block="$( { jq -r '
            .author.login as $author |
            [
              .comments[]?
              | select(.author.login == $author)
              | "- @" + .author.login + " (" + (.createdAt // "unknown time") + "):\n" + (.body // "")
            ] | join("\n\n---\n\n")
          ' <<< "$pr_json" || true; } | head -c 8000)"
          if [ -z "$author_comments_block" ]; then
            author_comments_block="(no author PR comments)"
          fi
          changed_files_block="$(jq -r '.files[] | "\(.path) (+\(.additions)/-\(.deletions))"' <<< "$pr_json")"
          unified_diff="$(cat /tmp/qwen-pr-unified.diff)"
          focus_areas="$(cat /tmp/qwen-focus-areas.json 2>/dev/null || echo '[]')"
          agents_to_run="$(cat /tmp/qwen-agents-to-run.json 2>/dev/null || echo '[]')"

          {
            printf '**PR title:** %s\n\n' "$pr_title"
            if [ -n "${ADDITIONAL_INSTRUCTIONS:-}" ]; then
              printf '**Maintainer focus:**\n%s\n\n' "$ADDITIONAL_INSTRUCTIONS"
            fi
            printf '**Changed files:**\n```\n%s\n```\n\n' "$changed_files_block"
            # See LIGHT step for rationale: never wrap the failure
            # placeholder in a ```diff fence.
            if [ "${DIFF_AVAILABLE:-true}" = "true" ]; then
              printf '**Unified diff (first 500KB):**\n```diff\n%s\n```\n\n' "$unified_diff"
            else
              printf '**Unified diff:** unavailable — `gh pr diff` failed during CI context collection. This review proceeds without diff content; rely on the changed-file list above and call this out in the review summary.\n\n'
            fi
            printf '**Preflight focus_areas (hints):**\n```json\n%s\n```\n\n' "$focus_areas"
            printf '**Preflight agents_to_run (hints):**\n```json\n%s\n```\n\n' "$agents_to_run"
            printf '**Author PR comments (first 8KB):**\n%s\n\n' "$author_comments_block"
            printf '**PR body (first 8KB):**\n%s\n' "$pr_body"
          } > /tmp/deep-pr-context.md

          echo "::group::Extract bundled review rubric for CI DEEP"
          node <<'NODE' > /tmp/bundled-review-rubric.md
          const fs = require('fs');
          const source = 'packages/core/src/skills/bundled/review/SKILL.md';
          const text = fs.readFileSync(source, 'utf8');

          function section(start, end) {
            const startIdx = text.indexOf(start);
            if (startIdx === -1) return '';
            const endIdx = end ? text.indexOf(end, startIdx + start.length) : -1;
            return text.slice(startIdx, endIdx === -1 ? undefined : endIdx).trim();
          }

          const requestedSections = [
            [
              '## Step 4: Parallel multi-dimensional review',
              '### Agent 7: Build & Test Verification',
            ],
            [
              '### Cross-file impact analysis',
              '## Step 5: Deduplicate, verify, and aggregate',
            ],
            [
              '## Step 5: Deduplicate, verify, and aggregate',
              '## Step 7: Present findings',
            ],
            ['## Exclusion Criteria', '## Guidelines'],
            ['## Guidelines', ''],
          ];
          const missingSections = [];
          const parts = [];
          for (const [start, end] of requestedSections) {
            const value = section(start, end);
            if (value) {
              parts.push(value);
            } else {
              missingSections.push(start);
            }
          }

          if (missingSections.length > 0) {
            // Never fall back to the full bundled SKILL.md here. SKILL.md
            // is written for the toolful /review skill (shell, ReadFile,
            // worktree, autofix, GitHub submission). Dumping it into the
            // CI DEEP prompt across four focus passes wastes context
            // budget and invites the model to narrate about tools it
            // does not have. Send only what we successfully extracted,
            // with an inline gap notice so the model knows the rubric is
            // partial.
            console.error(
              `::warning::Bundled review rubric headings drifted; ` +
                `using partial extracted rubric with ${parts.length} section(s). ` +
                `Missing: ${missingSections.join(', ')}`,
            );
            if (parts.length > 0) {
              const gapNotice =
                `> Note: ${missingSections.length} rubric section(s) ` +
                `could not be extracted from SKILL.md (` +
                `${missingSections.join(', ')}). Review with the partial ` +
                `rubric below; do not invent steps.`;
              process.stdout.write(gapNotice + '\n\n' + parts.join('\n\n---\n\n') + '\n');
            } else {
              process.stdout.write(
                '(bundled review rubric unavailable — proceed with the project review rules and ' +
                  'general code-review judgment)\n',
              );
            }
          } else {
            process.stdout.write(parts.join('\n\n---\n\n') + '\n');
          }
          NODE
          echo "::endgroup::"

          {
            printf '## Bundled /review rubric excerpt\n\n'
            printf 'The following rubric is extracted from '
            printf '`packages/core/src/skills/bundled/review/SKILL.md`. '
            printf 'Use it as review guidance only; do not execute its worktree, '
            printf 'autofix, or approval-submission steps. You SHOULD post inline '
            printf 'review comments via Bash as described in review-rules.md.\n\n'
            cat /tmp/bundled-review-rubric.md
            printf '\n\n## CI-collected PR context\n\n'
            cat /tmp/deep-pr-context.md
          } > /tmp/deep-ci-review-context.md

          run_deep_focus() {
            local focus="$1"
            local prompt_template="$2"
            local rendered="/tmp/deep-${focus}-prompt-rendered.md"
            local out="qwen-review-stream-${focus}.jsonl"
            local summary="qwen-review-summary-${focus}.md"
            local status=0
            local status_label="complete"

            if ! node scripts/render-review-prompt.cjs \
              "$prompt_template" \
              "$rendered" \
              --context /tmp/deep-ci-review-context.md \
              --rules .qwen/review-rules.md; then
              echo "::warning::Failed to render DEEP ${focus} prompt; omitting this section and continuing with remaining focus passes."
              rm -f "$summary"
              return 1
            fi

            echo "::group::Qwen DEEP ${focus} review (live stream-json events)"
            set +e
            # qwen output is model text derived from untrusted PR content.
            # Fence it so GitHub Actions does not interpret accidental or
            # prompt-injected `::workflow-command::` lines from the stream.
            local stop_token
            stop_token="qwen-deep-stream-${focus}-$(date +%s%N)"
            echo "::stop-commands::${stop_token}"
            timeout --kill-after=20s 4m qwen \
              --approval-mode default \
              --exclude-tools "$QWEN_REVIEW_DENY_TOOLS" \
              --allowed-tools "$QWEN_REVIEW_ALLOWED_TOOLS" \
              --allowed-mcp-server-names __qwen_review_no_mcp__ \
              --output-format stream-json --include-partial-messages \
              -p "Review the PR below." \
              2> >(tee "/tmp/qwen-deep-${focus}-stderr.log" >&2) < "$rendered" | tee "$out"
            status=${PIPESTATUS[0]}
            echo "::${stop_token}::"
            set -e
            echo "::endgroup::"

            if [ "$status" -eq 124 ]; then
              status_label="timeout"
              echo "::warning::DEEP ${focus} review timed out at 4m; flushing partial output."
            elif [ "$status" -ne 0 ]; then
              status_label="error"
              echo "::warning::DEEP ${focus} review exited with status $status; flushing any partial output."
            fi

            node scripts/parse-review-stream.cjs "$out" "$summary" "DEEP-${focus}" "$status_label" \
              || { echo "::warning::parse-review-stream.cjs failed for ${focus}; continuing with remaining sections."; : > "$summary"; }

            if [ "$status_label" = "timeout" ]; then
              {
                printf '## ⚠️ DEEP %s review was time-capped at 4 min — partial output below\n\n' "$focus"
                cat "$summary"
              } > "/tmp/${summary}.with-warning"
              mv "/tmp/${summary}.with-warning" "$summary"
            elif [ "$status_label" = "error" ]; then
              {
                printf '## ⚠️ DEEP %s review exited with error (status %s) — partial output below\n\n' "$focus" "$status"
                cat "$summary"
              } > "/tmp/${summary}.with-warning"
              mv "/tmp/${summary}.with-warning" "$summary"
            fi

            if [ -f "$summary" ] && { ! [ -s "$summary" ] || grep -qF 'no assistant text parsed' "$summary"; }; then
              echo "::warning::DEEP ${focus} review produced empty / placeholder-only output; omitting this section."
              rm -f "$summary"
            fi

            # Caller treats "summary file absent" as this pass failing,
            # so the DEEP step can exit non-zero when every pass fails.
            [ -e "$summary" ]
          }

          deep_focus_passes=(
            "correctness-security|.qwen/deep-review-correctness-security-prompt.md"
            "test-coverage|.qwen/deep-review-test-coverage-prompt.md"
            "maintainability-performance|.qwen/deep-review-maintainability-performance-prompt.md"
            "undirected-audit|.qwen/deep-review-undirected-audit-prompt.md"
          )
          deep_unusable_section_count=0
          for pass in "${deep_focus_passes[@]}"; do
            focus="${pass%%|*}"
            prompt_template="${pass#*|}"
            if run_deep_focus "$focus" "$prompt_template"; then
              :
            else
              deep_unusable_section_count=$((deep_unusable_section_count + 1))
            fi
          done

          section_count=0
          : > /tmp/deep-combined-body.md
          for pass in "${deep_focus_passes[@]}"; do
            focus="${pass%%|*}"
            summary="qwen-review-summary-${focus}.md"
            if [ -s "$summary" ]; then
              if [ "$section_count" -gt 0 ]; then
                printf '\n\n---\n\n' >> /tmp/deep-combined-body.md
              fi
              cat "$summary" >> /tmp/deep-combined-body.md
              section_count=$((section_count + 1))
            fi
          done

          if [ "$section_count" -gt 0 ]; then
            {
              printf '## Qwen Code Review (DEEP)\n\n'
              cat /tmp/deep-combined-body.md
            } > qwen-review-summary.md
          else
            : > qwen-review-summary.md
          fi

          if [ -f qwen-review-summary.md ] && { ! [ -s qwen-review-summary.md ] || grep -qF 'no assistant text parsed' qwen-review-summary.md; }; then
            echo "::warning::DEEP review produced no usable focused sections; removing summary file so fallback comment fires."
            rm -f qwen-review-summary.md
          fi

          echo "::group::Parsed review summary"
          # This is also model-derived markdown; keep the log display inert.
          stop_token="qwen-deep-summary-$(date +%s%N)"
          echo "::stop-commands::${stop_token}"
          cat qwen-review-summary.md 2>/dev/null || echo "(summary file removed by near-empty guard; fallback comment will fire)"
          echo "::${stop_token}::"
          echo "::endgroup::"

          # Surface "every DEEP pass failed" as a red step in the GitHub
          # Actions UI. Without this, the step exits 0 (the previous tail
          # commands all succeed) and the only failure signal is the
          # fallback PR comment several steps removed from the actual
          # failure. The always()-gated fallback step still fires.
          if [ "$section_count" -eq 0 ]; then
            echo "::error::DEEP review produced no usable focused sections across $deep_unusable_section_count pass(es); fallback comment will be posted."
            exit 1
          fi

      - name: 'Post dry-run summary'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          steps.pr.outputs.should_comment != 'true' &&
          hashFiles('qwen-review-summary.md') != ''
        env:
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          EFFECTIVE_TIER: '${{ steps.tier.outputs.tier }}'
          EXCEEDS_REVIEW_THRESHOLD: '${{ steps.size.outputs.exceeds_review_threshold }}'
          CHANGED_LINES: '${{ steps.size.outputs.changed_lines }}'
          REVIEW_SIZE_THRESHOLD: '${{ steps.size.outputs.review_size_threshold }}'
        run: |-
          {
            printf '### Qwen PR review dry run\n\n'
            printf 'Completed %s review for PR #%s without posting PR comments.\n\n' \
              "$EFFECTIVE_TIER" "$PR_NUMBER"
            if [ "$EXCEEDS_REVIEW_THRESHOLD" = "true" ]; then
              printf '#### Large PR warning\n\n'
              printf 'This PR has %s reviewable lines, above the configured %s-line AI-review guidance. The automated review still ran, but findings may be less complete on oversized diffs.\n\n' \
                "$CHANGED_LINES" "$REVIEW_SIZE_THRESHOLD"
            fi
            printf 'Review logs are available in this workflow run.\n\n'
            printf '#### Review content (would be posted)\n\n'
            cat qwen-review-summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      # Post the review markdown produced by whichever tier-execution step
      # ran. All tier steps write to the same file (qwen-review-summary.md),
      # so this step is tier-agnostic — it just needs the file to exist.
      - name: 'Post review summary comment'
        id: 'post-summary'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          steps.pr.outputs.should_comment == 'true' &&
          hashFiles('qwen-review-summary.md') != ''
        env:
          # Post the review as the qwen-code-bot identity when available,
          # so PR comments are visually distinct from generic CI bot
          # comments (`github-actions[bot]`). Falls back to GITHUB_TOKEN;
          # qwen itself never receives that token.
          GITHUB_TOKEN: '${{ secrets.QWEN_CODE_BOT_TOKEN || secrets.CI_BOT_PAT || secrets.GITHUB_TOKEN }}'
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          EFFECTIVE_TIER: '${{ steps.tier.outputs.tier }}'
          EXCEEDS_REVIEW_THRESHOLD: '${{ steps.size.outputs.exceeds_review_threshold }}'
          CHANGED_LINES: '${{ steps.size.outputs.changed_lines }}'
          REVIEW_SIZE_THRESHOLD: '${{ steps.size.outputs.review_size_threshold }}'
        run: |-
          set -euo pipefail

          summary_bytes=$(wc -c < qwen-review-summary.md)
          {
            head -c 60000 qwen-review-summary.md
            if [ "$summary_bytes" -gt 60000 ]; then
              printf '\n\n_Review summary was truncated at 60KB. See the workflow logs for the full output._\n'
            fi
            # shellcheck disable=SC2016
            if [ "$EXCEEDS_REVIEW_THRESHOLD" = "true" ]; then
              printf '\n\n---\n_Qwen Code `/review` · `%s` · tier `%s` · %s lines (%s threshold)_\n' \
                "${OPENAI_MODEL:-unknown}" "${EFFECTIVE_TIER:-unknown}" \
                "$CHANGED_LINES" "$REVIEW_SIZE_THRESHOLD"
            else
              printf '\n\n---\n_Qwen Code `/review` · `%s` · tier `%s`_\n' \
                "${OPENAI_MODEL:-unknown}" "${EFFECTIVE_TIER:-unknown}"
            fi
          } > qwen-pr-review-summary-comment.md

          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file qwen-pr-review-summary-comment.md

      # Fires whenever a comment was expected but 'Post review summary
      # comment' did not successfully post one. `always()` is required:
      # the gap this closes is the SUCCESS path — a tier step can exit 0
      # yet produce no parseable output, the near-empty guard then deletes
      # the summary file, 'Post review summary comment' SKIPS (its
      # hashFiles gate is false, so it does not fail), and the job ends
      # green. Gating on `failure()`/`cancelled()` alone would let that
      # run leave nothing on the PR — breaking the always-emit guarantee.
      # `steps.post-summary.outcome != 'success'` captures all three
      # misses: skipped (no file), failure (gh error), cancelled. The
      # `should_review == 'true'` gate keeps this from firing when the
      # slash-command parser intentionally declined to run a review.
      # The fallback's own `gh pr comment` ends with `|| true` so the step
      # never causes a secondary cascade failure.
      - name: 'Post fallback comment on review failure'
        if: |-
          always() &&
          steps.size.outputs.should_review == 'true' &&
          steps.pr.outputs.should_comment == 'true' &&
          steps.post-summary.outcome != 'success'
        env:
          # Same qwen-code-bot identity as the happy-path 'Post review
          # summary comment' step (see comment there).
          GITHUB_TOKEN: '${{ secrets.QWEN_CODE_BOT_TOKEN || secrets.CI_BOT_PAT || secrets.GITHUB_TOKEN }}'
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          RUN_URL: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          EXCEEDS_REVIEW_THRESHOLD: '${{ steps.size.outputs.exceeds_review_threshold }}'
          CHANGED_LINES: '${{ steps.size.outputs.changed_lines }}'
          REVIEW_SIZE_THRESHOLD: '${{ steps.size.outputs.review_size_threshold }}'
        run: |-
          set -euo pipefail

          # Case 2 (post-summary failed but the review markdown exists on
          # disk): the review itself succeeded — only delivery failed
          # (gh rate limit / transient API error). Re-post the actual
          # review content instead of a generic stub; the transient error
          # has very likely cleared in the seconds since. Case 1 (no
          # markdown at all) falls through to the generic failure note.
          # Match the tier steps' new placeholder-text guard: the tier
          # steps already delete the file when the parser only emitted
          # `(no assistant text parsed; ...)`, but check defensively here
          # so a future change to the deletion logic can't push the
          # placeholder through this retry path.
          if [ -f qwen-review-summary.md ] && [ -s qwen-review-summary.md ] && ! grep -qF 'no assistant text parsed' qwen-review-summary.md; then
            summary_bytes=$(wc -c < qwen-review-summary.md)
            {
              head -c 60000 qwen-review-summary.md
              if [ "$summary_bytes" -gt 60000 ]; then
                printf '\n\n_Review summary was truncated at 60KB. See the workflow logs for the full output._\n'
              fi
              if [ "$EXCEEDS_REVIEW_THRESHOLD" = "true" ]; then
                printf '\n\n---\n_Qwen Code automated review (retry) · %s lines (%s threshold) · %s_\n' \
                  "$CHANGED_LINES" "$REVIEW_SIZE_THRESHOLD" "$RUN_URL"
              else
                printf '\n\n---\n_Qwen Code automated review — the first comment delivery attempt failed; this is an automatic retry. Workflow run: %s_\n' "$RUN_URL"
              fi
            } > qwen-pr-review-failure-comment.md
          else
            {
              printf '_Qwen Code automated PR review did not complete successfully. See the workflow logs for details: %s_\n' "$RUN_URL"
              if [ "$EXCEEDS_REVIEW_THRESHOLD" = "true" ]; then
                printf '\nLarge PR warning: this PR has %s reviewable lines, above the configured %s-line AI-review guidance.\n' \
                  "$CHANGED_LINES" "$REVIEW_SIZE_THRESHOLD"
              fi
              printf "\nThis is an automated message; please retry by commenting \`@qwen-code /review\` once the underlying issue is resolved.\n"
            } > qwen-pr-review-failure-comment.md
          fi
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file qwen-pr-review-failure-comment.md || true
