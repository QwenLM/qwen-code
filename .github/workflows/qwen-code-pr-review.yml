name: 'Qwen Pull Request Review'

on:
  pull_request_target:
    types: ['opened']
  issue_comment:
    types: ['created']
  pull_request_review_comment:
    types: ['created']
  pull_request_review:
    types: ['submitted']
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: 'number'

jobs:
  review-pr:
    if: |-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' &&
       github.event.action == 'opened' &&
       (github.event.pull_request.author_association == 'OWNER' ||
        github.event.pull_request.author_association == 'MEMBER' ||
        github.event.pull_request.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@qwen /review') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@qwen /review') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@qwen /review') &&
        (github.event.review.author_association == 'OWNER' ||
         github.event.review.author_association == 'MEMBER' ||
         github.event.review.author_association == 'COLLABORATOR'))
    concurrency:
      group: 'qwen-pr-review-${{ github.event.issue.number || github.event.pull_request.number || github.event.inputs.pr_number }}'
      cancel-in-progress: true
    timeout-minutes: 30
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      pull-requests: 'write'
      issues: 'write'
    env:
      GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
      OPENAI_API_KEY: '${{ secrets.OPENAI_API_KEY }}'
      OPENAI_BASE_URL: '${{ secrets.OPENAI_BASE_URL }}'
      OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
      QWEN_PR_REVIEW_MAX_CHANGED_LINES: "${{ vars.QWEN_PR_REVIEW_MAX_CHANGED_LINES || '1500' }}"
      QWEN_SANDBOX: 'false'
    steps:
      - name: 'Checkout base branch'
        uses: 'actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8' # ratchet:actions/checkout@v5
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          fetch-depth: 0

      - name: 'Resolve PR context'
        id: 'pr'
        env:
          EVENT_NAME: '${{ github.event_name }}'
          WORKFLOW_PR_NUMBER: '${{ github.event.inputs.pr_number }}'
        run: |-
          set -euo pipefail

          case "$EVENT_NAME" in
            workflow_dispatch)
              pr_number="$WORKFLOW_PR_NUMBER"
              comment_body=""
              ;;
            pull_request_target|pull_request_review_comment|pull_request_review)
              pr_number="$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")"
              comment_body="$(jq -r '.comment.body // .review.body // ""' "$GITHUB_EVENT_PATH")"
              ;;
            issue_comment)
              pr_number="$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")"
              comment_body="$(jq -r '.comment.body // ""' "$GITHUB_EVENT_PATH")"
              ;;
            *)
              echo "::error::Unsupported event: $EVENT_NAME"
              exit 1
              ;;
          esac

          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
            echo "::error::Could not resolve pull request number"
            exit 1
          fi

          additional_instructions=""
          if printf '%s' "$comment_body" | grep -q '@qwen /review'; then
            additional_instructions="$(
              printf '%s' "$comment_body" |
                sed 's/.*@qwen \/review//' |
                sed 's/^[[:space:]]*//'
            )"
            # Hard-cap to 2KB to keep prompt-injection surface bounded.
            # Reviewers should keep instructions short.
            additional_instructions="$(printf '%s' "$additional_instructions" | head -c 2048)"
          fi

          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          output_delimiter="QWEN_REVIEW_INSTRUCTIONS_$(date +%s%N)"
          {
            echo "additional_instructions<<$output_delimiter"
            printf '%s\n' "$additional_instructions"
            echo "$output_delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: 'Check review configuration'
        run: |-
          set -euo pipefail

          if [ -z "${OPENAI_MODEL:-}" ]; then
            echo "::error::Repository variable QWEN_PR_REVIEW_MODEL is required for this workflow."
            exit 1
          fi

          if ! printf '%s' "$QWEN_PR_REVIEW_MAX_CHANGED_LINES" | grep -Eq '^[0-9]+$'; then
            echo "::error::QWEN_PR_REVIEW_MAX_CHANGED_LINES must be an integer."
            exit 1
          fi

          # Reject 0 (would block every PR) and absurdly large values (would defeat the size gate).
          if [ "$QWEN_PR_REVIEW_MAX_CHANGED_LINES" -lt 100 ] || [ "$QWEN_PR_REVIEW_MAX_CHANGED_LINES" -gt 50000 ]; then
            echo "::error::QWEN_PR_REVIEW_MAX_CHANGED_LINES must be between 100 and 50000 (got $QWEN_PR_REVIEW_MAX_CHANGED_LINES)."
            exit 1
          fi

          echo "Using Qwen PR review model: $OPENAI_MODEL"
          echo "Max changed lines before split recommendation: $QWEN_PR_REVIEW_MAX_CHANGED_LINES"

      - name: 'Check PR size'
        id: 'size'
        env:
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
        run: |-
          set -euo pipefail

          pr_json="$(gh pr view "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json additions,deletions,changedFiles,title,baseRefName,headRefName)"
          additions="$(jq -r '.additions' <<< "$pr_json")"
          deletions="$(jq -r '.deletions' <<< "$pr_json")"
          changed_files="$(jq -r '.changedFiles' <<< "$pr_json")"
          changed_lines=$((additions + deletions))

          echo "changed_lines=$changed_lines" >> "$GITHUB_OUTPUT"
          echo "changed_files=$changed_files" >> "$GITHUB_OUTPUT"

          if [ "$changed_lines" -gt "$QWEN_PR_REVIEW_MAX_CHANGED_LINES" ]; then
            echo "should_review=false" >> "$GITHUB_OUTPUT"
            {
              printf 'This PR changes %s lines across %s files, which is above the current automated review threshold of %s changed lines.\n\n' \
                "$changed_lines" "$changed_files" "$QWEN_PR_REVIEW_MAX_CHANGED_LINES"
              printf 'Please consider splitting it into smaller, focused PRs before requesting a full Qwen Code review. Smaller PRs are easier to validate, easier to dogfood, and less likely to mix product direction, refactoring, and implementation details in one review.\n\n'
              printf '_Qwen Code PR review did not run a detailed code review for this oversized changeset. Model configured for review: `%s`._\n' \
                "$OPENAI_MODEL"
            } > qwen-pr-review-size-comment.md
            gh pr comment "$PR_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file qwen-pr-review-size-comment.md
          else
            echo "should_review=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Setup Node.js'
        if: |-
          steps.size.outputs.should_review == 'true'
        uses: 'actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020' # ratchet:actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Build local Qwen Code CLI'
        if: |-
          steps.size.outputs.should_review == 'true'
        run: |-
          set -euo pipefail
          npm ci
          npm run build
          npm run bundle
          # Expose `qwen` on PATH so child processes spawned by the review agent
          # (e.g. `qwen review fetch-pr`, `qwen review pr-context`) can invoke
          # the CLI by name. The workflow itself starts the agent via
          # `node dist/cli.js`, so the symlink is only consumed downstream.
          mkdir -p .qwen/bin
          ln -sf "$PWD/dist/cli.js" .qwen/bin/qwen
          echo "$PWD/.qwen/bin" >> "$GITHUB_PATH"

      - name: 'Run bundled Qwen PR review'
        id: 'review'
        if: |-
          steps.size.outputs.should_review == 'true'
        env:
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          QWEN_REVIEW_ADDITIONAL_INSTRUCTIONS: '${{ steps.pr.outputs.additional_instructions }}'
        run: |-
          set -euo pipefail

          export PATH="$PWD/.qwen/bin:$PATH"
          node dist/cli.js \
            --approval-mode yolo \
            --core-tools "task,run_shell_command,grep_search,read_file,write_file,glob" \
            --prompt "/review $PR_NUMBER --comment --ci"

      - name: 'Post fallback comment on review failure'
        if: |-
          failure() && steps.review.conclusion == 'failure'
        env:
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          RUN_URL: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
        run: |-
          set -euo pipefail

          {
            printf '_Qwen Code automated PR review did not complete successfully. See the workflow logs for details: %s_\n' "$RUN_URL"
            printf '\nThis is an automated message; please retry by commenting `@qwen /review` once the underlying issue is resolved.\n'
          } > qwen-pr-review-failure-comment.md
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file qwen-pr-review-failure-comment.md || true
