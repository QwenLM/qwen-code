name: 'Qwen Pull Request Review'

on:
  pull_request_target:
    types: ['opened', 'reopened', 'ready_for_review', 'synchronize']
  issue_comment:
    types: ['created', 'edited']
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: 'number'
      review_mode:
        description: 'Run without posting comments, or publish a PR summary comment'
        required: true
        default: 'dry-run'
        type: 'choice'
        options:
          - 'dry-run'
          - 'comment'
      tier_override:
        description: 'Force a specific tier and skip preflight triage'
        required: false
        default: 'auto'
        type: 'choice'
        options:
          - 'auto'
          - 'ultra_light'
          - 'light'
          - 'standard'
          - 'deep'
      additional_instructions:
        description: 'Optional maintainer focus for this review'
        required: false
        type: 'string'

jobs:
  review-pr:
    # NOTE (intentional, current-phase safeguard): auto-triggers and the
    # @qwen /review comment trigger are gated to OWNER/MEMBER/COLLABORATOR
    # on purpose. This workflow runs under pull_request_target with
    # repository secrets and a 5-30 min LLM deep review, so an open
    # trigger would be a denial-of-wallet / abuse surface. External
    # contributor PRs are still reviewable today — a maintainer comments
    # `@qwen /review` on the PR. Broadening auto-trigger for community
    # PRs (with per-author rate limiting) is deferred to a later phase,
    # not dropped here. See docs/design/code-review/code-review-design.md.
    #
    # NOTE: contains() below is a substring match, so '@qwen /reviewer'
    # (or any other suffix) also passes this gate. That's intentional:
    # GHA expressions cannot anchor a regex here, and the
    # 'Resolve PR context' shell step re-checks with a properly
    # end-anchored awk/grep regex (@qwen /review($|[[:space:]])) and sets
    # should_run_review=false on non-matches. The cost of the extra
    # runner spin-up on a malformed mention is a few seconds and
    # acceptable.
    if: |-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' &&
       (github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'ready_for_review' || github.event.action == 'synchronize') &&
       (github.event.pull_request.author_association == 'OWNER' ||
        github.event.pull_request.author_association == 'MEMBER' ||
        github.event.pull_request.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@qwen /review') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR'))
    concurrency:
      group: 'qwen-pr-review-${{ github.event.issue.number || github.event.pull_request.number || github.event.inputs.pr_number }}'
      cancel-in-progress: true
    # 30 min was empirically too low: a full (no-cache) 9-agent deep
    # review on a ~800-line PR exceeded it and the job was killed
    # mid-review. Incremental (synchronize) reviews are far shorter, but
    # opened/comment/dispatch run the full path. 60 min leaves headroom.
    timeout-minutes: 60
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      # 'write' is required even though we only use `gh pr comment`: the gh
      # CLI calls the GraphQL addComment mutation, which is gated on
      # pull-requests:write (not issues:write — that path is for issue
      # comments on non-PR issues). Validated by an empirical
      # workflow_dispatch run that failed with
      # "GraphQL: Resource not accessible by integration (addComment)".
      pull-requests: 'write'
    env:
      GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
      OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
      QWEN_PR_REVIEW_MAX_CHANGED_LINES: "${{ vars.QWEN_PR_REVIEW_MAX_CHANGED_LINES || '1500' }}"
    steps:
      # Security: pull_request_target runs with repository secrets, so it
      # MUST check out trusted base code (main), never the PR head.
      # workflow_dispatch is maintainer-triggered, so it runs the
      # dispatched ref's own code — this is the pre-merge dry-run path.
      - name: 'Checkout review code'
        uses: 'actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683' # v4.2.2
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          ref: "${{ github.event_name == 'workflow_dispatch' && github.ref || 'main' }}"
          fetch-depth: 0

      - name: 'Resolve PR context'
        id: 'pr'
        env:
          EVENT_NAME: '${{ github.event_name }}'
          WORKFLOW_PR_NUMBER: '${{ github.event.inputs.pr_number }}'
          WORKFLOW_REVIEW_MODE: '${{ github.event.inputs.review_mode }}'
          WORKFLOW_TIER_OVERRIDE: '${{ github.event.inputs.tier_override }}'
          WORKFLOW_ADDITIONAL_INSTRUCTIONS: '${{ github.event.inputs.additional_instructions }}'
        run: |-
          set -euo pipefail

          additional_instructions=""
          # tier_override: '' = run preflight; 'ULTRA_LIGHT'|'LIGHT'|'STANDARD'|'DEEP' = skip preflight.
          # Parsed from workflow_dispatch input or from a `--tier=X` token in
          # the issue_comment body. Always uppercased before being stored.
          tier_override=""
          case "$EVENT_NAME" in
            workflow_dispatch)
              pr_number="$WORKFLOW_PR_NUMBER"
              review_mode="${WORKFLOW_REVIEW_MODE:-dry-run}"
              additional_instructions="${WORKFLOW_ADDITIONAL_INSTRUCTIONS:-}"
              comment_body=""
              # dispatch input 'auto' means "run preflight"; anything else
              # is a forced tier.
              case "${WORKFLOW_TIER_OVERRIDE:-auto}" in
                auto|'') tier_override="" ;;
                ultra_light|light|standard|deep)
                  tier_override="$(printf '%s' "$WORKFLOW_TIER_OVERRIDE" | tr '[:lower:]' '[:upper:]')"
                  ;;
                *)
                  echo "::error::Unsupported tier_override value: $WORKFLOW_TIER_OVERRIDE"
                  exit 1
                  ;;
              esac
              ;;
            pull_request_target)
              pr_number="$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")"
              review_mode="comment"
              comment_body=""
              ;;
            issue_comment)
              pr_number="$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")"
              review_mode="comment"
              comment_body="$(jq -r '.comment.body // ""' "$GITHUB_EVENT_PATH")"
              ;;
            *)
              echo "::error::Unsupported event: $EVENT_NAME"
              exit 1
              ;;
          esac

          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
            echo "::error::Could not resolve pull request number"
            exit 1
          fi

          case "$review_mode" in
            dry-run|comment)
              ;;
            *)
              echo "::error::Unsupported review mode: $review_mode"
              exit 1
              ;;
          esac

          should_run_review="true"

          # Use grep -qE with end-boundary so '@qwen /review' does not match
          # '@qwen /reviewer' or similar variants.
          if [ "$EVENT_NAME" != "workflow_dispatch" ] && [ "$EVENT_NAME" != "pull_request_target" ]; then
            if printf '%s' "$comment_body" | grep -qE '@qwen /review($|[[:space:]])'; then
              additional_instructions="$(
                printf '%s' "$comment_body" |
                  awk '
                    BEGIN { found = 0 }
                    !found {
                      if (match($0, /@qwen \/review([[:space:]]|$)/)) {
                        found = 1
                        rest = substr($0, RSTART + RLENGTH)
                        if (length(rest) > 0) print rest
                      }
                      next
                    }
                    { print }
                  ' |
                  sed 's/^[[:space:]]*//'
              )"
            else
              should_run_review="false"
            fi
          fi

          # Parse `--tier=X` from comment body or from additional_instructions
          # (it ends up there after the regex strip above). Match: --tier=light,
          # --tier=DEEP, etc. The matched token is REMOVED from
          # additional_instructions so it doesn't leak into the review prompt.
          # Only honored when the event is issue_comment (workflow_dispatch
          # already set tier_override from its input above).
          if [ "$EVENT_NAME" = "issue_comment" ] && [ -z "$tier_override" ]; then
            if printf '%s' "$additional_instructions" | grep -qiE '(^|[[:space:]])--tier=(ultra_light|light|standard|deep)([[:space:]]|$)'; then
              tier_raw="$(printf '%s' "$additional_instructions" \
                | grep -oiE -- '--tier=(ultra_light|light|standard|deep)' \
                | head -n1 \
                | sed 's/^--tier=//')"
              tier_override="$(printf '%s' "$tier_raw" | tr '[:lower:]' '[:upper:]')"
              additional_instructions="$(printf '%s' "$additional_instructions" \
                | sed -E 's/(^|[[:space:]])--tier=(ultra_light|light|standard|deep|ULTRA_LIGHT|LIGHT|STANDARD|DEEP)([[:space:]]|$)/\1\3/g')"
            fi
          fi
          # Strip leading blank lines so the prompt doesn't start with an
          # empty line when @qwen /review is on its own line.
          additional_instructions="$(printf '%s' "$additional_instructions" | sed '/./,$!d')"
          # Keep maintainer focus text from changing the slash-command flags.
          additional_instructions="$(printf '%s' "$additional_instructions" | LC_ALL=C perl -0pe 's/(?<!\S)--comment(?!\S)/`--comment`/g')"
          # Hard-cap to 2048 characters to keep prompt-injection surface
          # bounded without using a pipe that can trip pipefail on SIGPIPE.
          # Reviewers should keep instructions short.
          additional_instructions="${additional_instructions:0:2048}"

          # Build the review prompt for qwen-code-action.
          # Pass the full PR URL so the skill can resolve owner/repo unambiguously.
          #
          # Intentionally NOT passing `/review --comment` even in comment mode:
          # the bundled skill may submit an APPROVE review when no findings are
          # found, and this workflow is comment-only (it posts the action
          # summary itself below). The dry-run vs comment distinction is
          # carried via $should_comment, not by changing the slash-command.
          review_target="${GITHUB_SERVER_URL:-https://github.com}/${GITHUB_REPOSITORY}/pull/${pr_number}"
          review_prompt="/review $review_target"
          if [ "$review_mode" = "comment" ]; then
            should_comment="true"
          else
            should_comment="false"
          fi

          if [ -n "$additional_instructions" ]; then
            review_prompt="$review_prompt

            Additional reviewer focus: $additional_instructions"
          fi

          output_delimiter="QWEN_REVIEW_PROMPT_$(date +%s%N)"
          {
            echo "number=$pr_number"
            echo "review_mode=$review_mode"
            echo "should_comment=$should_comment"
            echo "should_run_review=$should_run_review"
            echo "tier_override=$tier_override"
            echo "additional_instructions<<QWEN_REVIEW_AI_${output_delimiter}"
            printf '%s\n' "$additional_instructions"
            echo "QWEN_REVIEW_AI_${output_delimiter}"
            echo "review_prompt<<$output_delimiter"
            printf '%s\n' "$review_prompt"
            echo "$output_delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: 'Check PR size'
        id: 'size'
        if: |-
          steps.pr.outputs.should_run_review == 'true'
        env:
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          REVIEW_MODE: '${{ steps.pr.outputs.review_mode }}'
          SHOULD_COMMENT: '${{ steps.pr.outputs.should_comment }}'
        run: |-
          set -euo pipefail

          write_output() {
            echo "$1" >> "$GITHUB_OUTPUT"
          }

          if [ -z "${OPENAI_MODEL:-}" ]; then
            echo "::error::Repository variable QWEN_PR_REVIEW_MODEL is required for this workflow (maps to env var OPENAI_MODEL)."
            exit 1
          fi

          if ! printf '%s' "$QWEN_PR_REVIEW_MAX_CHANGED_LINES" | grep -Eq '^[0-9]+$'; then
            echo "::error::QWEN_PR_REVIEW_MAX_CHANGED_LINES must be an integer."
            exit 1
          fi

          if [ "$QWEN_PR_REVIEW_MAX_CHANGED_LINES" -lt 100 ] || [ "$QWEN_PR_REVIEW_MAX_CHANGED_LINES" -gt 50000 ]; then
            echo "::error::QWEN_PR_REVIEW_MAX_CHANGED_LINES must be between 100 and 50000 (got $QWEN_PR_REVIEW_MAX_CHANGED_LINES)."
            exit 1
          fi

          pr_json="$(gh pr view "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json additions,deletions,changedFiles,title,baseRefName,baseRefOid,headRefName,headRefOid)"
          additions="$(jq -r '.additions' <<< "$pr_json")"
          deletions="$(jq -r '.deletions' <<< "$pr_json")"
          changed_files="$(jq -r '.changedFiles' <<< "$pr_json")"
          title="$(jq -r '.title' <<< "$pr_json")"
          base_ref="$(jq -r '.baseRefName' <<< "$pr_json")"
          base_sha="$(jq -r '.baseRefOid // ""' <<< "$pr_json")"
          head_ref="$(jq -r '.headRefName' <<< "$pr_json")"
          head_sha="$(jq -r '.headRefOid // ""' <<< "$pr_json")"
          changed_lines=$((additions + deletions))

          # Reject empty head_sha / base_sha early. Both are queried via
          # gh pr view; an empty value almost always means gh pr view
          # partially failed.
          if [ -z "$head_sha" ]; then
            echo "::error::Could not resolve PR head SHA via gh pr view --json headRefOid."
            exit 1
          fi
          if [ -z "$base_sha" ]; then
            echo "::error::Could not resolve PR base SHA via gh pr view --json baseRefOid."
            exit 1
          fi

          # Compute the merge-base SHA, i.e., the commit where the PR's
          # history forks from the base branch. The merge base is what the
          # cache key must be scoped to, NOT baseRefOid.
          #
          # baseRefOid is the current tip of the base ref (e.g., main HEAD).
          # That value can stay fixed across reviews even when the PR
          # merges base into itself: if the author clicks "Update branch"
          # while base hasn't moved, baseRefOid is unchanged but the PR's
          # history now incorporates base's commits. A cache restored under
          # baseRefOid would then let the bundled /review skill compute
          # `git diff <oldHead>..<newHead>` across upstream commits the PR
          # did not author. The merge base, in contrast, advances whenever
          # base content enters the PR (Update branch, rebase onto newer
          # base, or base retarget), which is exactly the boundary we
          # want to invalidate the cache on.
          #
          # merge-base is best-effort: the compare endpoint can fail to
          # resolve SHAs for fork PRs in the base repo's namespace. That
          # must not abort the review (set -euo pipefail) — it only means
          # the incremental cache can't be scoped this run, so we fall
          # back to a full review rather than failing the job.
          merge_base_sha="$(gh api \
            "repos/${GITHUB_REPOSITORY}/compare/${base_sha}...${head_sha}" \
            --jq '.merge_base_commit.sha // ""' 2>/dev/null || true)"
          if [ -z "$merge_base_sha" ]; then
            echo "::warning::Could not resolve PR merge base; incremental cache will fall back to a full review this run."
          fi

          write_output "changed_lines=$changed_lines"
          write_output "changed_files=$changed_files"
          write_output "head_sha=$head_sha"
          write_output "base_sha=$base_sha"
          write_output "merge_base_sha=$merge_base_sha"
          echo "Review target: PR #$PR_NUMBER"
          echo "Review title: $title"
          echo "Review branch: $base_ref ($base_sha) <- $head_ref ($head_sha)"
          if [ -n "$merge_base_sha" ]; then
            echo "Review merge base: $merge_base_sha"
          else
            echo "Review merge base: (unresolved; full review this run)"
          fi
          echo "Review scope: $changed_files files, +$additions/-$deletions ($changed_lines changed lines)"

          if [ "$changed_lines" -gt "$QWEN_PR_REVIEW_MAX_CHANGED_LINES" ]; then
            # Size > AI-review threshold: skip AI review but DO NOT post a
            # blocking comment. Merge-blocking by oversized PR is the job
            # of the sibling workflow `pr-gate.yml` (PR Size check). This
            # step is informational only. See docs/design/pr-gate-plan.md.
            write_output "should_review=false"
            echo "::notice::PR size ($changed_lines lines) exceeds AI-review threshold ($QWEN_PR_REVIEW_MAX_CHANGED_LINES). Skipping AI review; pr-gate.yml 'PR Size' check handles merge-blocking for oversized PRs."
            {
              printf '### Qwen PR review skipped (PR too large for AI review)\n\n'
              printf 'PR size: %s lines across %s files (threshold %s).\n\n' \
                "$changed_lines" "$changed_files" "$QWEN_PR_REVIEW_MAX_CHANGED_LINES"
              printf 'Skipped automated AI review. Merge-blocking by size is handled by `pr-gate.yml` (PR Size check).\n'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            write_output "should_review=true"
          fi

      # Restore the bundled /review skill's per-PR cache only on synchronize.
      # The skill writes .qwen/review-cache/pr-<n>.json with the last reviewed
      # commit SHA so subsequent runs can scope review to the incremental
      # diff. Cache is intentionally NOT restored on opened/reopened (full
      # review) or comment / workflow_dispatch (manual re-review must not
      # short-circuit on "No new changes since last review"). See
      # docs/design/code-review/code-review-design.md §增量评审与缓存.
      #
      # Cache key uses merge_base_sha + head_sha (not baseRefOid). The
      # merge base advances whenever base content enters the PR — Update
      # branch, rebase onto newer base, or base retarget — which are
      # exactly the boundaries that should invalidate the cache. Pure
      # author pushes leave the merge base alone, so the restore-keys
      # prefix `qwen-review-<pr#>-<merge_base_sha>-` keeps matching and
      # bundled /review can still scope to the incremental diff.
      - name: 'Restore review cache'
        id: 'restore-cache'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          github.event_name == 'pull_request_target' &&
          github.event.action == 'synchronize'
        uses: 'actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830' # v4.3.0
        with:
          path: '.qwen/review-cache'
          key: 'qwen-review-${{ steps.pr.outputs.number }}-${{ steps.size.outputs.merge_base_sha }}-${{ steps.size.outputs.head_sha }}'
          restore-keys: |
            qwen-review-${{ steps.pr.outputs.number }}-${{ steps.size.outputs.merge_base_sha }}-

      # @qwen-code/qwen-code requires Node >=22; runner default is 20
      # (npm EBADENGINE). Pin Node 22 before installing/invoking qwen.
      - name: 'Set up Node.js'
        if: |-
          steps.size.outputs.should_review == 'true'
        uses: 'actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e' # v4
        with:
          node-version: '22'

      # Cache the npm download cache so the global qwen-code install is
      # offline-fast on subsequent runs (content-addressed; a stale key
      # only misses the newest tarball, never serves wrong content).
      - name: 'Cache npm for qwen-code install'
        if: |-
          steps.size.outputs.should_review == 'true'
        uses: 'actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830' # v4.3.0
        with:
          path: '~/.npm'
          key: 'qwen-npm-global-${{ runner.os }}-v1'
          restore-keys: |
            qwen-npm-global-${{ runner.os }}-

      # ─── Install qwen-code CLI (shared by preflight, LIGHT, STANDARD, DEEP) ───
      #
      # Extracted from the previous monolithic 'Run Qwen Code Review' step so
      # the same `qwen` binary is reused by the preflight LLM call and by all
      # tier-specific execution paths below. ULTRA_LIGHT does not need qwen
      # but the install is cached and cheap (~5s warm); skipping it
      # conditionally would add branching with no real saving.
      #
      # Intentionally @latest: this workflow is still in the Phase 1-3
      # bundled-action rollout (see docs/design/code-review/roadmap.md)
      # and we want every CI run to exercise the newest bundled /review
      # skill while it stabilizes — pinning a version would freeze the
      # in-progress skill iterations behind a manual bump PR. Once the
      # workflow lands and the skill cadence slows, switch this to a
      # pinned `@qwen-code/qwen-code@x.y.z` so the secret-bearing
      # pull_request_target run can't be moved by a future package
      # publish. Tracked as a follow-up; not blocking on this PR.
      - name: 'Install qwen-code CLI'
        if: |-
          steps.size.outputs.should_review == 'true'
        run: |-
          set -euo pipefail

          mkdir -p .qwen
          cat > .qwen/settings.json <<'EOF'
          {
            "security": { "folderTrust": { "enabled": false } },
            "tools": { "approvalMode": "yolo" },
            "sandbox": false
          }
          EOF

          echo "::group::Install qwen-code"
          npm install -g @qwen-code/qwen-code@latest
          qwen --version
          echo "::endgroup::"

      # ─── Preflight triage: LLM judges blast radius, picks tier ────────────
      #
      # Skipped when the maintainer explicitly forced a tier via slash flag
      # (`@qwen /review --tier=...`) or workflow_dispatch input. Otherwise
      # runs a single qwen call against `.qwen/preflight-prompt.md` with PR
      # context appended, expecting strict JSON output. Any failure mode
      # (timeout, non-JSON, schema invalid) defaults to DEEP (P7 conservative
      # bias). See docs/design/code-review/preflight-triage.md §Preflight 实现.
      - name: 'Preflight triage'
        id: 'triage'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          steps.pr.outputs.tier_override == ''
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          OPENAI_API_KEY: '${{ secrets.REVIEW_OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.REVIEW_OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ vars.QWEN_PR_PREFLIGHT_MODEL || vars.QWEN_PR_REVIEW_MODEL }}'
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          CHANGED_LINES: '${{ steps.size.outputs.changed_lines }}'
        timeout-minutes: 5
        run: |-
          set -euo pipefail

          if [ -z "${{ vars.QWEN_PR_PREFLIGHT_MODEL }}" ]; then
            echo "::warning::vars.QWEN_PR_PREFLIGHT_MODEL is unset; preflight is falling back to the deep-review model SKU. Configure a cheaper SKU to reduce token cost — see docs/design/code-review/preflight-triage.md §关键决策 D1."
          fi

          echo "::group::Gather preflight inputs"
          pr_json="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --json title,body,additions,deletions,changedFiles,files,headRefName,baseRefName)"
          pr_title="$(jq -r '.title' <<< "$pr_json")"
          # Trim the body to keep prompt size bounded.
          pr_body="$(jq -r '.body // ""' <<< "$pr_json" | head -c 2000)"
          base_ref="$(jq -r '.baseRefName' <<< "$pr_json")"
          head_ref="$(jq -r '.headRefName' <<< "$pr_json")"
          changed_files_block="$(jq -r '.files[] | "\(.path) (+\(.additions)/-\(.deletions))"' <<< "$pr_json")"
          diff_stat="$(gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --patch | diffstat -p1 2>/dev/null || gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --patch | head -200)"
          # First ~50KB of unified diff for content judgment. Anything beyond
          # is unlikely to flip the tier — preflight is a triage step, not
          # the actual review.
          unified_diff="$(gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --patch | head -c 50000)"
          echo "::endgroup::"

          # Build the PR context body into a file so the heredoc-with-YAML
          # indentation pitfall is avoided. Variable substitution happens at
          # the shell level (printf), not the YAML level.
          {
            printf '**PR title:** %s\n\n' "$pr_title"
            printf '**Branches:** %s → %s\n\n' "$head_ref" "$base_ref"
            printf '**Changed lines:** %s\n\n' "$CHANGED_LINES"
            printf '**Changed files (path + line counts):**\n'
            printf '```\n%s\n```\n\n' "$changed_files_block"
            printf '**git diff --stat:**\n'
            printf '```\n%s\n```\n\n' "$diff_stat"
            printf '**First 50KB of unified diff:**\n'
            printf '```diff\n%s\n```\n\n' "$unified_diff"
            printf '**PR body (first 2KB):**\n%s\n' "$pr_body"
          } > /tmp/preflight-pr-context.md

          # Render the final prompt by substituting the two template markers.
          # Use node (Node 22 is on the runner already) for reliable handling
          # of any character in the substituted text.
          PR_CONTEXT_FILE=/tmp/preflight-pr-context.md \
          node -e '
            const fs = require("fs");
            const template = fs.readFileSync(".qwen/preflight-prompt.md", "utf8");
            const rules = fs.readFileSync(".qwen/review-rules.md", "utf8");
            const ctx = fs.readFileSync(process.env.PR_CONTEXT_FILE, "utf8");
            const out = template
              .replace("<<<REVIEW_RULES_MD>>>", rules)
              .replace("<<<PR_CONTEXT>>>", ctx);
            fs.writeFileSync("/tmp/preflight-prompt-rendered.md", out);
          ' || { echo "::error::Failed to render preflight prompt"; exit 1; }

          echo "::group::Run preflight LLM"
          set +e
          # `timeout 3m` kills qwen at 3 min; the step's `timeout-minutes: 5`
          # is the outer safety net (D6).
          raw_out="$(timeout 3m qwen --yolo --prompt "$(cat /tmp/preflight-prompt-rendered.md)" 2>&1)"
          qwen_status=$?
          set -e
          echo "$raw_out"
          echo "::endgroup::"

          # Default to DEEP on any failure (P7 conservative bias).
          tier="DEEP"
          rationale="preflight defaulted to DEEP"

          if [ "$qwen_status" -eq 124 ]; then
            echo "::warning::Preflight timed out at 3m; falling back to DEEP."
            rationale="preflight timed out at 3m"
          elif [ "$qwen_status" -ne 0 ]; then
            echo "::warning::Preflight exited with status $qwen_status; falling back to DEEP."
            rationale="preflight exited non-zero ($qwen_status)"
          else
            # Strip code fences if the model added them despite instructions.
            json_text="$(printf '%s' "$raw_out" | sed -E 's/^```(json)?$//; s/^```$//' | sed '/^[[:space:]]*$/d')"
            if ! parsed="$(printf '%s' "$json_text" | jq -e '. | select(.tier and .blast_radius)' 2>/dev/null)"; then
              echo "::warning::Preflight returned invalid JSON or missing required fields; falling back to DEEP."
              rationale="invalid preflight JSON"
            else
              model_tier="$(printf '%s' "$parsed" | jq -r '.tier' | tr '[:lower:]' '[:upper:]')"
              case "$model_tier" in
                ULTRA_LIGHT|LIGHT|STANDARD|DEEP)
                  tier="$model_tier"
                  rationale="$(printf '%s' "$parsed" | jq -r '.rationale // ""' | head -c 200)"
                  # Optional fields, may be empty.
                  focus_areas="$(printf '%s' "$parsed" | jq -c '.focus_areas // []')"
                  agents_to_run="$(printf '%s' "$parsed" | jq -c '.agents_to_run // []')"
                  printf '%s' "$focus_areas" > /tmp/qwen-focus-areas.json
                  printf '%s' "$agents_to_run" > /tmp/qwen-agents-to-run.json
                  ;;
                *)
                  echo "::warning::Preflight returned unknown tier value '$model_tier'; falling back to DEEP."
                  rationale="unknown tier value: $model_tier"
                  ;;
              esac
            fi
          fi

          echo "tier=$tier" >> "$GITHUB_OUTPUT"
          echo "rationale=$rationale" >> "$GITHUB_OUTPUT"
          echo "::notice::Preflight tier=$tier (rationale: $rationale)"

      # ─── Compute effective tier (override OR preflight) ────────────────────
      #
      # Final tier = `tier_override` (if set by maintainer slash flag or
      # dispatch input) else `triage.outputs.tier`. Shell-only step; no LLM
      # call. Output is used by the four tier-execution steps below.
      - name: 'Compute effective tier'
        id: 'tier'
        if: |-
          steps.size.outputs.should_review == 'true'
        env:
          TIER_OVERRIDE: '${{ steps.pr.outputs.tier_override }}'
          TRIAGE_TIER: '${{ steps.triage.outputs.tier }}'
        run: |-
          set -euo pipefail

          if [ -n "${TIER_OVERRIDE}" ]; then
            tier="$TIER_OVERRIDE"
            source="override"
          elif [ -n "${TRIAGE_TIER:-}" ]; then
            tier="$TRIAGE_TIER"
            source="preflight"
          else
            # Defensive fallback: if neither override nor preflight ran (e.g.
            # preflight step was skipped due to an upstream condition), pick
            # DEEP. Should be unreachable in practice.
            tier="DEEP"
            source="default-fallback"
          fi

          case "$tier" in
            ULTRA_LIGHT|LIGHT|STANDARD|DEEP) ;;
            *)
              echo "::error::Invalid effective tier '$tier'"
              exit 1
              ;;
          esac

          echo "tier=$tier" >> "$GITHUB_OUTPUT"
          echo "source=$source" >> "$GITHUB_OUTPUT"
          echo "::notice::Effective tier=$tier (source=$source)"

      # ─── ULTRA_LIGHT: shell-only "no deep review needed" comment ──────────
      - name: 'Compose ULTRA_LIGHT verdict'
        id: 'ultra-light'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          steps.tier.outputs.tier == 'ULTRA_LIGHT'
        env:
          RATIONALE: '${{ steps.triage.outputs.rationale }}'
          CHANGED_FILES: '${{ steps.size.outputs.changed_files }}'
          CHANGED_LINES: '${{ steps.size.outputs.changed_lines }}'
        run: |-
          set -euo pipefail
          {
            printf '## Qwen Code Review — ULTRA_LIGHT\n\n'
            printf '_Preflight triage decided this PR does not need a deep review._\n\n'
            if [ -n "${RATIONALE:-}" ]; then
              printf '**Rationale:** %s\n\n' "$RATIONALE"
            fi
            # printf needs `--` to stop treating the leading dash as a flag
            # on some bash builds (caught by CI dry-run on 2026-05-20).
            printf -- '- Changed files: %s\n' "$CHANGED_FILES"
            printf -- '- Changed lines: %s\n\n' "$CHANGED_LINES"
            printf '_Reply `@qwen /review --tier=light|standard|deep` to force a deeper review._\n'
          } > qwen-review-summary.md

      # ─── LIGHT: single-shot qwen with focused prompt ──────────────────────
      - name: 'Run LIGHT review'
        id: 'light'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          steps.tier.outputs.tier == 'LIGHT'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          OPENAI_API_KEY: '${{ secrets.REVIEW_OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.REVIEW_OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
        timeout-minutes: 5
        run: |-
          set -euo pipefail

          pr_json="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --json title,body,files)"
          pr_title="$(jq -r '.title' <<< "$pr_json")"
          pr_body="$(jq -r '.body // ""' <<< "$pr_json" | head -c 2000)"
          changed_files_block="$(jq -r '.files[] | "\(.path) (+\(.additions)/-\(.deletions))"' <<< "$pr_json")"
          unified_diff="$(gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --patch | head -c 50000)"
          focus_areas="$(cat /tmp/qwen-focus-areas.json 2>/dev/null || echo '[]')"

          {
            printf '**PR title:** %s\n\n' "$pr_title"
            printf '**Changed files:**\n```\n%s\n```\n\n' "$changed_files_block"
            printf '**Unified diff (first 50KB):**\n```diff\n%s\n```\n\n' "$unified_diff"
            printf '**Preflight focus_areas (hints, not mandatory):**\n```json\n%s\n```\n\n' "$focus_areas"
            printf '**PR body (first 2KB):**\n%s\n' "$pr_body"
          } > /tmp/light-pr-context.md

          PR_CONTEXT_FILE=/tmp/light-pr-context.md \
          node -e '
            const fs = require("fs");
            const template = fs.readFileSync(".qwen/preflight-light-review-prompt.md", "utf8");
            const ctx = fs.readFileSync(process.env.PR_CONTEXT_FILE, "utf8");
            fs.writeFileSync("/tmp/light-prompt-rendered.md", template.replace("<<<PR_CONTEXT>>>", ctx));
          '

          out=qwen-review-stream.jsonl
          echo "::group::Qwen LIGHT review (live stream)"
          set +e
          timeout --kill-after=15s 3m qwen --yolo \
            --output-format stream-json --include-partial-messages \
            --prompt "$(cat /tmp/light-prompt-rendered.md)" 2>&1 | tee "$out"
          status=${PIPESTATUS[0]}
          set -e
          echo "::endgroup::"

          status_label="complete"
          if [ "$status" -eq 124 ]; then
            status_label="timeout"
            echo "::warning::LIGHT review timed out at 3m; flushing partial output via accumulator."
          fi

          node scripts/parse-review-stream.cjs "$out" qwen-review-summary.md LIGHT "$status_label"

          if [ "$status_label" = "timeout" ]; then
            # Prepend warning so maintainer sees the review was capped.
            {
              printf '## ⚠️ LIGHT review was time-capped at 3 min — partial output below\n\n'
              cat qwen-review-summary.md
            } > /tmp/qwen-review-summary-with-warning.md
            mv /tmp/qwen-review-summary-with-warning.md qwen-review-summary.md
          fi

          # If the accumulator only wrote its "no assistant text parsed"
          # placeholder, delete the file so the post-summary step skips and
          # the fallback comment fires instead of posting a useless stub.
          # 200-char threshold leaves room for the metadata header + small
          # actual reviews (a one-liner finding is still ≥ 200 chars when
          # wrapped in the markdown skeleton).
          if [ "$(wc -c < qwen-review-summary.md)" -lt 200 ]; then
            echo "::warning::LIGHT review produced near-empty output; removing summary file so fallback comment fires."
            rm -f qwen-review-summary.md
          fi

      # ─── STANDARD: single-shot qwen with structured prompt ─────────────────
      - name: 'Run STANDARD review'
        id: 'standard'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          steps.tier.outputs.tier == 'STANDARD'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          OPENAI_API_KEY: '${{ secrets.REVIEW_OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.REVIEW_OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
        timeout-minutes: 10
        run: |-
          set -euo pipefail

          pr_json="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --json title,body,files)"
          pr_title="$(jq -r '.title' <<< "$pr_json")"
          pr_body="$(jq -r '.body // ""' <<< "$pr_json" | head -c 4000)"
          changed_files_block="$(jq -r '.files[] | "\(.path) (+\(.additions)/-\(.deletions))"' <<< "$pr_json")"
          # STANDARD gets a larger diff window than LIGHT (200KB vs 50KB)
          unified_diff="$(gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --patch | head -c 200000)"
          focus_areas="$(cat /tmp/qwen-focus-areas.json 2>/dev/null || echo '[]')"
          agents_to_run="$(cat /tmp/qwen-agents-to-run.json 2>/dev/null || echo '[]')"

          {
            printf '**PR title:** %s\n\n' "$pr_title"
            printf '**Changed files:**\n```\n%s\n```\n\n' "$changed_files_block"
            printf '**Unified diff (first 200KB):**\n```diff\n%s\n```\n\n' "$unified_diff"
            printf '**Preflight focus_areas (hints):**\n```json\n%s\n```\n\n' "$focus_areas"
            printf '**Preflight agents_to_run (hints):**\n```json\n%s\n```\n\n' "$agents_to_run"
            printf '**Repository review rules (.qwen/review-rules.md):**\n'
            cat .qwen/review-rules.md
            printf '\n\n**PR body (first 4KB):**\n%s\n' "$pr_body"
          } > /tmp/standard-pr-context.md

          PR_CONTEXT_FILE=/tmp/standard-pr-context.md \
          node -e '
            const fs = require("fs");
            const template = fs.readFileSync(".qwen/preflight-standard-review-prompt.md", "utf8");
            const ctx = fs.readFileSync(process.env.PR_CONTEXT_FILE, "utf8");
            fs.writeFileSync("/tmp/standard-prompt-rendered.md", template.replace("<<<PR_CONTEXT>>>", ctx));
          '

          out=qwen-review-stream.jsonl
          echo "::group::Qwen STANDARD review (live stream)"
          set +e
          timeout --kill-after=30s 8m qwen --yolo \
            --output-format stream-json --include-partial-messages \
            --prompt "$(cat /tmp/standard-prompt-rendered.md)" 2>&1 | tee "$out"
          status=${PIPESTATUS[0]}
          set -e
          echo "::endgroup::"

          status_label="complete"
          if [ "$status" -eq 124 ]; then
            status_label="timeout"
            echo "::warning::STANDARD review timed out at 8m; flushing partial output."
          fi

          node scripts/parse-review-stream.cjs "$out" qwen-review-summary.md STANDARD "$status_label"

          if [ "$status_label" = "timeout" ]; then
            # Prepend a clear warning header so the maintainer sees the
            # review was capped at the timeout.
            {
              printf '## ⚠️ STANDARD review was time-capped at 8 min — partial output below\n\n'
              cat qwen-review-summary.md
            } > /tmp/qwen-review-summary-with-warning.md
            mv /tmp/qwen-review-summary-with-warning.md qwen-review-summary.md
          fi

      # ─── DEEP: bundled /review skill (Phase 1-3 path, with parser update) ──
      #
      # Direct invocation instead of QwenLM/qwen-code-action.
      # The action wraps the CLI in `QWEN_RESPONSE=$(qwen ...)` command
      # substitution, which buffers ALL stdout until the process exits —
      # so a slow or stuck bundled /review produced zero observable
      # output for the whole job and could not be diagnosed. Calling
      # qwen ourselves and piping through `tee` streams progress to the
      # live job log in real time, and an explicit `timeout` makes a
      # stall fail fast with a clear error instead of a silent job kill.
      #
      # Timeout reduced from Phase 1-3's 50m to 25m: with always-emit
      # accumulator (scripts/parse-review-stream.cjs) timeouts now flush a
      # partial review instead of failing silently, so the previous "give
      # it as much time as possible" tradeoff no longer applies. A 25m
      # hard cap aligns with §G2 wall-time targets.
      - name: 'Run DEEP review (bundled skill)'
        id: 'review'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          steps.tier.outputs.tier == 'DEEP'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          OPENAI_API_KEY: '${{ secrets.REVIEW_OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.REVIEW_OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
          REVIEW_PROMPT: '${{ steps.pr.outputs.review_prompt }}'
          SHOULD_COMMENT: '${{ steps.pr.outputs.should_comment }}'
          FOCUS_AREAS_FILE: '/tmp/qwen-focus-areas.json'
        timeout-minutes: 30
        run: |-
          set -euo pipefail

          # CI-lightweight steering applies to EVERY CI run (comment and
          # dry-run): the full bundled /review (9 agents incl. Agent 7 =
          # npm ci + whole-monorepo build/test) cannot finish a heavy PR
          # within the job timeout, and the repo's own CI already
          # builds/tests every PR, so Agent 7 is redundant here. The
          # extra "do not post" clause is added only for dry-run.
          # Prompt-level steering only — the bundled SKILL.md is unchanged.
          #
          # Validation Evidence verdict: the exact section name, PRESENT /
          # MISSING semantics, and the verbatim advisory closing line all
          # live in .qwen/review-rules.md ("Validation And Dogfooding").
          # The bundled /review skill is expected to load that file, so the
          # prompt only references it instead of restating the spec — that
          # way edits to review-rules.md don't drift from the workflow.
          focus_areas_text=""
          if [ -s "$FOCUS_AREAS_FILE" ]; then
            focus_areas_text="$(jq -r 'if length>0 then "\nPreflight focus_areas: " + (join("; ")) else "" end' "$FOCUS_AREAS_FILE" 2>/dev/null || true)"
          fi
          prompt="${REVIEW_PROMPT}${focus_areas_text}

          CI LIGHTWEIGHT MODE — follow these execution constraints, they
          override the skill's defaults for this run:
          1. Do NOT run \`npm ci\`/install, build, or the test suite, and
             do NOT launch Agent 7 (Build & Test). The repository's own
             CI already builds and tests this PR; it is redundant here.
          2. Run Agents 1-5 (Correctness, Security, Code Quality,
             Performance, Test Coverage) and ONE consolidated audit
             instead of the three separate 6a/6b/6c personas.
          3. Skip the local linter/typecheck step (Step 3).
          4. Apply the \`## Validation Evidence\` requirement defined in
             .qwen/review-rules.md (section 'Validation And Dogfooding')
             exactly as written there — same section title, same PRESENT/
             MISSING verdict, same verbatim advisory closing line. Do not
             paraphrase.
          5. Produce the complete code review."
          if [ "${SHOULD_COMMENT:-}" != "true" ]; then
            prompt="${prompt}

          DRY RUN: print the full review to stdout and do NOT post
          anything to GitHub — no gh pr comment, no gh pr review, no
          GitHub API writes, no inline comments. Output only; the
          maintainer reads it from the CI log."
          fi

          out=qwen-review-stream.jsonl
          # Plain `qwen ... | tee` does NOT stream: qwen is a Node CLI and
          # Node full-buffers stdout when it is a pipe, so nothing shows
          # until exit. `--output-format stream-json --include-partial-
          # messages` is qwen's purpose-built incremental event stream —
          # each event is written as it happens, so `tee` shows real
          # progress in the live job log. `timeout` bounds a stall.
          echo "::group::Qwen DEEP review (live stream-json events)"
          set +e
          timeout --kill-after=60s 25m qwen --yolo \
            --output-format stream-json --include-partial-messages \
            --prompt "$prompt" 2>&1 | tee "$out"
          status=${PIPESTATUS[0]}
          set -e
          echo "::endgroup::"

          # Accumulator parser: collects ALL assistant text segments and
          # writes to qwen-review-summary.md. Even if qwen was killed mid-
          # stream by `timeout 25m`, the on-disk JSONL captured everything
          # the model emitted up to that point. This is the G3 always-emit
          # contract — partial reviews must reach the PR.
          status_label="complete"
          if [ "$status" -eq 124 ]; then
            status_label="timeout"
            echo "::warning::DEEP review timed out at 25m; flushing partial output."
          fi

          node scripts/parse-review-stream.cjs "$out" qwen-review-summary.md DEEP "$status_label"

          if [ "$status_label" = "timeout" ]; then
            {
              printf '## ⚠️ DEEP review was time-capped at 25 min — partial output below\n\n'
              cat qwen-review-summary.md
            } > /tmp/qwen-review-summary-with-warning.md
            mv /tmp/qwen-review-summary-with-warning.md qwen-review-summary.md
          fi

          echo "::group::Parsed review summary"
          cat qwen-review-summary.md
          echo "::endgroup::"

      - name: 'Post dry-run summary'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          steps.pr.outputs.should_comment != 'true' &&
          hashFiles('qwen-review-summary.md') != ''
        env:
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          EFFECTIVE_TIER: '${{ steps.tier.outputs.tier }}'
        run: |-
          {
            printf '### Qwen PR review dry run\n\n'
            printf 'Completed %s review for PR #%s without posting PR comments.\n\n' \
              "$EFFECTIVE_TIER" "$PR_NUMBER"
            printf 'Review logs are available in this workflow run.\n\n'
            printf '#### Review content (would be posted)\n\n'
            cat qwen-review-summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      # Post the review markdown produced by whichever tier-execution step
      # ran. All tier steps write to the same file (qwen-review-summary.md),
      # so this step is tier-agnostic — it just needs the file to exist.
      - name: 'Post review summary comment'
        id: 'post-summary'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          steps.pr.outputs.should_comment == 'true' &&
          hashFiles('qwen-review-summary.md') != ''
        env:
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          EFFECTIVE_TIER: '${{ steps.tier.outputs.tier }}'
        run: |-
          set -euo pipefail

          summary_bytes=$(wc -c < qwen-review-summary.md)
          {
            head -c 60000 qwen-review-summary.md
            if [ "$summary_bytes" -gt 60000 ]; then
              printf '\n\n_Review summary was truncated at 60KB. See the workflow logs for the full output._\n'
            fi
            # The single-quoted format string keeps literal backticks
            # around %s and /review for the rendered Markdown; %s is a
            # printf placeholder filled by the positional arg, so the
            # single quotes are correct here.
            # shellcheck disable=SC2016
            printf '\n\n---\n_Reviewed by `%s` via Qwen Code `/review` (tier=`%s`). Reply `@qwen /review` to re-run; add `--tier=light|standard|deep` to force a tier._\n' \
              "${OPENAI_MODEL:-unknown}" "${EFFECTIVE_TIER:-unknown}"
          } > qwen-pr-review-summary-comment.md

          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file qwen-pr-review-summary-comment.md

      # Check the exact cache key after the review comment is delivered.
      # lookup-only avoids downloading/restoring cache contents here; it only
      # prevents actions/cache/save from attempting to create a key that already
      # exists, which can happen on reruns of opened/reopened/ready_for_review
      # where the pre-review restore step intentionally did not run.
      - name: 'Check review cache key'
        id: 'cache-lookup'
        if: |-
          steps.review.outcome == 'success' &&
          steps.post-summary.outcome == 'success' &&
          github.event_name == 'pull_request_target' &&
          steps.size.outputs.head_sha != '' &&
          steps.size.outputs.merge_base_sha != ''
        uses: 'actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830' # v4.3.0
        with:
          path: '.qwen/review-cache'
          key: 'qwen-review-${{ steps.pr.outputs.number }}-${{ steps.size.outputs.merge_base_sha }}-${{ steps.size.outputs.head_sha }}'
          lookup-only: true

      # Save cache only AFTER the review summary comment was successfully
      # posted. Saving before publication would persist "this head was
      # reviewed" state even if `gh pr comment` later failed (rate-limit,
      # network, deleted PR, etc.) — the next synchronize would then
      # restore the cache, bundled /review would short-circuit on
      # "No new changes since last review" or scope to a tiny incremental
      # diff, and the findings that never reached the PR would be lost.
      # Gating on post-summary.outcome makes cache advancement track
      # comment delivery, not just model success. The lookup step above skips
      # duplicate exact-key saves on reruns.
      - name: 'Save review cache'
        if: |-
          steps.review.outcome == 'success' &&
          steps.post-summary.outcome == 'success' &&
          github.event_name == 'pull_request_target' &&
          steps.size.outputs.head_sha != '' &&
          steps.size.outputs.merge_base_sha != '' &&
          steps.cache-lookup.outputs.cache-hit != 'true'
        uses: 'actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830' # v4.3.0
        with:
          path: '.qwen/review-cache'
          key: 'qwen-review-${{ steps.pr.outputs.number }}-${{ steps.size.outputs.merge_base_sha }}-${{ steps.size.outputs.head_sha }}'

      # Fires when the job is failing AND there's no review markdown to
      # post (the always-emit accumulator failed to produce even a partial).
      # Without this fallback, a broken `gh pr comment`, an early-step
      # crash, or a totally empty model output would all look identical to
      # "no review happened" from the PR's perspective. The fallback's
      # own `gh pr comment` ends with `|| true` so the step never causes
      # a secondary cascade failure.
      - name: 'Post fallback comment on review failure'
        if: |-
          failure() &&
          steps.pr.outputs.should_comment == 'true' &&
          hashFiles('qwen-review-summary.md') == ''
        env:
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          RUN_URL: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
        run: |-
          set -euo pipefail

          {
            printf '_Qwen Code automated PR review did not complete successfully. See the workflow logs for details: %s_\n' "$RUN_URL"
            printf "\nThis is an automated message; please retry by commenting \`@qwen /review\` once the underlying issue is resolved.\n"
          } > qwen-pr-review-failure-comment.md
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file qwen-pr-review-failure-comment.md || true
