name: 'Qwen Pull Request Review'

on:
  pull_request_target:
    types: ['opened']
  issue_comment:
    types: ['created']
  pull_request_review_comment:
    types: ['created']
  pull_request_review:
    types: ['submitted']
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: 'number'
      review_mode:
        description: 'Run a smoke review, run without posting comments, or publish review comments'
        required: true
        default: 'dry-run'
        type: 'choice'
        options:
          - 'smoke'
          - 'dry-run'
          - 'comment'
      additional_instructions:
        description: 'Optional maintainer focus for this review'
        required: false
        type: 'string'

jobs:
  review-pr:
    if: |-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' &&
       github.event.action == 'opened' &&
       (github.event.pull_request.author_association == 'OWNER' ||
        github.event.pull_request.author_association == 'MEMBER' ||
        github.event.pull_request.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@qwen /review') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@qwen /review') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@qwen /review') &&
        (github.event.review.author_association == 'OWNER' ||
         github.event.review.author_association == 'MEMBER' ||
         github.event.review.author_association == 'COLLABORATOR'))
    concurrency:
      group: 'qwen-pr-review-${{ github.event.issue.number || github.event.pull_request.number || github.event.inputs.pr_number }}'
      cancel-in-progress: true
    timeout-minutes: 30
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      pull-requests: 'write'
      issues: 'write'
    env:
      # Job-level env is intentionally minimal. Review provider secrets are
      # scoped to the preflight/review steps only, so dependency-install
      # postinstall scripts and the bundle build cannot read them. GITHUB_TOKEN
      # stays job-level because gh-based size/comment steps need it.
      GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
      OPENAI_MODEL: '${{ vars.QWEN_PR_REVIEW_MODEL }}'
      QWEN_PR_REVIEW_MAX_CHANGED_LINES: "${{ vars.QWEN_PR_REVIEW_MAX_CHANGED_LINES || '1500' }}"
      QWEN_SANDBOX: 'false'
    steps:
      - name: 'Checkout base branch'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2
        with:
          token: '${{ secrets.GITHUB_TOKEN }}'
          fetch-depth: 0

      - name: 'Resolve PR context'
        id: 'pr'
        env:
          EVENT_NAME: '${{ github.event_name }}'
          WORKFLOW_PR_NUMBER: '${{ github.event.inputs.pr_number }}'
          WORKFLOW_REVIEW_MODE: '${{ github.event.inputs.review_mode }}'
          WORKFLOW_ADDITIONAL_INSTRUCTIONS: '${{ github.event.inputs.additional_instructions }}'
        run: |-
          set -euo pipefail

          additional_instructions=""
          case "$EVENT_NAME" in
            workflow_dispatch)
              pr_number="$WORKFLOW_PR_NUMBER"
              review_mode="${WORKFLOW_REVIEW_MODE:-dry-run}"
              additional_instructions="${WORKFLOW_ADDITIONAL_INSTRUCTIONS:-}"
              comment_body=""
              ;;
            pull_request_target|pull_request_review_comment|pull_request_review)
              pr_number="$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")"
              review_mode="comment"
              comment_body="$(jq -r '.comment.body // .review.body // ""' "$GITHUB_EVENT_PATH")"
              ;;
            issue_comment)
              pr_number="$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")"
              review_mode="comment"
              comment_body="$(jq -r '.comment.body // ""' "$GITHUB_EVENT_PATH")"
              ;;
            *)
              echo "::error::Unsupported event: $EVENT_NAME"
              exit 1
              ;;
          esac

          if [ -z "$pr_number" ] || [ "$pr_number" = "null" ]; then
            echo "::error::Could not resolve pull request number"
            exit 1
          fi

          case "$review_mode" in
            smoke|dry-run|comment)
              ;;
            *)
              echo "::error::Unsupported review mode: $review_mode"
              exit 1
              ;;
          esac

          # Use grep -qE with end-boundary so '@qwen /review' does not match
          # '@qwen /reviewer' or similar variants.
          if [ "$EVENT_NAME" != "workflow_dispatch" ] && printf '%s' "$comment_body" | grep -qE '@qwen /review($|[[:space:]])'; then
            additional_instructions="$(
              printf '%s' "$comment_body" |
                sed -n '/@qwen \/review/,$ p' |
                sed '1s/.*@qwen \/review//' |
                sed 's/^[[:space:]]*//'
            )"
          fi
          # Hard-cap to 2KB to keep prompt-injection surface bounded.
          # Reviewers should keep instructions short.
          additional_instructions="$(printf '%s' "$additional_instructions" | head -c 2048)"

          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "review_mode=$review_mode" >> "$GITHUB_OUTPUT"
          if [ "$review_mode" = "comment" ]; then
            echo "should_comment=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_comment=false" >> "$GITHUB_OUTPUT"
          fi
          output_delimiter="QWEN_REVIEW_INSTRUCTIONS_$(date +%s%N)"
          {
            echo "additional_instructions<<$output_delimiter"
            printf '%s\n' "$additional_instructions"
            echo "$output_delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: 'Check review configuration'
        run: |-
          set -euo pipefail

          if [ -z "${OPENAI_MODEL:-}" ]; then
            echo "::error::Repository variable QWEN_PR_REVIEW_MODEL is required for this workflow."
            exit 1
          fi

          if ! printf '%s' "$QWEN_PR_REVIEW_MAX_CHANGED_LINES" | grep -Eq '^[0-9]+$'; then
            echo "::error::QWEN_PR_REVIEW_MAX_CHANGED_LINES must be an integer."
            exit 1
          fi

          # Reject 0 (would block every PR) and absurdly large values (would defeat the size gate).
          if [ "$QWEN_PR_REVIEW_MAX_CHANGED_LINES" -lt 100 ] || [ "$QWEN_PR_REVIEW_MAX_CHANGED_LINES" -gt 50000 ]; then
            echo "::error::QWEN_PR_REVIEW_MAX_CHANGED_LINES must be between 100 and 50000 (got $QWEN_PR_REVIEW_MAX_CHANGED_LINES)."
            exit 1
          fi

          echo "Using Qwen PR review model: $OPENAI_MODEL"
          echo "Max changed lines before split recommendation: $QWEN_PR_REVIEW_MAX_CHANGED_LINES"

      - name: 'Check PR size'
        id: 'size'
        env:
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          REVIEW_MODE: '${{ steps.pr.outputs.review_mode }}'
          SHOULD_COMMENT: '${{ steps.pr.outputs.should_comment }}'
        run: |-
          set -euo pipefail

          pr_json="$(gh pr view "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json additions,deletions,changedFiles,title,baseRefName,headRefName)"
          additions="$(jq -r '.additions' <<< "$pr_json")"
          deletions="$(jq -r '.deletions' <<< "$pr_json")"
          changed_files="$(jq -r '.changedFiles' <<< "$pr_json")"
          title="$(jq -r '.title' <<< "$pr_json")"
          base_ref="$(jq -r '.baseRefName' <<< "$pr_json")"
          head_ref="$(jq -r '.headRefName' <<< "$pr_json")"
          changed_lines=$((additions + deletions))

          echo "changed_lines=$changed_lines" >> "$GITHUB_OUTPUT"
          echo "changed_files=$changed_files" >> "$GITHUB_OUTPUT"
          echo "Review target: PR #$PR_NUMBER"
          echo "Review title: $title"
          echo "Review branch: $base_ref <- $head_ref"
          echo "Review scope: $changed_files files, +$additions/-$deletions ($changed_lines changed lines)"

          if [ "$changed_lines" -gt "$QWEN_PR_REVIEW_MAX_CHANGED_LINES" ]; then
            echo "should_review=false" >> "$GITHUB_OUTPUT"
            {
              printf 'This PR changes %s lines across %s files, which is above the current automated review threshold of %s changed lines.\n\n' \
                "$changed_lines" "$changed_files" "$QWEN_PR_REVIEW_MAX_CHANGED_LINES"
              printf 'Please consider splitting it into smaller, focused PRs before requesting a full Qwen Code review. Smaller PRs are easier to validate, easier to dogfood, and less likely to mix product direction, refactoring, and implementation details in one review.\n\n'
              printf '_Qwen Code PR review did not run a detailed code review for this oversized changeset. Model configured for review: `%s`._\n' \
                "$OPENAI_MODEL"
            } > qwen-pr-review-size-comment.md
            if [ "$SHOULD_COMMENT" = "true" ]; then
              gh pr comment "$PR_NUMBER" \
                --repo "$GITHUB_REPOSITORY" \
                --body-file qwen-pr-review-size-comment.md
            else
              {
                printf '### Qwen PR review dry run\n\n'
                cat qwen-pr-review-size-comment.md
                printf '\n\nReview mode: `%s`; no PR comments were posted.\n' "$REVIEW_MODE"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "should_review=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Setup Node.js'
        if: |-
          steps.size.outputs.should_review == 'true'
        uses: 'actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e' # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 'Build local Qwen Code CLI'
        if: |-
          steps.size.outputs.should_review == 'true'
        run: |-
          set -euo pipefail
          npm ci
          npm run build
          npm run bundle
          # Expose `qwen` on PATH so child processes spawned by the review agent
          # (e.g. `qwen review fetch-pr`, `qwen review pr-context`) can invoke
          # the CLI by name. The workflow itself starts the agent via
          # `node dist/cli.js`, so the symlink is only consumed downstream.
          mkdir -p .qwen/bin
          ln -sf "$PWD/dist/cli.js" .qwen/bin/qwen
          echo "$PWD/.qwen/bin" >> "$GITHUB_PATH"

      - name: 'Preflight review model'
        if: |-
          steps.size.outputs.should_review == 'true'
        env:
          REVIEW_OPENAI_API_KEY: '${{ secrets.REVIEW_OPENAI_API_KEY }}'
          REVIEW_OPENAI_BASE_URL: '${{ secrets.REVIEW_OPENAI_BASE_URL }}'
        run: |-
          set -euo pipefail

          if [ -z "${REVIEW_OPENAI_API_KEY:-}" ]; then
            echo "::error::Repository secret REVIEW_OPENAI_API_KEY is required for Qwen PR review."
            exit 1
          fi
          if [ -z "${REVIEW_OPENAI_BASE_URL:-}" ]; then
            echo "::error::Repository secret REVIEW_OPENAI_BASE_URL is required for Qwen PR review."
            exit 1
          fi

          export PATH="$PWD/.qwen/bin:$PATH"
          echo "Running Qwen review model preflight with model: $OPENAI_MODEL"
          OPENAI_API_KEY="$REVIEW_OPENAI_API_KEY" \
            OPENAI_BASE_URL="$REVIEW_OPENAI_BASE_URL" \
            timeout 180s node dist/cli.js \
              --auth-type openai \
              --model "$OPENAI_MODEL" \
              --output-format json \
              --max-session-turns 1 \
              --prompt "Reply with OK only."

      - name: 'Smoke review PR diff'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          steps.pr.outputs.review_mode == 'smoke'
        env:
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          REVIEW_OPENAI_API_KEY: '${{ secrets.REVIEW_OPENAI_API_KEY }}'
          REVIEW_OPENAI_BASE_URL: '${{ secrets.REVIEW_OPENAI_BASE_URL }}'
        run: |-
          set -euo pipefail

          export PATH="$PWD/.qwen/bin:$PATH"
          mkdir -p .qwen/tmp
          diff_file=".qwen/tmp/qwen-review-pr-${PR_NUMBER}-smoke.diff"
          prompt_file=".qwen/tmp/qwen-review-pr-${PR_NUMBER}-smoke-prompt.md"
          output_file=".qwen/tmp/qwen-review-pr-${PR_NUMBER}-smoke-output.json"

          gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --patch > "$diff_file"
          diff_lines="$(wc -l < "$diff_file" | tr -d ' ')"
          diff_bytes="$(wc -c < "$diff_file" | tr -d ' ')"

          echo "Smoke review target: PR #$PR_NUMBER"
          echo "Smoke review scope: $diff_lines patch lines, $diff_bytes bytes"

          {
            printf 'You are smoke-testing the Qwen PR review GitHub Action.\n'
            printf 'Review only the pull request patch below. Do not infer unrelated repository-wide changes.\n\n'
            printf 'Return concise Markdown with exactly these headings:\n'
            printf '1. Target\n'
            printf '2. Changed files\n'
            printf '3. Scope check\n'
            printf '4. Obvious review findings\n\n'
            printf 'Target PR: #%s\n\n' "$PR_NUMBER"
            printf 'Patch follows. It may be truncated after 20000 bytes for smoke testing.\n\n'
            head -c 20000 "$diff_file"
          } > "$prompt_file"

          OPENAI_API_KEY="$REVIEW_OPENAI_API_KEY" \
            OPENAI_BASE_URL="$REVIEW_OPENAI_BASE_URL" \
            timeout 180s node dist/cli.js \
              --auth-type openai \
              --model "$OPENAI_MODEL" \
              --output-format json \
              --max-session-turns 1 \
              --prompt "$(cat "$prompt_file")" | tee "$output_file"

          smoke_result="$(
            jq -r '
              if type == "array" then
                ([.[] | select(.type == "result")] | last | .result // "")
              else
                .result // ""
              end
            ' "$output_file"
          )"

          {
            printf '### Qwen PR review smoke test\n\n'
            printf '%s\n' "- Target PR: #$PR_NUMBER"
            printf '%s\n\n' "- Patch size: $diff_lines lines, $diff_bytes bytes"
            printf '%s\n' "$smoke_result"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 'Run bundled Qwen PR review'
        id: 'review'
        if: |-
          steps.size.outputs.should_review == 'true' &&
          steps.pr.outputs.review_mode != 'smoke'
        env:
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          REVIEW_MODE: '${{ steps.pr.outputs.review_mode }}'
          SHOULD_COMMENT: '${{ steps.pr.outputs.should_comment }}'
          QWEN_REVIEW_ADDITIONAL_INSTRUCTIONS: '${{ steps.pr.outputs.additional_instructions }}'
          # Review credentials are step-scoped and mapped to OPENAI_* only for
          # the Qwen process below.
          REVIEW_OPENAI_API_KEY: '${{ secrets.REVIEW_OPENAI_API_KEY }}'
          REVIEW_OPENAI_BASE_URL: '${{ secrets.REVIEW_OPENAI_BASE_URL }}'
        run: |-
          set -euo pipefail

          export PATH="$PWD/.qwen/bin:$PATH"
          review_prompt="/review $PR_NUMBER --ci"
          if [ "$SHOULD_COMMENT" = "true" ]; then
            review_prompt="/review $PR_NUMBER --comment --ci"
          fi

          echo "Running Qwen PR review in $REVIEW_MODE mode."
          OPENAI_API_KEY="$REVIEW_OPENAI_API_KEY" \
            OPENAI_BASE_URL="$REVIEW_OPENAI_BASE_URL" \
            node dist/cli.js \
              --auth-type openai \
              --model "$OPENAI_MODEL" \
              --approval-mode yolo \
              --core-tools "task,run_shell_command,grep_search,read_file,write_file,glob" \
              --prompt "$review_prompt"

          if [ "$SHOULD_COMMENT" != "true" ]; then
            {
              printf '### Qwen PR review dry run\n\n'
              printf 'Completed review for PR #%s without posting PR comments.\n' "$PR_NUMBER"
              printf '\nReview logs are available in this workflow run.\n'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 'Post fallback comment on review failure'
        if: |-
          failure() &&
          steps.review.conclusion == 'failure' &&
          steps.pr.outputs.should_comment == 'true'
        env:
          PR_NUMBER: '${{ steps.pr.outputs.number }}'
          RUN_URL: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
        run: |-
          set -euo pipefail

          {
            printf '_Qwen Code automated PR review did not complete successfully. See the workflow logs for details: %s_\n' "$RUN_URL"
            printf '\nThis is an automated message; please retry by commenting `@qwen /review` once the underlying issue is resolved.\n'
          } > qwen-pr-review-failure-comment.md
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body-file qwen-pr-review-failure-comment.md || true
