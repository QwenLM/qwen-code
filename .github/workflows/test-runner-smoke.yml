name: 'Test Runner Smoke'

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - '.github/workflows/test-runner-smoke.yml'

permissions:
  contents: 'read'

jobs:
  smoke:
    name: 'Self-hosted runner smoke'
    if: "${{ github.event.pull_request.head.ref == 'cx/test-runner-validation' }}"
    runs-on: ['self-hosted', 'linux', 'x64', 'ecs-qwen-test']
    timeout-minutes: 10
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10' # v6.0.3

      - name: 'Set up Node.js 22.x'
        uses: 'actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e' # v6.4.0
        with:
          node-version: '22.x'

      - name: 'Validate runner'
        run: |
          set -euo pipefail
          echo "runner=${RUNNER_NAME}"
          echo "host=$(hostname)"
          echo "os=$(uname -a)"
          echo "node=$(node -v)"
          echo "npm=$(npm -v)"
          if command -v qwen >/dev/null 2>&1; then
            echo "qwen=$(qwen --version)"
          else
            echo '::warning::qwen is not available on the runner PATH'
          fi
          if command -v git >/dev/null 2>&1; then
            echo "git=$(git --version)"
          else
            echo '::warning::git is not available on the runner PATH; checkout may use the REST archive fallback'
          fi
          df -h "${GITHUB_WORKSPACE}"
          node -e "console.log('node smoke ok')"
