name: 'Mark stale issues and pull requests'

# Run as a daily cron at 00:30 UTC (Beijing time 08:30).
# Avoid the top of the hour to dodge GitHub's high-contention window,
# and stay 30 minutes after release.yml (00:00 UTC) to reduce overlap.
on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      benchmark_poc:
        description: 'Run the ECS benchmark POC instead of stale triage.'
        required: false
        type: boolean
        default: false
      qwen_ref:
        description: 'Published Qwen Code tag to benchmark.'
        required: false
        type: string
        default: 'v0.20.0'
      suite:
        description: 'Allowlisted benchmark suite.'
        required: false
        type: choice
        default: 'swebench_verified_gold_smoke'
        options:
          - 'swebench_verified_gold_smoke'
          - 'swebench_verified_harbor_smoke'
      release_id:
        description: 'Optional GitHub Release ID to update after the benchmark.'
        required: false
        type: string

jobs:
  stale:
    if: '${{ github.event_name != ''workflow_dispatch'' || inputs.benchmark_poc == false }}'
    runs-on: 'ubuntu-latest'
    permissions:
      issues: 'write'
      pull-requests: 'write'
    concurrency:
      group: '${{ github.workflow }}-stale'
      cancel-in-progress: true
    steps:
      - uses: 'actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899'  # v10.3.0
        with:
          repo-token: '${{ secrets.GITHUB_TOKEN }}'
          # Issues are intentionally disabled here; a separate policy will
          # be introduced once issue triage labels are in place.
          days-before-issue-stale: -1
          days-before-issue-close: -1
          # Pull requests: 60 days to stale + 30 days to close.
          days-before-pr-stale: 60
          days-before-pr-close: 30
          stale-pr-label: 'status/stale'
          stale-pr-message: >-
            This pull request has had no activity for 60 days and is being marked as stale.
            It will be closed in another 30 days if no further activity occurs.
            To keep it open, push a new commit or leave a comment.
            Maintainers may apply `pinned`, `status/blocked`, `status/on-hold`,
            or `status/ready-for-merge` to exempt it from auto-close.
          close-pr-message: >-
            This pull request has been closed after 30 additional days of inactivity.
            You are welcome to reopen it or submit a new pull request if the change is still relevant.
            Thanks for contributing!
          exempt-pr-labels: 'pinned,security,status/blocked,status/on-hold,status/ready-for-merge'
          remove-stale-when-updated: true
          ascending: true
          # Cap per-run API operations to stay well under GitHub's hourly rate limit
          # and give the current PR backlog (~150) enough headroom across a few runs.
          operations-per-run: 100

  benchmark-poc:
    if: '${{ github.event_name == ''workflow_dispatch'' && inputs.benchmark_poc == true && github.repository == ''QwenLM/qwen-code'' }}'
    name: 'ECS benchmark POC'
    runs-on: [self-hosted, Linux, X64, qwen-benchmark]
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: 'Resolve immutable release commit'
        id: revision
        shell: bash
        env:
          QWEN_REF: '${{ inputs.qwen_ref }}'
          GH_TOKEN: '${{ github.token }}'
        run: |-
          set -euo pipefail
          object="$(curl --fail --silent --show-error \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/ref/tags/${QWEN_REF}")"
          object_type="$(jq -r '.object.type' <<<"${object}")"
          object_sha="$(jq -r '.object.sha' <<<"${object}")"
          while [[ "${object_type}" == 'tag' ]]; do
            object="$(curl --fail --silent --show-error \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/tags/${object_sha}")"
            object_type="$(jq -r '.object.type' <<<"${object}")"
            object_sha="$(jq -r '.object.sha' <<<"${object}")"
          done
          [[ "${object_type}" == 'commit' && "${object_sha}" =~ ^[0-9a-f]{40}$ ]]
          echo "commit=${object_sha}" >> "${GITHUB_OUTPUT}"

      - name: 'Queue benchmark on local ECS service'
        env:
          QWEN_REF: '${{ inputs.qwen_ref }}'
          QWEN_COMMIT: '${{ steps.revision.outputs.commit }}'
          SUITE: '${{ inputs.suite }}'
          RELEASE_ID: '${{ inputs.release_id }}'
          TRIGGER: workflow_dispatch
        run: |-
          set -euo pipefail
          response="$(sudo -n /usr/local/sbin/qwen-benchmark-dispatch \
            --repository "${GITHUB_REPOSITORY}" \
            --qwen-ref "${QWEN_REF}" \
            --qwen-commit "${QWEN_COMMIT}" \
            --suite "${SUITE}" \
            --release-id "${RELEASE_ID}" \
            --trigger "${TRIGGER}" \
            --github-run-id "${GITHUB_RUN_ID}" \
            --github-run-attempt "${GITHUB_RUN_ATTEMPT}")"
          echo "${response}" | jq .
          echo "### Benchmark queued" >> "$GITHUB_STEP_SUMMARY"
          echo "${response}" | jq -r '"- Run ID: `" + .run_id + "`\n- Status: `" + .status + "`"' >> "$GITHUB_STEP_SUMMARY"
