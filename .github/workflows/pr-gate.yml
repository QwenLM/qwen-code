name: 'PR Gate'

# Fast deterministic merge-blocking checks. Each job emits an independent
# named status check that Branch Protection references as Required.
#
# Sibling workflow `qwen-code-pr-review.yml` provides the (slow, advisory)
# AI review — it is intentionally NOT required for merge. See
# docs/design/pr-gate-plan.md for the full design rationale.
#
# Triggers:
#  - pull_request (not pull_request_target): all three jobs only read PR
#    metadata, no secrets needed. Fork PRs trigger normally and produce
#    status checks the maintainer can see before merge.
#  - 'edited' is critical: when the contributor edits the PR title or
#    body to fix a failed check, the workflow re-runs and updates the
#    check status. Without 'edited', a failed PR Title / PR Template
#    check would stay red forever even after correction.
#  - 'labeled'/'unlabeled' are needed so the PR Size `oversized-ok`
#    escape-hatch label takes effect (or is revoked) without an extra
#    push or edit to re-trigger the check.

on:
  pull_request:
    types:
      - 'opened'
      - 'edited'
      - 'synchronize'
      - 'ready_for_review'
      - 'reopened'
      - 'labeled'
      - 'unlabeled'
    branches: ['main', 'release/**']

permissions:
  contents: 'read'
  pull-requests: 'read'    # read-only: pr-title/pr-template use event payload; pr-size calls listFiles

# Cancel earlier in-flight runs on the same PR when a new event arrives.
# 'edited' events can fire frequently while the contributor iterates on
# the description — no point keeping stale runs around.
concurrency:
  group: 'pr-gate-${{ github.event.pull_request.number }}'
  cancel-in-progress: true

jobs:
  # NOTE: a `pr-title` Conventional-Commits check used to live here. It was
  # removed because the repo enforces commit-message format via local
  # commit-msg hooks (so contributors hitting `git commit` are already
  # caught on their own machine), and re-checking the same rule in CI just
  # duplicates the gate without adding signal. PR title still becomes the
  # squash-merge commit message; maintainers spot-check it at merge time.
  # If we later see PRs with non-conforming titles slipping through, this
  # job can be reintroduced (the action used was
  # `amannn/action-semantic-pull-request` pinned to a SHA).

  pr-template:
    name: 'PR Template'
    # `labeled`/`unlabeled` are in the workflow triggers only for the
    # pr-size `oversized-ok` escape hatch. PR Template does not depend on
    # labels at all, so skip it on label events — otherwise every
    # unrelated label add/remove re-runs (and, with cancel-in-progress,
    # can cancel) this check for no reason.
    if: |-
      github.event.action != 'labeled' &&
      github.event.action != 'unlabeled'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 2
    steps:
      - name: 'Validate PR body has required sections'
        uses: 'actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea' # v7.0.1
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const errors = [];

            // Required sections (must literally appear as headers).
            const requiredSections = [
              {
                marker: '## Summary',
                name: 'Summary',
                hint: 'Describe what this PR does and why, in 1-3 sentences.',
              },
              {
                marker: '## Validation',
                name: 'Validation',
                hint: 'Provide reviewer-facing evidence: commands run, observed output, logs, screenshots, GIFs, or test reports. Saying "tested locally" alone is not enough.',
              },
              {
                marker: '## Linked Issues',
                name: 'Linked Issues',
                hint: 'List linked issues (e.g. `Fixes #123`, `Refs #456`) or write `N/A` if intentionally none.',
              },
            ];
            for (const s of requiredSections) {
              if (!body.includes(s.marker)) {
                errors.push(`Missing "${s.name}" section.\n  → ${s.hint}`);
              }
            }

            // Validation must have substantive content, not just the
            // template's empty bullet placeholders.
            //
            // The repo's template (.github/PULL_REQUEST_TEMPLATE.md) ships
            // with bullets like `- Commands run:` and `- Expected result:`
            // that contain no real content after the colon. A naive length
            // check would let these slip through. So we strip:
            //   1. HTML comments
            //   2. Code fences (empty AND containing the "# paste …" comment)
            //   3. Bullet lines whose content after the colon is empty
            //      (i.e. the template's untouched placeholders)
            //   4. Bullet lines whose value is just a bracketed example
            //      like `- Foo: [paste here]`
            // and require ≥20 chars of substantive remainder.
            const validationIdx = body.indexOf('## Validation');
            if (validationIdx !== -1) {
              const after = body.slice(validationIdx + '## Validation'.length);
              const nextHeaderIdx = after.search(/\n## /);
              const validationSection = nextHeaderIdx === -1
                ? after
                : after.slice(0, nextHeaderIdx);

              const stripped = validationSection
                .replace(/<!--[\s\S]*?-->/g, '')   // HTML comments
                .replace(/```[\s\S]*?```/g, '')    // code fences (any content)
                .split('\n')
                .filter((line) => {
                  const t = line.trim();
                  if (!t) return false;
                  // Template-only bullet: "- LABEL:" with nothing after.
                  if (/^[-*]\s+[^:]+:\s*$/.test(t)) return false;
                  // Bullet with only a placeholder-style value like
                  // "- Foo: <something>" or "- Foo: [paste …]" or "- Foo: TBD".
                  if (/^[-*]\s+[^:]+:\s*(<[^>]+>|\[[^\]]+\]|TBD|N\/A?|todo|tbd)\s*$/i.test(t)) {
                    return false;
                  }
                  return true;
                })
                .join('\n')
                .trim();

              if (stripped.length < 20) {
                errors.push(
                  'Validation section looks like the unfilled template ' +
                  '(empty bullets / no real evidence after the colons).\n' +
                  '  → Fill in actual commands, output, screenshots, or test reports.'
                );
              }
            }

            if (errors.length > 0) {
              const formatted = errors.map(e => `• ${e}`).join('\n\n');
              core.setFailed(
                `PR description is incomplete:\n\n${formatted}\n\n` +
                'Edit your PR description to match the template at ' +
                '`.github/PULL_REQUEST_TEMPLATE.md` and the check will re-run automatically.'
              );
            }

  pr-size:
    name: 'PR Size'
    # Re-run on non-label events as usual; on label events run ONLY when
    # the `oversized-ok` escape-hatch label itself is added or removed —
    # an unrelated label (`bug`, `priority/*`) must not churn this check.
    if: |-
      (github.event.action != 'labeled' &&
       github.event.action != 'unlabeled') ||
      github.event.label.name == 'oversized-ok'
    runs-on: 'ubuntu-latest'
    timeout-minutes: 3
    steps:
      - name: 'Compute size and block XL'
        uses: 'actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea' # v7.0.1
        with:
          script: |
            // Pull the full file list (up to 3 pages * 100 = 300 files;
            // anything beyond that is itself a sign of too-large PR).
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                per_page: 100,
              },
              (response) => response.data,
            );

            // Exclude files whose churn is not a meaningful review burden.
            // Keep this list intentionally tight — every entry should
            // correspond to "auto-generated or pure prose" content.
            const ignored = [
              /(?:^|\/)package-lock\.json$/,
              /(?:^|\/)pnpm-lock\.yaml$/,
              /(?:^|\/)yarn\.lock$/,
              /\.generated\./,
              /\.snap$/,                                 // jest snapshot
              /^docs\//,                                 // docs prose
              /^docs-site\//,
              /\.md$/,                                   // markdown anywhere
              /^integration-tests\/fixtures\//,
              /^packages\/.+\/__snapshots__\//,
            ];
            const meaningful = files.filter((f) =>
              !ignored.some((re) => re.test(f.filename))
            );
            const totalChanges = meaningful.reduce(
              (sum, f) => sum + (f.additions || 0) + (f.deletions || 0),
              0,
            );
            const totalFiles = meaningful.length;

            const BLOCK_THRESHOLD = 1500;
            const WARN_THRESHOLD = 1000;

            // Escape hatch: a maintainer can consciously accept an
            // over-threshold PR (a large but cohesive infra change, a
            // generated-file refactor the exclusion list doesn't catch,
            // etc.) by applying the `oversized-ok` label. With it the
            // size limit downgrades from a hard block to a warning — the
            // PR still gets a visible "this is large" signal, but is not
            // wedged. Without an escape hatch a legitimately large PR has
            // no path to merge at all.
            const OVERSIZE_OK_LABEL = 'oversized-ok';
            const labels = (context.payload.pull_request?.labels || [])
              .map((l) => l.name);
            const sizeWaived = labels.includes(OVERSIZE_OK_LABEL);

            // Self-waiver guard: a PR author applying `oversized-ok` to
            // their own PR would bypass the gate unilaterally. Reject that.
            // Only enforced on the `labeled` event — that is the moment of
            // application, where `payload.sender` is the applier. On later
            // synchronize events the label is already vetted and
            // `payload.sender` is just the pusher, so re-checking there
            // would false-fail a legitimately maintainer-applied waiver.
            if (
              context.payload.action === 'labeled' &&
              context.payload.label &&
              context.payload.label.name === OVERSIZE_OK_LABEL &&
              context.payload.sender &&
              context.payload.pull_request &&
              context.payload.sender.login === context.payload.pull_request.user.login
            ) {
              core.setFailed(
                `\`${OVERSIZE_OK_LABEL}\` was applied by the PR author ` +
                `(@${context.payload.sender.login}); the size waiver must be ` +
                'applied by a different maintainer.'
              );
              return;
            }

            core.info(
              `PR size: ${totalChanges} meaningful lines across ${totalFiles} files ` +
              `(block at ${BLOCK_THRESHOLD}, warn at ${WARN_THRESHOLD}; lockfile/docs/snapshot/generated excluded).`
            );

            if (totalChanges > BLOCK_THRESHOLD && sizeWaived) {
              // Name the applier when this run was triggered by the label
              // event itself, so the job log carries an audit trail
              // instead of relying only on GitHub's separate label log.
              const applier =
                context.payload.action === 'labeled' && context.payload.sender
                  ? ` (applied by @${context.payload.sender.login})`
                  : '';
              core.warning(
                `PR is over the size threshold (${totalChanges} > ${BLOCK_THRESHOLD} ` +
                `meaningful lines) but carries the \`${OVERSIZE_OK_LABEL}\` label${applier} — ` +
                'a maintainer has consciously accepted the size. Not blocking.'
              );
            } else if (totalChanges > BLOCK_THRESHOLD) {
              core.setFailed(
                `PR is too large: ${totalChanges} meaningful lines across ${totalFiles} files ` +
                `(threshold: ${BLOCK_THRESHOLD}).\n\n` +
                'Please split this PR into smaller, independently reviewable PRs. ' +
                'Suggestions:\n' +
                '  • Separate refactors from feature changes.\n' +
                '  • Split by module/package or by concern.\n' +
                '  • Ship test scaffolding in its own PR, then the implementation.\n\n' +
                `If the PR is large but genuinely cohesive, a maintainer can apply the ` +
                `\`${OVERSIZE_OK_LABEL}\` label to downgrade this block to a warning.\n\n` +
                'Lockfile, docs, snapshot, and generated-file changes are already excluded ' +
                'from this count. If the count still seems off, check ' +
                '`.github/workflows/pr-gate.yml` for the exclusion list.'
              );
            } else if (totalChanges > WARN_THRESHOLD) {
              core.warning(
                `PR is large (${totalChanges} lines). Merge is allowed, but consider splitting ` +
                'next time for easier review.'
              );
            }
