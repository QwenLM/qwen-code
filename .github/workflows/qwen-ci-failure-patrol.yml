name: 'Qwen CI Failure Patrol'

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Collect and classify without writing to GitHub'
        required: false
        default: 'false'
        type: 'choice'
        options:
          - 'false'
          - 'true'

permissions:
  contents: 'read'

concurrency:
  group: 'qwen-ci-failure-patrol'
  cancel-in-progress: true

env:
  ALLOWLISTED_MAIN_WORKFLOWS: 'E2E Tests,SDK Python'
  AUTOFIX_BOT: "${{ vars.AUTOFIX_BOT_LOGIN || 'qwen-code-dev-bot' }}"
  MAX_ATTEMPTS: '3'
  STALE_MINUTES: '30'

jobs:
  route:
    name: 'Find stale CI failure'
    if: ${{ github.repository == 'QwenLM/qwen-code' }}
    runs-on: 'ubuntu-latest'
    permissions:
      actions: 'read'
      contents: 'read'
      pull-requests: 'read'
    outputs:
      has_target: '${{ steps.route.outputs.has_target }}'
    steps:
      - name: 'Checkout trusted main'
        uses: 'actions/checkout@v4'
        with:
          ref: '${{ github.event.repository.default_branch }}'

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '22'

      - name: 'Scan PR failures'
        id: 'scan-pr'
        env:
          GH_TOKEN: '${{ github.token }}'
        run: |-
          mkdir -p "${RUNNER_TEMP}/ci-failure-patrol"
          node .github/scripts/ci-failure-patrol.mjs scan-pr \
            --repo "${{ github.repository }}" \
            --workdir "${RUNNER_TEMP}/ci-failure-patrol" \
            --stale-minutes "${STALE_MINUTES}"

      - name: 'Scan main failures'
        id: 'scan-main'
        env:
          GH_TOKEN: '${{ github.token }}'
        run: |-
          node .github/scripts/ci-failure-patrol.mjs scan-main \
            --repo "${{ github.repository }}" \
            --workdir "${RUNNER_TEMP}/ci-failure-patrol" \
            --stale-minutes "${STALE_MINUTES}" \
            --allowlist "${ALLOWLISTED_MAIN_WORKFLOWS}"

      - name: 'Route target'
        id: 'route'
        run: |-
          if [[ -s "${RUNNER_TEMP}/ci-failure-patrol/target.json" ]]; then
            echo "has_target=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_target=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: 'Upload route artifact'
        if: ${{ steps.route.outputs.has_target == 'true' }}
        uses: 'actions/upload-artifact@v4'
        with:
          name: 'ci-failure-patrol-route'
          path: |-
            ${{ runner.temp }}/ci-failure-patrol/target.json
            ${{ runner.temp }}/ci-failure-patrol/ci-failure.json
          if-no-files-found: 'ignore'

  classify-act:
    name: 'Classify and handle CI failure'
    needs: 'route'
    if: ${{ github.repository == 'QwenLM/qwen-code' && needs.route.outputs.has_target == 'true' }}
    runs-on: 'ubuntu-latest'
    permissions:
      actions: 'write'
      contents: 'read'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Checkout trusted main'
        uses: 'actions/checkout@v4'
        with:
          ref: '${{ github.event.repository.default_branch }}'

      - name: 'Set up Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '22'

      - name: 'Download route artifact'
        uses: 'actions/download-artifact@v4'
        with:
          name: 'ci-failure-patrol-route'
          path: '${{ runner.temp }}/ci-failure-patrol'

      - name: 'Check bot identity'
        env:
          GH_TOKEN: '${{ secrets.CI_DEV_BOT_PAT }}'
        run: |-
          node .github/scripts/ci-failure-patrol.mjs verify-bot \
            --repo "${{ github.repository }}" \
            --bot-login "${AUTOFIX_BOT}"

      - name: 'Prepare Qwen Code CLI'
        env:
          QWEN_SKIP_PREPARE: '1'
        run: |-
          for attempt in 1 2 3; do
            if npm ci --prefer-offline --no-audit --progress=false; then
              break
            fi
            if [[ "${attempt}" == "3" ]]; then
              exit 1
            fi
            sleep $((attempt * 15))
          done
          npm run build
          npm run bundle
          qwen_bin="${RUNNER_TEMP}/qwen-bin"
          mkdir -p "${qwen_bin}"
          cat > "${qwen_bin}/qwen" <<'EOF'
          #!/usr/bin/env bash
          exec node "${GITHUB_WORKSPACE}/dist/cli.js" "$@"
          EOF
          chmod +x "${qwen_bin}/qwen"
          echo "${qwen_bin}" >> "${GITHUB_PATH}"
          PATH="${qwen_bin}:${PATH}"
          qwen --version

      - name: 'Classify CI failure'
        env:
          OPENAI_API_KEY: '${{ secrets.AUTOFIX_OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.AUTOFIX_OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}'
          NO_PROXY: '127.0.0.1,localhost,::1'
        run: |-
          if [[ -z "${OPENAI_API_KEY}" ]]; then
            echo 'AUTOFIX_OPENAI_API_KEY secret is required for CI failure patrol.'
            exit 1
          fi
          node .qwen/skills/autofix/scripts/run-agent.mjs \
            --mode classify-ci-failure \
            --workdir "${RUNNER_TEMP}/ci-failure-patrol"

      - name: 'Act on classification'
        env:
          GH_TOKEN: '${{ secrets.CI_DEV_BOT_PAT }}'
        run: |-
          node .github/scripts/ci-failure-patrol.mjs act \
            --repo "${{ github.repository }}" \
            --workdir "${RUNNER_TEMP}/ci-failure-patrol" \
            --bot-login "${AUTOFIX_BOT}" \
            --max-attempts "${MAX_ATTEMPTS}" \
            --dry-run "${{ inputs.dry_run || 'false' }}"

      - name: 'Upload patrol artifacts'
        if: ${{ always() && (failure() || inputs.dry_run == 'true') }}
        uses: 'actions/upload-artifact@v4'
        with:
          name: 'ci-failure-patrol'
          path: |-
            ${{ runner.temp }}/ci-failure-patrol/target.json
            ${{ runner.temp }}/ci-failure-patrol/ci-failure.json
            ${{ runner.temp }}/ci-failure-patrol/ci-decision.json
            ${{ runner.temp }}/ci-failure-patrol/validated-decision.json
            ${{ runner.temp }}/ci-failure-patrol/failure.md
          if-no-files-found: 'ignore'
