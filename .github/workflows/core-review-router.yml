name: 'Core Review Router'

on:
  pull_request_target:
    types: ['opened', 'synchronize', 'ready_for_review']
    paths: ['packages/core/**']

permissions:
  contents: 'read'
  pull-requests: 'write'

jobs:
  route:
    if: |-
      !github.event.pull_request.draft &&
      !contains(fromJSON('["wenshao","tanzhenxin","yiliang114","LaZzyMan"]'), github.event.pull_request.user.login)
    runs-on: 'ubuntu-latest'
    timeout-minutes: 5
    concurrency:
      group: 'core-review-router-${{ github.event.pull_request.number }}'
      cancel-in-progress: true
    steps:
      - name: 'Checkout router script'
        uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10'  # v6.0.3
        with:
          ref: '${{ github.event.repository.default_branch }}'
          sparse-checkout: '.github/scripts/core-review-router.mjs'
          sparse-checkout-cone-mode: false

      - name: 'Collect changed files'
        id: 'files'
        env:
          GH_TOKEN: '${{ github.token }}'
          PR_NUMBER: '${{ github.event.pull_request.number }}'
        run: |-
          set -euo pipefail
          files="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files?per_page=100" --jq '.[].filename' | jq -R . | jq -sc '.')"
          {
            echo 'files<<EOF'
            echo "$files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: 'Classify and pick reviewers'
        id: 'classify'
        env:
          FILES: '${{ steps.files.outputs.files }}'
          AUTHOR: '${{ github.event.pull_request.user.login }}'
          PR_NUMBER: '${{ github.event.pull_request.number }}'
        run: |-
          set -euo pipefail
          result="$(node .github/scripts/core-review-router.mjs --files "$FILES" --author "$AUTHOR" --pr "$PR_NUMBER")"
          reviewers="$(echo "$result" | jq -r '.reviewers | join(",")')"
          reason="$(echo "$result" | jq -r '.reason')"
          maintainers="$(echo "$result" | jq -c '.maintainers')"
          echo "reviewers=$reviewers" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "maintainers=$maintainers" >> "$GITHUB_OUTPUT"
          echo "Routing decision: reviewers=[$reviewers] reason=$reason"

      - name: 'Apply review requests'
        env:
          GH_TOKEN: '${{ github.token }}'
          PR_NUMBER: '${{ github.event.pull_request.number }}'
          REVIEWERS: '${{ steps.classify.outputs.reviewers }}'
          REASON: '${{ steps.classify.outputs.reason }}'
        run: |-
          set -euo pipefail
          api="repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/requested_reviewers"
          marker='<!-- core-review-router:managed'

          # Compute the desired managed set from the routing decision.
          if [ -n "$REVIEWERS" ]; then
            desired="$(echo "$REVIEWERS" | tr ',' '\n' | jq -R . | jq -sc 'sort')"
          else
            desired="[]"
          fi

          # Do not re-request maintainers who already reviewed this PR.
          # GitHub drops a reviewer from requested_reviewers once they submit
          # a review, so without this they would be re-added (and re-pinged)
          # on every subsequent synchronize push — exactly the notification
          # churn this router exists to remove.
          reviewed="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" --jq '.[].user.login' | jq -R . | jq -sc '.')"
          desired="$(jq -cn --argjson d "$desired" --argjson r "$reviewed" '$d - $r | sort')"

          current="$(gh api "$api" --jq '[.users[].login]')"

          # Only treat reviewers as router-managed if this workflow
          # previously requested them (recorded in a marker comment).
          # CODEOWNERS-assigned or manually-added maintainers are never
          # removed by the reconciliation below.
          prev_desired="$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
            --arg marker "$marker" \
            --jq '[.[] | select(.body | startswith($marker))] | last | .body // "" | split("\n") | .[1] // "[]" | fromjson? // []' \
            2>/dev/null)" || prev_desired='[]'
          [ -z "$prev_desired" ] && prev_desired='[]'

          managed="$(echo "$current" | jq -c --argjson p "$prev_desired" \
            '[.[] | select(. as $l | $p | index($l))] | sort')"

          # Reconcile the router-managed set toward `desired`. Non-managed
          # reviewers (CODEOWNERS-assigned, manually added) are untouched.
          #
          # Diff guard: skip reviewer API calls when the set is unchanged so
          # a stable synchronize push does not re-notify reviewers.
          if [ "$managed" != "$desired" ]; then
            # Remove maintainers that should no longer be requested.
            to_remove="$(jq -cn --argjson a "$managed" --argjson b "$desired" '$a - $b')"
            if [ "$to_remove" != "[]" ]; then
              echo "$to_remove" | jq '{reviewers: .}' \
                | gh api --method DELETE "$api" --input - > /dev/null \
                || echo "::warning::Failed to remove reviewers: $to_remove"
            fi

            # Add maintainers that should be newly requested.
            to_add="$(jq -cn --argjson a "$desired" --argjson b "$managed" '$a - $b')"
            if [ "$to_add" != "[]" ]; then
              echo "$to_add" | jq '{reviewers: .}' \
                | gh api --method POST "$api" --input - > /dev/null \
                || echo "::warning::Failed to add reviewers: $to_add"
            fi

            echo "Applied: $REVIEWERS ($REASON)"
          else
            echo "Reviewer set unchanged ($REVIEWERS) — skipping ($REASON)"
          fi

          # Persist the desired set in a marker comment so the next run
          # can distinguish router-added reviewers from CODEOWNERS or
          # manually-added ones.
          marker_body="${marker} -->
          ${desired}
          -->"
          comment_id="$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
            --arg marker "$marker" \
            --jq '[.[] | select(.body | startswith($marker))] | last | .id // empty' \
            2>/dev/null)" || comment_id=""
          if [ -n "$comment_id" ]; then
            gh api --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
              -f body="$marker_body" > /dev/null \
              || echo "::warning::Failed to update marker comment"
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -f body="$marker_body" > /dev/null \
              || echo "::warning::Failed to create marker comment"
          fi
