name: 'Comment Attachment Guard'

on:
  issue_comment:
    types:
      - 'created'
      - 'edited'
  pull_request_review_comment:
    types:
      - 'created'
      - 'edited'

permissions:
  contents: 'read'
  issues: 'write'
  pull-requests: 'write'

jobs:
  remove-suspicious-attachments:
    timeout-minutes: 2
    if: |-
      ${{ github.repository == 'QwenLM/qwen-code' }}
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Remove suspicious attachment comments'
        uses: 'actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3' # v9.0.0
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |
            const trustedAssociations = new Set([
              'OWNER',
              'MEMBER',
              'COLLABORATOR',
            ]);
            const highRiskExtension =
              /\.(?:zip|rar|7z|tar\.gz|tgz|dmg|pkg|exe|msi|sh|bat|ps1|node|dylib|so)(?:$|[\s)"'\]>?#/&;.,!:])/i;
            const linkPattern =
              /https?:\/\/[^\s"'<>\]]+|\[[^\]]+\]\((?:[^()\s]|\([^()\s]*\))+\)/gi;
            const highRiskTarget = (url) => {
              let target = url;
              if (!/^https?:\/\//i.test(url)) {
                return target;
              }
              try {
                const parsedUrl = new URL(url);
                target = parsedUrl.pathname;
              } catch {
                return target;
              }
              try {
                return decodeURIComponent(target);
              } catch {
                return target;
              }
            };

            const { comment, sender } = context.payload;
            const association = comment.author_association ?? '';
            const body = comment.body ?? '';
            const scanBody = body
              .replace(/```[\s\S]*?```/g, '')
              .replace(/`[^`]*`/g, '');
            const eventName = context.eventName;

            if (
              trustedAssociations.has(association) ||
              sender?.type === 'Bot'
            ) {
              core.info(`Trusted author (${association || sender?.type}); skipping.`);
              return;
            }

            const reasons = [];
            const linkSnippets = scanBody.match(linkPattern) ?? [];
            const hasHighRiskLink = linkSnippets.some((snippet) => {
              const mdMatch = snippet.match(/^\[[^\]]+\]\((.+)\)$/);
              const url = mdMatch ? mdMatch[1] : snippet;
              return highRiskExtension.test(highRiskTarget(url));
            });
            if (hasHighRiskLink) {
              reasons.push('high-risk file extension in a link or attachment');
            }

            if (reasons.length === 0) {
              core.info('No suspicious attachment pattern found.');
              return;
            }

            const { owner, repo } = context.repo;
            let deleted = false;
            try {
              if (eventName === 'issue_comment') {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: comment.id,
                });
                deleted = true;
              } else if (eventName === 'pull_request_review_comment') {
                await github.rest.pulls.deleteReviewComment({
                  owner,
                  repo,
                  comment_id: comment.id,
                });
                deleted = true;
              }
            } catch (error) {
              core.warning(
                `Failed to delete suspicious comment ${comment.id}: ${error}`,
              );
            }

            try {
              await core.summary
                .addHeading('Suspicious attachment detected')
                .addTable([
                  [
                    { data: 'Field', header: true },
                    { data: 'Value', header: true },
                  ],
                  ['Event', eventName],
                  ['Author', comment.user.login],
                  ['Association', association || 'none'],
                  ['Comment ID', String(comment.id)],
                  ['Reason', reasons.join(', ')],
                  ['Action', deleted ? 'removed' : 'delete failed'],
                ])
                .write();
            } catch (error) {
              core.warning(
                `Failed to write suspicious comment summary: ${error}`,
              );
            }
