name: 'VSCode Companion Tests'

on:
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref }}'
  cancel-in-progress: true

permissions:
  contents: 'read'

jobs:
  unit-test:
    name: 'Unit Tests'
    runs-on: 'ubuntu-latest'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 'Install dependencies'
        run: 'npm ci'

      - name: 'Build webui'
        run: 'npm run build'
        working-directory: 'packages/webui'

      - name: 'Build project'
        run: 'npm run build'
        working-directory: 'packages/vscode-ide-companion'

      - name: 'Run unit tests'
        run: 'npm run test:ci'
        working-directory: 'packages/vscode-ide-companion'

  integration-test:
    name: 'Integration Tests'
    runs-on: 'ubuntu-latest'
    needs: 'unit-test'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 'Install dependencies'
        run: 'npm ci'

      - name: 'Build webui'
        run: 'npm run build'
        working-directory: 'packages/webui'

      - name: 'Build project'
        run: 'npm run build'
        working-directory: 'packages/vscode-ide-companion'

      - name: 'Bundle CLI'
        run: 'node scripts/prepackage.js'
        working-directory: 'packages/vscode-ide-companion'

      - name: 'Check auth env'
        id: 'auth'
        run: |
          if [[ -n "${{ secrets.QWEN_OAUTH }}" || ( -n "${{ secrets.OPENAI_API_KEY }}" && -n "${{ secrets.OPENAI_BASE_URL }}" && -n "${{ secrets.OPENAI_MODEL }}" ) ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Run integration tests'
        if: steps.auth.outputs.ready == 'true'
        run: 'xvfb-run -a npm run test:integration'
        working-directory: 'packages/vscode-ide-companion'
        env:
          OPENAI_API_KEY: '${{ secrets.OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ secrets.OPENAI_MODEL }}'
          QWEN_OAUTH: '${{ secrets.QWEN_OAUTH }}'

      - name: 'Skip integration tests (missing auth)'
        if: steps.auth.outputs.ready != 'true'
        run: 'echo "Skipping integration tests because auth env is missing."'

  vscode-e2e-test:
    name: 'VSCode E2E Tests'
    runs-on: 'ubuntu-latest'
    needs: 'integration-test'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 'Install dependencies'
        run: 'npm ci'

      - name: 'Install Playwright browsers'
        run: 'npx playwright install --with-deps chromium'
        working-directory: 'packages/vscode-ide-companion'

      - name: 'Build webui'
        run: 'npm run build'
        working-directory: 'packages/webui'

      - name: 'Build project'
        run: 'npm run build'
        working-directory: 'packages/vscode-ide-companion'

      - name: 'Bundle CLI'
        run: 'node scripts/prepackage.js'
        working-directory: 'packages/vscode-ide-companion'

      - name: 'Check auth env'
        id: 'auth'
        run: |
          if [[ -n "${{ secrets.QWEN_OAUTH }}" || ( -n "${{ secrets.OPENAI_API_KEY }}" && -n "${{ secrets.OPENAI_BASE_URL }}" && -n "${{ secrets.OPENAI_MODEL }}" ) ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Run VSCode E2E tests'
        if: steps.auth.outputs.ready == 'true'
        run: 'xvfb-run -a npm run test:e2e:vscode'
        working-directory: 'packages/vscode-ide-companion'
        env:
          OPENAI_API_KEY: '${{ secrets.OPENAI_API_KEY }}'
          OPENAI_BASE_URL: '${{ secrets.OPENAI_BASE_URL }}'
          OPENAI_MODEL: '${{ secrets.OPENAI_MODEL }}'
          QWEN_OAUTH: '${{ secrets.QWEN_OAUTH }}'

      - name: 'Skip VSCode E2E tests (missing auth)'
        if: steps.auth.outputs.ready != 'true'
        run: 'echo "Skipping VSCode E2E tests because auth env is missing."'
