name: 'OSS Smoke Test'

on:
  push:
    branches:
      - 'codex/installer-release-assets'
    paths:
      - '.github/workflows/oss-smoke-test.yml'
  workflow_dispatch:
    inputs:
      prefix:
        description: 'Temporary OSS prefix for the upload/delete smoke test.'
        required: true
        type: 'string'
        default: 'qwen-code-oss-ak-check'

jobs:
  smoke:
    name: 'Verify Aliyun OSS Credentials'
    runs-on: 'ubuntu-latest'
    if: |-
      ${{ github.repository == 'QwenLM/qwen-code' }}
    environment:
      name: 'production-release'
    permissions:
      contents: 'read'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd' # v6.0.2

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e' # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: 'Install Dependencies'
        env:
          NPM_CONFIG_PREFER_OFFLINE: 'true'
        run: |-
          npm ci --no-audit --progress=false

      - name: 'Install ossutil'
        env:
          OSSUTIL_URL: 'https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-linux-amd64.zip'
          OSSUTIL_SHA256: 'dcc512e4a893e16bbee63bc769339d8e56b21744fd83c8212a9d8baf28767343'
        run: |-
          set -euo pipefail

          tmp_dir="$(mktemp -d)"
          curl -fsSL "${OSSUTIL_URL}" -o "${tmp_dir}/ossutil.zip"
          echo "${OSSUTIL_SHA256}  ${tmp_dir}/ossutil.zip" | sha256sum -c -
          unzip -q "${tmp_dir}/ossutil.zip" -d "${tmp_dir}"

          ossutil_path="$(find "${tmp_dir}" -type f \( -name 'ossutil' -o -name 'ossutil64' \) -print -quit)"
          if [[ -z "${ossutil_path}" ]]; then
            echo "::error::ossutil binary not found in downloaded archive"
            exit 1
          fi

          chmod +x "${ossutil_path}"
          sudo install -m 0755 "${ossutil_path}" /usr/local/bin/ossutil
          rm -rf "${tmp_dir}"
          ossutil >/dev/null

      - name: 'Configure Aliyun OSS Credentials'
        env:
          ALIYUN_OSS_ACCESS_KEY_ID: '${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}'
          ALIYUN_OSS_ACCESS_KEY_SECRET: '${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}'
          ALIYUN_OSS_ENDPOINT: "${{ vars.ALIYUN_OSS_ENDPOINT || 'https://oss-cn-hangzhou.aliyuncs.com' }}"
        run: |-
          set -euo pipefail

          if [[ -z "${ALIYUN_OSS_ACCESS_KEY_ID}" || -z "${ALIYUN_OSS_ACCESS_KEY_SECRET}" ]]; then
            echo "::error::Missing Aliyun OSS credentials. Set ALIYUN_OSS_ACCESS_KEY_ID and ALIYUN_OSS_ACCESS_KEY_SECRET in the production-release environment secrets."
            exit 1
          fi

          ossutil config \
            -e "${ALIYUN_OSS_ENDPOINT}" \
            -i "${ALIYUN_OSS_ACCESS_KEY_ID}" \
            -k "${ALIYUN_OSS_ACCESS_KEY_SECRET}" \
            -L EN \
            -c "${RUNNER_TEMP}/.ossutilconfig"

      - name: 'Upload and Delete OSS Test Object'
        env:
          ALIYUN_OSS_BUCKET: "${{ vars.ALIYUN_OSS_BUCKET || 'qwen-code-assets' }}"
          TEST_PREFIX: '${{ inputs.prefix }}'
        run: |-
          set -euo pipefail

          safe_prefix="${TEST_PREFIX:-qwen-code-oss-ak-check}"
          safe_prefix="${safe_prefix#/}"
          safe_prefix="${safe_prefix%/}"
          if [[ -z "${safe_prefix}" || "${safe_prefix}" == "." || "${safe_prefix}" == *".."* ]]; then
            echo "::error::Unsafe OSS test prefix: ${TEST_PREFIX}"
            exit 1
          fi

          test_object="${safe_prefix}/github-actions-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.txt"
          test_file="${RUNNER_TEMP}/oss-smoke-test.txt"

          printf 'qwen-code OSS smoke test\nrun_id=%s\nattempt=%s\n' \
            "${GITHUB_RUN_ID}" \
            "${GITHUB_RUN_ATTEMPT}" > "${test_file}"

          ossutil ls "oss://${ALIYUN_OSS_BUCKET}" -c "${RUNNER_TEMP}/.ossutilconfig" >/dev/null
          ossutil cp "${test_file}" "oss://${ALIYUN_OSS_BUCKET}/${test_object}" -c "${RUNNER_TEMP}/.ossutilconfig" -f
          ossutil rm "oss://${ALIYUN_OSS_BUCKET}/${test_object}" -c "${RUNNER_TEMP}/.ossutilconfig" -f

      - name: 'Build, Upload, Install, and Cleanup Staged Release Assets'
        env:
          ALIYUN_OSS_BUCKET: "${{ vars.ALIYUN_OSS_BUCKET || 'qwen-code-assets' }}"
          ALIYUN_OSS_PUBLIC_BASE_URL: "${{ vars.ALIYUN_OSS_PUBLIC_BASE_URL || 'https://qwen-code-assets.oss-cn-hangzhou.aliyuncs.com' }}"
          TEST_PREFIX: '${{ inputs.prefix }}'
        run: |-
          set -euo pipefail

          safe_prefix="${TEST_PREFIX:-qwen-code-oss-ak-check}"
          safe_prefix="${safe_prefix#/}"
          safe_prefix="${safe_prefix%/}"
          if [[ -z "${safe_prefix}" || "${safe_prefix}" == "." || "${safe_prefix}" == *".."* ]]; then
            echo "::error::Unsafe OSS test prefix: ${TEST_PREFIX}"
            exit 1
          fi

          release_prefix="${safe_prefix}/github-actions-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}/release"
          cleanup_release_assets() {
            ossutil rm "oss://${ALIYUN_OSS_BUCKET}/${release_prefix}/qwen-code-linux-x64.tar.gz" -c "${RUNNER_TEMP}/.ossutilconfig" -f >/dev/null 2>&1 || true
            ossutil rm "oss://${ALIYUN_OSS_BUCKET}/${release_prefix}/SHA256SUMS" -c "${RUNNER_TEMP}/.ossutilconfig" -f >/dev/null 2>&1 || true
          }
          trap cleanup_release_assets EXIT

          npm run bundle
          npm run prepare:package

          node_version="$(node -p 'process.versions.node')"
          node_archive="node-v${node_version}-linux-x64.tar.xz"
          node_dist_url="https://nodejs.org/dist/v${node_version}"
          runtime_dir="$(mktemp -d)"
          curl -fsSL "${node_dist_url}/SHASUMS256.txt" -o "${runtime_dir}/SHASUMS256.txt"
          curl -fsSL "${node_dist_url}/${node_archive}" -o "${runtime_dir}/${node_archive}"
          grep "  ${node_archive}$" "${runtime_dir}/SHASUMS256.txt" > "${runtime_dir}/SHASUMS256-linux-x64.txt"
          (cd "${runtime_dir}" && sha256sum -c SHASUMS256-linux-x64.txt)

          node scripts/create-standalone-package.js \
            --target linux-x64 \
            --node-archive "${runtime_dir}/${node_archive}" \
            --out-dir dist/oss-smoke \
            --version "0.0.0-oss-smoke.${GITHUB_RUN_ID}"

          ossutil cp "dist/oss-smoke/qwen-code-linux-x64.tar.gz" "oss://${ALIYUN_OSS_BUCKET}/${release_prefix}/qwen-code-linux-x64.tar.gz" -c "${RUNNER_TEMP}/.ossutilconfig" -f
          ossutil cp "dist/oss-smoke/SHA256SUMS" "oss://${ALIYUN_OSS_BUCKET}/${release_prefix}/SHA256SUMS" -c "${RUNNER_TEMP}/.ossutilconfig" -f

          public_release_base="${ALIYUN_OSS_PUBLIC_BASE_URL%/}/${release_prefix}"
          curl -fsSIL "${public_release_base}/SHA256SUMS" >/dev/null || curl -fsSL --range 0-0 "${public_release_base}/SHA256SUMS" >/dev/null
          curl -fsSIL "${public_release_base}/qwen-code-linux-x64.tar.gz" >/dev/null || curl -fsSL --range 0-0 "${public_release_base}/qwen-code-linux-x64.tar.gz" >/dev/null

          export HOME="${RUNNER_TEMP}/qwen-home"
          export QWEN_INSTALL_ROOT="${RUNNER_TEMP}/qwen-install-root"
          mkdir -p "${HOME}"
          bash scripts/installation/install-qwen-standalone.sh --method standalone --base-url "${public_release_base}" --source oss-smoke
          "${QWEN_INSTALL_ROOT}/bin/qwen" --version
