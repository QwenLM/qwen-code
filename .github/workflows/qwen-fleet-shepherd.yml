name: 'Fleet Shepherd'

# Keeps the open bot-PR fleet moving without a human shepherd. Every tick it
# walks the AUTOFIX_BOT's open PRs and applies the smallest lever that
# unblocks each one — all levers were validated by hand before automation:
#
#   • conflict         → dispatch the autofix loop for that PR (its --conflict
#                        path merges base and resolves), once per head SHA
#   • stale base       → update-branch when far behind main (fresh CI signal +
#                        propagates workflow/skill fixes; self-limiting since
#                        behind_by resets to 0 after the sync)
#   • known-flake red  → rerun failed jobs when EVERY failing test parsed
#                        across ALL the run's failed jobs matches
#                        .github/known-flakes.txt, capped per run, only after
#                        the run fully concluded (rerunning a live run wedges)
#   • scan liveness    → if no autofix full scan (schedule/dispatch) ran
#                        recently, dispatch one (GitHub cron is unreliable)
#
# It also maintains a single "Fleet Shepherd Dashboard" issue (edited in
# place, never comment spam) so fleet state is observable at a glance.
#
# Safety rails: bot-authored main-targeting in-repo PRs only; per-action
# markers make every write idempotent; per-tick action caps bound blast
# radius; DRY-RUN via dispatch input; global kill switch via the
# FLEET_SHEPHERD_DISABLED repository variable. Dispatches and reruns use the
# workflow's own token (actions: write); comments, update-branch, and the
# dashboard use CI_DEV_BOT_PAT so synced branches still trigger CI and all
# writes carry the bot identity.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Log intended actions without performing any write'
        required: false
        default: false
        type: 'boolean'

permissions:
  contents: 'read'
  actions: 'write'

concurrency:
  group: 'fleet-shepherd'
  cancel-in-progress: false

env:
  AUTOFIX_BOT: "${{ vars.AUTOFIX_BOT_LOGIN || 'qwen-code-dev-bot' }}"
  BEHIND_SYNC_THRESHOLD: '25'
  RERUN_MAX_ATTEMPTS: '2'
  SCAN_LIVENESS_MINUTES: '60'
  MAX_SYNCS_PER_TICK: '3'
  MAX_DISPATCHES_PER_TICK: '2'
  DASHBOARD_TITLE: 'Fleet Shepherd Dashboard'

jobs:
  shepherd:
    if: |-
      ${{ github.repository == 'QwenLM/qwen-code' && vars.FLEET_SHEPHERD_DISABLED != 'true' }}
    runs-on: 'ubuntu-latest'
    timeout-minutes: 15
    steps:
      - name: 'Checkout (flake registry)'
        uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10' # v6.0.3
        with:
          persist-credentials: false

      - name: 'Shepherd the fleet'
        env:
          REPO: '${{ github.repository }}'
          GITHUB_TOKEN: '${{ secrets.CI_DEV_BOT_PAT }}'
          ACTIONS_TOKEN: '${{ github.token }}'
          DRY_RUN: '${{ inputs.dry_run }}'
        run: |-
          FLAKE_FILE='.github/known-flakes.txt'
          DASH_ROWS=''
          SYNCS=0
          DISPATCHES=0
          NOW_EPOCH="$(date -u +%s)"

          act() {
            # act <description> <command...> — honors dry-run and never aborts
            # the tick (set -e safe via the if-wrapper at call sites), but DOES
            # propagate the command's real exit status so callers can make
            # follow-ups conditional: a dedup marker must never be posted for an
            # action that failed, or the failure becomes permanent (every later
            # tick sees the marker and skips while nothing was actually done).
            local desc="$1" rc=0
            shift
            if [[ "${DRY_RUN}" == "true" ]]; then
              echo "🧪 DRY-RUN: ${desc}"
              return 0
            fi
            echo "▶ ${desc}"
            "$@" || rc=$?
            if [[ "${rc}" -ne 0 ]]; then
              echo "::warning::action failed rc=${rc} (${desc})"
            fi
            return "${rc}"
          }

          # ---- identity: all PAT writes must be the bot -------------------
          bot_actor="$(gh api user --jq '.login' 2> /dev/null || echo '')"
          if [[ "${bot_actor}" != "${AUTOFIX_BOT}" ]]; then
            echo "::error::CI_DEV_BOT_PAT authenticates as '${bot_actor:-unknown}'; expected ${AUTOFIX_BOT}."
            exit 1
          fi

          # ---- dashboard lookup (also carries the liveness watermark) -----
          # gh's --jq accepts a single expression only (no --arg), so match the
          # exact title in the expression after an in:title search.
          DASH_NUM="$(gh issue list --repo "${REPO}" --state open \
            --search "in:title \"${DASHBOARD_TITLE}\"" \
            --json number,title --jq '.[0].number // ""' 2> /dev/null || echo '')"
          PREV_DASH=''
          if [[ -n "${DASH_NUM}" ]]; then
            PREV_DASH="$(gh issue view "${DASH_NUM}" --repo "${REPO}" --json body --jq '.body // ""' 2> /dev/null || echo '')"
          fi
          PREV_LIVENESS="$(grep -oE '<!-- fleet-shepherd liveness-dispatched: [^ ]+ -->' <<< "${PREV_DASH}" | grep -oE '[0-9T:Z-]{20}' | head -1 || true)"

          # ---- scan liveness watchdog -------------------------------------
          # GitHub cron is unreliable (observed 16h of silence on a */10
          # schedule). Liveness counts only SCHEDULE runs plus the shepherd's
          # own liveness dispatches (recorded in the dashboard body) — a
          # conflict dispatch is also a workflow_dispatch event but is NOT a
          # full scan, so it must not satisfy the watchdog. Reads use the
          # workflow token: actions read/write is guaranteed there, while the
          # PAT's actions scope is not.
          env GITHUB_TOKEN="${ACTIONS_TOKEN}" gh run list --repo "${REPO}" --workflow qwen-autofix.yml \
            --limit 20 --json event,createdAt,status > /tmp/scan-runs.json 2> /dev/null || echo '[]' > /tmp/scan-runs.json
          LAST_SCHEDULE="$(jq -r '[.[] | select(.event == "schedule")] | first | .createdAt // ""' /tmp/scan-runs.json)"
          SCAN_INFLIGHT="$(jq -r '[.[] | select((.event == "schedule" or .event == "workflow_dispatch") and .status != "completed")] | length' /tmp/scan-runs.json)"
          LAST_SIGNAL="${LAST_SCHEDULE}"
          if [[ -n "${PREV_LIVENESS}" && "${PREV_LIVENESS}" > "${LAST_SIGNAL}" ]]; then
            LAST_SIGNAL="${PREV_LIVENESS}"
          fi
          SCAN_AGE_MIN=99999
          if [[ -n "${LAST_SIGNAL}" ]]; then
            SCAN_AGE_MIN=$(( (NOW_EPOCH - $(date -u -d "${LAST_SIGNAL}" +%s)) / 60 ))
          fi
          LIVENESS_OUT="${PREV_LIVENESS}"
          echo "🫀 last scan signal: ${LAST_SIGNAL:-never} (${SCAN_AGE_MIN}m ago), in-flight: ${SCAN_INFLIGHT}"
          if [[ "${SCAN_AGE_MIN}" -ge "${SCAN_LIVENESS_MINUTES}" && "${SCAN_INFLIGHT}" == "0" ]]; then
            if act "scan liveness: dispatch unforced review scan" \
              env GITHUB_TOKEN="${ACTIONS_TOKEN}" gh workflow run qwen-autofix.yml --repo "${REPO}" -f phase=review; then
              LIVENESS_OUT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            fi
          fi

          # ---- walk the bot fleet (one list call carries all per-PR meta) --
          gh pr list --repo "${REPO}" --state open --author "${AUTOFIX_BOT}" --base main \
            --limit 50 --json number,headRefName,headRefOid,mergeable,isCrossRepository,statusCheckRollup \
            --jq '[.[] | select(.isCrossRepository != true)]' > /tmp/fleet.json 2> /dev/null || echo '[]' > /tmp/fleet.json

          while IFS= read -r ROW; do
            [[ -z "${ROW}" ]] && continue
            PR="$(jq -r '.number' <<< "${ROW}")"
            BRANCH="$(jq -r '.headRefName // ""' <<< "${ROW}")"
            HEAD="$(jq -r '.headRefOid // ""' <<< "${ROW}")"
            MERGEABLE="$(jq -r '.mergeable // "UNKNOWN"' <<< "${ROW}")"
            if [[ -z "${BRANCH}" || -z "${HEAD}" ]]; then
              echo "⚠️ #${PR}: incomplete metadata; skipping this tick"
              DASH_ROWS="${DASH_ROWS}| #${PR} | ? | incomplete metadata | — |\n"
              continue
            fi
            # WAITING and REQUESTED are also not-yet-final check states.
            PENDING="$(jq -r '[.statusCheckRollup[]? | select((.status // "") | IN("QUEUED", "IN_PROGRESS", "PENDING", "WAITING", "REQUESTED"))] | length' <<< "${ROW}")"
            FAILED_TEST_URL="$(jq -r '[.statusCheckRollup[]? | select(.conclusion == "FAILURE") | select(.name | startswith("Test (ubuntu")) | .detailsUrl][0] // ""' <<< "${ROW}")"
            BEHIND="$(gh api "repos/${REPO}/compare/main...${HEAD}" --jq '.behind_by // 0' 2> /dev/null || echo 0)"
            gh api "repos/${REPO}/issues/${PR}/comments" --paginate 2> /dev/null > /tmp/ic.json || echo '[]' > /tmp/ic.json
            MY_MARKS="$(jq -r --arg ab "${AUTOFIX_BOT}" '[.[] | select(.user.login == $ab) | .body] | join("\n")' /tmp/ic.json)"

            STATUS_NOTE='idle'
            ACTION_NOTE='—'

            # 1) conflict → dispatch the loop for this PR, once per head SHA.
            # The dedup marker is posted ONLY when the dispatch succeeded — a
            # marker for a failed dispatch would freeze the PR at this head.
            if [[ "${MERGEABLE}" == "CONFLICTING" ]]; then
              STATUS_NOTE='conflicting'
              if [[ "${MY_MARKS}" == *"<!-- fleet-shepherd conflict-dispatch sha=${HEAD} -->"* ]]; then
                ACTION_NOTE='conflict dispatch already sent for this head'
              elif [[ "${DISPATCHES}" -lt "${MAX_DISPATCHES_PER_TICK}" ]]; then
                if act "#${PR}: dispatch autofix for conflict resolution" \
                  env GITHUB_TOKEN="${ACTIONS_TOKEN}" gh workflow run qwen-autofix.yml --repo "${REPO}" -f pr_number="${PR}"; then
                  act "#${PR}: post conflict notice" \
                    gh pr comment "${PR}" --repo "${REPO}" --body "$(printf '🐑 Merge conflict with main detected — dispatched the autofix loop to resolve it. / 检测到与 main 的合并冲突，已触发 autofix 处理。\n\n<!-- fleet-shepherd conflict-dispatch sha=%s -->' "${HEAD}")"
                  DISPATCHES=$(( DISPATCHES + 1 ))
                  ACTION_NOTE='dispatched conflict resolution'
                else
                  ACTION_NOTE='conflict dispatch FAILED — will retry next tick'
                fi
              else
                ACTION_NOTE='dispatch cap reached this tick'
              fi

            # 2) stale base → sync. Self-limiting: behind_by resets on sync.
            # expected_head_sha makes the sync a compare-and-swap: if the loop
            # pushed between our read and this call, GitHub rejects it and the
            # next tick re-evaluates the fresh head.
            elif [[ "${MERGEABLE}" == "MERGEABLE" && "${BEHIND}" -ge "${BEHIND_SYNC_THRESHOLD}" && "${PENDING}" == "0" ]]; then
              STATUS_NOTE="behind by ${BEHIND}"
              if [[ "${SYNCS}" -lt "${MAX_SYNCS_PER_TICK}" ]]; then
                if act "#${PR}: update-branch (behind by ${BEHIND})" \
                  gh api -X PUT "repos/${REPO}/pulls/${PR}/update-branch" -f expected_head_sha="${HEAD}" --silent; then
                  SYNCS=$(( SYNCS + 1 ))
                  ACTION_NOTE='synced with main'
                else
                  ACTION_NOTE='sync rejected (head moved?) — will retry next tick'
                fi
              else
                ACTION_NOTE='sync cap reached this tick'
              fi

            # 3) red CI whose failures are ALL known flakes → safe rerun.
            # `gh run rerun --failed` reruns EVERY failed job in the run, so the
            # flake gate must consider every failed job, not just the one that
            # flagged the PR: failing tests are parsed from ALL failed jobs'
            # logs (job ids from the run's jobs API — no URL parsing) and every
            # parsed test must match the registry. Failed jobs that expose no
            # parseable failing tests (e.g. a coverage-comment job that fails
            # downstream of the test job) neither allow nor block on their own.
            elif [[ -n "${FAILED_TEST_URL}" && "${PENDING}" == "0" ]]; then
              STATUS_NOTE='ci red'
              RUN_ID="$(grep -oE '/runs/[0-9]+' <<< "${FAILED_TEST_URL}" | grep -oE '[0-9]+' | head -1 || true)"
              RUN_STATE="$(env GITHUB_TOKEN="${ACTIONS_TOKEN}" gh run view "${RUN_ID}" --repo "${REPO}" --json status --jq '.status' 2> /dev/null || echo '')"
              ATTEMPTS="$(grep -c "<!-- fleet-shepherd rerun run=${RUN_ID} " <<< "${MY_MARKS}" || true)"
              if [[ -z "${RUN_ID}" ]]; then
                ACTION_NOTE='could not extract run id from check URL — leaving alone'
              elif [[ "${RUN_STATE}" != "completed" ]]; then
                ACTION_NOTE='run not concluded yet'
              elif [[ "${ATTEMPTS}" -ge "${RERUN_MAX_ATTEMPTS}" ]]; then
                ACTION_NOTE="rerun cap (${ATTEMPTS}/${RERUN_MAX_ATTEMPTS}) — needs a human"
              else
                : > /tmp/fails.txt
                while IFS= read -r JOB_ID; do
                  [[ -z "${JOB_ID}" ]] && continue
                  env GITHUB_TOKEN="${ACTIONS_TOKEN}" gh api "repos/${REPO}/actions/jobs/${JOB_ID}/logs" 2> /dev/null \
                    | grep -oE 'FAIL[[:space:]]+[^ ]+\.test\.[a-z]+' | awk '{print $NF}' >> /tmp/fails.txt || true
                done < <(env GITHUB_TOKEN="${ACTIONS_TOKEN}" gh run view "${RUN_ID}" --repo "${REPO}" --json jobs \
                  --jq '.jobs[] | select(.conclusion == "failure") | .databaseId' 2> /dev/null)
                sort -u /tmp/fails.txt -o /tmp/fails.txt
                # Trichotomy on the registry filter: rc=0 → a non-flake failure
                # exists (block); rc=1 → every failure matched (rerun); rc≥2 →
                # registry/pattern ERROR — fail SAFE by blocking, never by
                # rerunning on a broken registry.
                GATE_RC=0
                NON_FLAKE="$(grep -vE -f <(grep -vE '^[[:space:]]*(#|$)' "${FLAKE_FILE}") /tmp/fails.txt 2> /dev/null)" || GATE_RC=$?
                if [[ ! -s /tmp/fails.txt ]]; then
                  ACTION_NOTE='no failing tests parsed from any failed job — leaving alone'
                elif [[ "${GATE_RC}" -ge 2 ]]; then
                  ACTION_NOTE='flake registry has an invalid pattern — blocking reruns until fixed'
                elif [[ "${GATE_RC}" -eq 0 ]]; then
                  ACTION_NOTE="non-flake failure ($(head -1 <<< "${NON_FLAKE}")) — leaving for the loop"
                else
                  # Marker only after a successful rerun: a phantom marker would
                  # burn the attempt budget without any rerun happening.
                  if act "#${PR}: rerun failed jobs of ${RUN_ID} (all failures known-flaky)" \
                    env GITHUB_TOKEN="${ACTIONS_TOKEN}" gh run rerun "${RUN_ID}" --repo "${REPO}" --failed; then
                    act "#${PR}: record rerun attempt" \
                      gh pr comment "${PR}" --repo "${REPO}" --body "$(printf '🐑 Test failures all match the known-flake registry — re-ran failed jobs. / 失败均命中已知 flaky 清单，已重跑失败任务。\n\n<!-- fleet-shepherd rerun run=%s attempt=%s -->' "${RUN_ID}" "$(( ATTEMPTS + 1 ))")"
                    ACTION_NOTE="reran flaky run (attempt $(( ATTEMPTS + 1 )))"
                  else
                    ACTION_NOTE='rerun FAILED — will retry next tick'
                  fi
                fi
              fi
            elif [[ "${PENDING}" != "0" ]]; then
              STATUS_NOTE="checks in flight (${PENDING})"
            fi

            echo "🐑 #${PR} [${STATUS_NOTE}] → ${ACTION_NOTE}"
            DASH_ROWS="${DASH_ROWS}| #${PR} | \`${HEAD:0:9}\` | ${STATUS_NOTE} | ${ACTION_NOTE} |\n"
          done < <(jq -c '.[]' /tmp/fleet.json)

          # ---- dashboard: one issue, edited in place ----------------------
          {
            echo "Auto-maintained by the Fleet Shepherd workflow — do not edit by hand."
            echo
            echo "Last tick: $(date -u +%Y-%m-%dT%H:%M:%SZ) · scan-signal age: ${SCAN_AGE_MIN}m · syncs: ${SYNCS} · dispatches: ${DISPATCHES}"
            echo
            echo '| PR | Head | State | Action this tick |'
            echo '| --- | --- | --- | --- |'
            printf '%b' "${DASH_ROWS}"
            if [[ -n "${LIVENESS_OUT}" ]]; then
              echo
              echo "<!-- fleet-shepherd liveness-dispatched: ${LIVENESS_OUT} -->"
            fi
          } > /tmp/dashboard.md
          if [[ -z "${DASH_NUM}" ]]; then
            act "create dashboard issue" \
              gh issue create --repo "${REPO}" --title "${DASHBOARD_TITLE}" --body-file /tmp/dashboard.md
          else
            act "update dashboard issue #${DASH_NUM}" \
              gh issue edit "${DASH_NUM}" --repo "${REPO}" --body-file /tmp/dashboard.md
          fi
          echo "✅ tick complete (syncs=${SYNCS} dispatches=${DISPATCHES})"
