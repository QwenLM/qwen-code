name: 'Windows Self-Hosted Qwen Smoke'

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ['self-hosted', 'Windows', 'X64', 'ecs-qwen']
    timeout-minutes: 5
    steps:
      - name: 'Verify qwen on self-hosted Windows'
        shell: 'pwsh'
        run: |-
          Write-Host "RUNNER_NAME=$env:RUNNER_NAME"
          Write-Host "RUNNER_OS=$env:RUNNER_OS"
          Write-Host "RUNNER_ARCH=$env:RUNNER_ARCH"

          whoami

          Write-Host 'Current PATH entries containing qwen-code:'
          $env:Path -split ';' |
            Where-Object { $_ -like '*qwen-code*' } |
            ForEach-Object { Write-Host $_ }

          Write-Host 'User PATH entries containing qwen-code:'
          [Environment]::GetEnvironmentVariable('Path', 'User') -split ';' |
            Where-Object { $_ -like '*qwen-code*' } |
            ForEach-Object { Write-Host $_ }

          Write-Host 'Machine PATH entries containing qwen-code:'
          [Environment]::GetEnvironmentVariable('Path', 'Machine') -split ';' |
            Where-Object { $_ -like '*qwen-code*' } |
            ForEach-Object { Write-Host $_ }

          Write-Host 'where.exe qwen:'
          where.exe qwen

          Write-Host 'Get-Command qwen:'
          Get-Command qwen | Format-List Source,CommandType

          Write-Host 'qwen --version:'
          qwen --version
